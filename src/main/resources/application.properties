#JPA Basic Setting
#SQL, Display
spring.jpa.show-sql=true
#SQL, Easy Reading
spring.jpa.properties.hibernate.format_sql=true
# Auto DDL Setting disable
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
# DB Metadata Select Disable
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
#JPA Database Setting
spring.jpa.database=oracle
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
#file.upload.path=D:/upload/

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==========================================
# Spring Data Redis & Session Settings (Boot 3.5.15)
# ==========================================
# 1. Redis 인프라 접속 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=비밀번호가있다면입력

# 2. Spring Session Redis 세부 설정
# (Boot 3.x는 의존성만 있으면 세션 저장소가 Redis로 자동 채택됩니다)
spring.session.redis.namespace=spring:session
spring.session.redis.flush-mode=on_save

# ==========================================
# Real-time WebSocket Debug Logging (선택 사항)
# ==========================================
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.session=DEBUG

# 서버 포트 추가
server.port=80
