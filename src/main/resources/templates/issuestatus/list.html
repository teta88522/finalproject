<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>일감 상태 관리</title>
<link rel="stylesheet" th:href="@{/css/issuestatus/list.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="issue-status-page">
        <div class="container-fluid">

            <div class="issue-status-header">
                <div>
                    <h1>일감 상태 관리</h1>
                    <p>
                        일감에서 사용할 상태를 관리합니다.
                        사용 중인 상태는 삭제할 수 없습니다.
                    </p>
                </div>

                <a class="btn btn-primary issue-status-add-btn"
                   th:href="@{/issuestatus/create}">
                    + 새 상태 등록
                </a>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="static-table-area">
                <div class="issue-status-card">
                    <div class="static-table-list issue-status-table-wrap">

                        <table class="table issue-status-table">
                            <thead>
                            <tr>
                                <th style="width:80px;">순서</th>
                                <th style="width:200px;">상태명</th>
                                <th>설명</th>
                                <th style="width:120px;">종료 여부</th>
                                <th style="width:160px; text-align:center;">관리</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:if="${#lists.isEmpty(issueStatusList)}">
                                <td colspan="5" class="issue-status-empty">
                                    등록된 일감 상태가 없습니다.
                                </td>
                            </tr>

                            <tr th:each="status, stat : ${issueStatusList}">
                                <td th:text="${stat.count}">1</td>

                                <td class="status-name" th:text="${status.statusName}">
                                    신규
                                </td>

                                <td class="status-desc"
                                    th:text="${status.statusAnswer != null and status.statusAnswer != '' ? status.statusAnswer : '-'}">
                                    설명
                                </td>

                                <td>
                                    <span th:if="${status.closedYn == 'Y'}"
                                          class="status-badge-closed">
                                        종료
                                    </span>

                                    <span th:unless="${status.closedYn == 'Y'}"
                                          class="status-badge-open">
                                        진행
                                    </span>
                                </td>

                                <td>
                                    <div class="status-actions">

                                        <a class="status-action-btn"
                                           th:href="@{/issuestatus/update(issueStatusId=${status.issueStatusId})}">
                                            수정
                                        </a>

                                        <form th:action="@{/issuestatus/delete}"
                                              method="post"
                                              onsubmit="return confirm('해당 일감 상태를 삭제하시겠습니까?');">
                                            <input type="hidden"
                                                   name="issueStatusId"
                                                   th:value="${status.issueStatusId}">
                                            <button type="submit"
                                                    class="status-action-btn status-action-danger">
                                                삭제
                                            </button>
                                        </form>

                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>

                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
