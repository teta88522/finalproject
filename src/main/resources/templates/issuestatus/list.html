<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">

<head>
<title>일감 상태 관리</title>
<link rel="stylesheet" th:href="@{/css/common-ui.css}">
<link rel="stylesheet" th:href="@{/css/common-filter.css}">
<link rel="stylesheet" th:href="@{/css/issuestatus/issuestatus.css}">
</head>

<body>
	<div layout:fragment="Content">
	<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
		<div class="issue-status-page issue-status-list-page">
			<div class="container-fluid">

				<div class="issue-status-header">
					<div>
						<h3>일감 상태</h3>
						<p>일감에서 사용할 상태를 관리합니다.</p>
					</div>
						<a th:href="@{/issuestatus/create}"
							class="btn btn-custon-rounded-four custom-default-btn">
							상태 추가 </a>
				</div>

				<div class="search-section issuestatus-search">
					<div class="search-header">
						<div class="search-title">검색조건</div>

					</div>

					<form th:action="@{/issuestatus/list}" method="get">
						<div class="search-form-row">

							<div class="search-field">
								<label for="statusName">상태명</label> <input type="text"
									id="statusName" name="statusName"
									th:value="${searchVO != null ? searchVO.statusName : ''}"
									placeholder="input">
							</div>

							<div class="search-field">
								<label>종료 여부</label>
								<details class="filter-dropdown" data-placeholder="전체">
									<summary><span class="filter-selected-text" th:text="${selectedClosedYnText}">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item">
											<input type="checkbox" name="closedYnList" value="N"
												th:checked="${searchVO != null and searchVO.closedYnList != null and #lists.contains(searchVO.closedYnList, 'N')}">
											<span>진행</span>
										</label>
										<label class="filter-check-item">
											<input type="checkbox" name="closedYnList" value="Y"
												th:checked="${searchVO != null and searchVO.closedYnList != null and #lists.contains(searchVO.closedYnList, 'Y')}">
											<span>종료</span>
										</label>
									</div>
								</details>
							</div>

						</div>

						<div class="search-btn-area">
							<a th:href="@{/issuestatus/list}"
								class="btn btn-custon-rounded-four btn-primary custom-white-btn">
								초기화 </a>

							<button type="submit"
								class="btn btn-custon-rounded-four btn-primary custom-default-btn">
								검색</button>
						</div>
					</form>
				</div>

				<div th:if="${message}" class="page-message page-message-success"
					th:text="${message}"></div>

				<div th:if="${errorMessage}" class="page-message page-message-error"
					th:text="${errorMessage}"></div>

				<div class="issue-status-card issue-status-list-card">
					<div class="issue-status-card-title">
						<h4>일감 상태 목록</h4>
					</div>

					<div class="issue-status-table-wrap">
						<table class="table table-hover issue-status-table">
							<colgroup>
								<col style="width: 70px;">
								<col style="width: 220px;">
								<col>
								<col style="width: 130px;">
								<col style="width: 160px;">
							</colgroup>

							<thead>
								<tr>
									<th>번호</th>
									<th>상태명</th>
									<th>설명</th>
									<th style="text-align: center;">종료 여부</th>
									<th style="text-align: center;">관리</th>
								</tr>
							</thead>

							<tbody>
								<tr th:if="${#lists.isEmpty(issueStatusList)}">
									<td colspan="5" class="issue-status-empty">등록된 일감 상태가
										없습니다.</td>
								</tr>

								<tr th:each="status, stat : ${issueStatusList}">
									<td th:text="${stat.count}">1</td>

									<td><span class="status-name"
										th:text="${status.statusName}" th:title="${status.statusName}">
											신규 </span></td>

									<td><span class="status-desc"
										th:text="${status.statusAnswer != null ? status.statusAnswer : '-'}"
										th:title="${status.statusAnswer != null ? status.statusAnswer : '-'}">
											설명 </span></td>

									<td class="center"><span th:if="${status.closedYn == 'Y'}"
										class="status-badge-closed"> 종료 </span> <span
										th:if="${status.closedYn != 'Y'}" class="status-badge-open">
											진행 </span></td>

									<td>
										<div class="table-actions">
											<a class="btn btn-custon-rounded-four btn-primary custom-white-btn"
												th:href="@{/issuestatus/update(issueStatusId=${status.issueStatusId})}">
												수정 </a>

											<form th:action="@{/issuestatus/delete}" method="post"
												class="inline-form js-pf-confirm-submit"
												data-confirm-title="삭제 확인"
												data-confirm-message="이 일감 상태를 삭제하시겠습니까?"
												data-confirm-confirm-text="삭제"
												data-confirm-icon="warning">
												<input type="hidden" name="issueStatusId"
													th:value="${status.issueStatusId}">

												<button type="submit"
													class="btn btn-custon-rounded-four btn-danger custom-btn">삭제
												</button>
											</form>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

			</div>
		</div>
	</div>
</div>

	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script th:src="@{/js/common/pf-confirm.js}"></script>
	<script>
		(function() {
			function updateFilterSummary(dropdown) {
				var checkedLabels = Array.prototype.slice.call(
						dropdown.querySelectorAll('input[type="checkbox"]:checked, input[type="radio"]:checked'))
						.map(function(input) {
							var label = input.closest('.filter-check-item');
							return label ? label.innerText.trim() : '';
						}).filter(function(text) {
							return text.length > 0;
						});
				var summaryText = dropdown.querySelector('.filter-selected-text');
				var placeholder = dropdown.getAttribute('data-placeholder') || '전체';

				if (!summaryText) {
					return;
				}

				if (!dropdown.dataset.summaryInitialized) {
					dropdown.dataset.summaryInitialized = 'true';
					if (summaryText.textContent.trim() && summaryText.textContent.trim() !== placeholder) {
						dropdown.classList.add('has-selected');
						return;
					}
				}

				if (checkedLabels.length === 0) {
					summaryText.textContent = placeholder;
					dropdown.classList.remove('has-selected');
					return;
				}

				summaryText.textContent = checkedLabels.join(', ');
				dropdown.classList.add('has-selected');
			}

			document.querySelectorAll('.filter-dropdown').forEach(function(dropdown) {
				updateFilterSummary(dropdown);
				dropdown.addEventListener('change', function() {
					updateFilterSummary(dropdown);
				});
			});

			document.addEventListener('click', function(event) {
				document.querySelectorAll('.filter-dropdown[open]').forEach(function(dropdown) {
					if (!dropdown.contains(event.target)) {
						dropdown.removeAttribute('open');
					}
				});
			});
		})();
	</script>
	</div>
</body>
</html>
