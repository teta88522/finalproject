<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">

<head>
<title>일감 상태 수정</title>
<link rel="stylesheet" th:href="@{/css/common-ui.css}">
<link rel="stylesheet" th:href="@{/css/issuestatus/issuestatus.css}">
</head>

<body>
	<div layout:fragment="Content">
	<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:hidden;">
	
		<div class="issue-status-form-page">
			<div class="container-fluid">

				<div class="issue-status-header">
					<div>
						<h1>일감 상태 수정</h1>
						<p>등록된 일감 상태 정보를 수정합니다.</p>
					</div>
				</div>

				<div th:if="${errorMessage}" class="page-message page-message-error"
					th:text="${errorMessage}"></div>

				<div class="issue-status-form-card">
					<div class="issue-status-form-title">
						<h1>기본 정보</h1>
						<p>상태명, 설명, 종료 여부를 수정합니다.</p>
					</div>

					<form th:action="@{/issuestatus/update}" method="post"
						th:object="${issueStatus}">

						<input type="hidden" th:field="*{issueStatusId}">

						<div class="form-group">
							<label for="statusName">상태명</label> <input type="text"
								id="statusName" th:field="*{statusName}" class="form-control"
								placeholder="상태명을 입력하세요">
						</div>

						<div class="form-group">
							<label for="statusAnswer">상태 설명</label>
							<textarea id="statusAnswer" th:field="*{statusAnswer}"
								class="form-control" placeholder="상태 설명을 입력하세요"></textarea>
						</div>

						<div class="form-group">
							<label for="closedYn">종료 상태 여부</label> <select id="closedYn"
								th:field="*{closedYn}" class="form-control">
								<option value="N">진행</option>
								<option value="Y">종료</option>
							</select>
						</div>

						<div class="issue-status-form-actions">
							<a th:href="@{/issuestatus/list}"
								class="btn btn-custon-rounded-four btn-primary custom-white-btn"> 취소 </a>

							<button type="submit"
								class="btn btn-custon-rounded-four btn-primary custom-default-btn">수정</button>
						</div>

					</form>
				</div>

			</div>
		</div>
		</div>
	</div>
</div>
</body>
</html>
