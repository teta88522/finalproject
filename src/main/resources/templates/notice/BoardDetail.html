<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>게시판 상세</title>
    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/common-filter.css}" />
    <link rel="stylesheet" th:href="@{/css/notice/board_detail.css}">
</head>
<body>
<div layout:fragment="Content">
    <div class="container-fluid board-page-wrapper">
        <div class="board-page-panel">
            
            <div class="board-page-header">
                <div>
                    <h3 class="board-page-title" th:text="${board.boardName}">게시판 상세</h3>
                    <p class="board-page-subtitle" th:text="${board.description}">게시판 설명</p>
                </div>
                <div>    <a th:href="@{/project/{projectId}/notice/BoardList(projectId=${projectId})}" class="btn btn-custon-rounded-four custom-white-btn">목록</a>
                    <!-- -- 권한 처리 -->
                    <a th:if="${canAddPost}" th:href="@{/project/{projectId}/notice/PostCreate(projectId=${projectId}, boardId=${board.boardId})}" class="btn btn-custon-rounded-four custom-default-btn">글 등록</a>
                    <!-- -- 권한 처리 끝 -->
                </div>
            </div>
            <div class="board-page-body">

        <!-- 2. 검색 조건 필터 박스 (마일스톤 list와 동일한 스타일 적용) -->
        <div class="search-section">
            <div class="search-header">
                <div class="search-title">검색조건</div>
            </div>
            <form id="searchForm" th:action="@{/project/{projectId}/notice/BoardDetail(projectId=${projectId})}" method="get">
                <input type="hidden" name="boardId" th:value="${board.boardId}">
                
                <div class="search-form-row">
                    <!-- 1. 날짜 필터 -->
                    <div class="search-field">
                        <label>날짜</label>
                        <div style="display:flex; align-items:center; gap:6px;">
                            <input type="date" name="startDate" id="startDate"
                                   th:value="${searchDTO != null ? searchDTO.startDate : ''}" style="flex:1;" />
                            <span style="color:#aaa;">~</span>
                            <input type="date" name="endDate" id="endDate"
                                   th:value="${searchDTO != null ? searchDTO.endDate : ''}" style="flex:1;" />
                        </div>
                    </div>
                    <!-- 2. 정렬 필터 -->
                    <div class="search-field">
                        <label>정렬기준</label>
                        <select name="sortBy">
                            <option value="latest" th:selected="${searchDTO == null or searchDTO.sortBy == null or searchDTO.sortBy == 'latest'}">최신순</option>
                            <option value="views"  th:selected="${searchDTO != null and searchDTO.sortBy == 'views'}">조회수순</option>
                        </select>
                    </div>
                    <!-- 3. 검색어 필터 -->
                    <div class="search-field">
                        <label>검색조건</label>
                        <div style="display:flex; gap:6px;">
                            <select name="searchType" class="select-type" style="flex: 0 0 100px;">
                                <option value="title"  th:selected="${searchDTO != null and searchDTO.searchType == 'title'}">제목</option>
                                <option value="author" th:selected="${searchDTO != null and searchDTO.searchType == 'author'}">작성자</option>
                            </select>
                            <input type="text" name="keyword" class="input-keyword" th:value="${searchDTO != null ? searchDTO.keyword : ''}"
                                   placeholder="검색어를 입력하세요" style="flex:1;" />
                        </div>
                    </div>
                </div>
                
                <!-- 4. 하단 버튼 영역 -->
                <div class="search-btn-area">
                    <button type="button" class="btn btn-custon-rounded-four custom-white-btn filter-btn" onclick="resetSearch()">초기화</button>
                    <button type="submit" class="btn btn-custon-rounded-four custom-default-btn filter-btn">검색</button>
                </div>
            </form>
        </div>

        <!-- 3. 게시글 목록 테이블 -->
        <div class="table-container">
            <table class="board-table">
                <thead>
                    <tr>
                        <th width="10%">번호</th>
                        <th width="45%">제목</th>
                        <th width="15%">작성자</th>
                        <th width="20%">날짜</th>
                        <th width="10%">조회수</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="post, stat : ${postPage.content}">
                 
                        <td th:text="${postPage.totalElements - (postPage.number * postPage.size) - stat.index}">10</td>
                        <td class="text-left">
                            <a th:href="@{/project/{projectId}/notice/post_detail(projectId=${projectId}, postId=${post.postId}, boardId=${board.boardId})}" 
                               th:text="${post.title}">게시글 제목</a>
                        </td>
                        <td th:text="${post.userName}">이름</td>
                        <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">yyy-MM-dd</td>
                        <td th:text="${post.viewCount != null ? post.viewCount : 0}">01</td>
                    </tr>
                    <!-- 추가: 게시글이 없을 때 보여줄 화면 -->
                    <tr th:if="${#lists.isEmpty(postPage.content)}">
                        <td colspan="5" class="empty-row">등록된 게시글이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 4. 페이징 영역 (사진 디자인과 동일하게 구성) -->
        <div class="pagination-container" th:if="${postPage.totalPages > 0}">
            <ul class="pagination">
                <!-- 이전 버튼 -->
                <li th:classappend="${postPage.first} ? 'disabled'">
                    <a th:href="@{/project/{projectId}/notice/BoardDetail(projectId=${projectId}, boardId=${board.boardId}, page=${postPage.number - 1})}" 
                       class="page-nav">이전</a>
                </li>

                <!-- 페이지 번호 반복 생성 (시작 페이지 ~ 끝 페이지) -->
                <!-- 예: 현재 페이지 기준 좌우 2개씩 보여줌 -->
                <li th:each="pageNum : ${#numbers.sequence(0, postPage.totalPages - 1)}"
                    th:if="${pageNum >= postPage.number - 2 and pageNum <= postPage.number + 2}">
                    <a th:href="@{/project/{projectId}/notice/BoardDetail(projectId=${projectId}, boardId=${board.boardId}, page=${pageNum})}" 
                       th:text="${pageNum + 1}"
                       th:classappend="${pageNum == postPage.number} ? 'active'"
                       class="page-num">1</a>
                </li>

                <!-- 다음 버튼 -->
                <li th:classappend="${postPage.last} ? 'disabled'">
                    <a th:href="@{/project/{projectId}/notice/BoardDetail(projectId=${projectId}, boardId=${board.boardId}, page=${postPage.number + 1})}" 
                       class="page-nav">다음</a>
                </li>
            </ul>
        </div>
        </div>
    </div>
    </div>
    </div>
</div>

<!-- JS 연결 영역 -->
<th:block layout:fragment="script">
    <script th:src="@{/js/notice/board_detail.js}"></script>
</th:block>
</body>
</html>
