<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>게시글 등록</title>
    <!-- 일감 첨부파일 UI 디자인 이식을 위한 CSS 연결 -->
    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/issues/issues.css}">
    <link rel="stylesheet" th:href="@{/css/notice/post_create.css}">
</head>
<body>
<div layout:fragment="Content">
    <div class="post-create-card">
        <h1>게시판 글쓰기</h1>
        
        <!-- 파일 전송을 위한 enctype="multipart/form-data" 및 js 바인딩용 id="documentEditForm" 지정 -->
        <form id="documentEditForm" th:action="@{/project/{projectId}/notice/PostCreate(projectId=${projectId})}" 
              th:object="${postRequestDTO}" method="post" enctype="multipart/form-data">
            				
            <input type="hidden" name="boardId" th:value="${boardId}" />

            <div class="form-group">
                <label class="form-label">제목 *</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="제목을 입력하세요" required>
            </div>

            <div class="form-group">
                <label class="form-label">설명</label>
                <textarea th:field="*{content}" class="form-control" rows="10" placeholder="내용을 입력하세요"></textarea>
            </div>

            <!-- 첨부파일 (일감 create.html 마크업 100% 동일 적용) -->
            <div class="form-group">
                <label class="form-label">첨부파일</label>
                <div class="issues-file-box">
                    <div>
                        <label for="fileInput" class="btn btn-custon-rounded-four btn-default issues-file-select">
                            파일 선택
                        </label> 
                        <input type="file" id="fileInput" name="files" multiple class="issues-file-input"> 
                        <span id="fileCount" class="issues-file-count">파일 0개</span>
                    </div>
                    <ul id="fileList" class="issues-file-list"></ul>
                </div>
            </div>

            <div class="btn-area">
                <a th:href="@{/project/{projectId}/notice/BoardDetail(projectId=${projectId}, boardId=${boardId})}" class="btn-cancel">취소</a>
                <button type="submit" class="btn-submit">등록</button>
            </div>
        </form>
    </div>
    
</div>
</body>
</html>
