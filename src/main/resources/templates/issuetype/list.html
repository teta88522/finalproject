<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">

<head>
<title>일감유형 관리</title>
<link rel="stylesheet" th:href="@{/css/common-ui.css}">
<link rel="stylesheet" th:href="@{/css/common-filter.css}">
<link rel="stylesheet" th:href="@{/css/issuetype/issuetype.css}">
</head>

<body>
	<div layout:fragment="Content">

		<div class="issuetype-area issuetype-list-page">
			<div class="container-fluid">

				<div class="issuetype-header">
					<div>
						<h3>일감 유형</h3>
						<p>일감 생성 시 사용할 유형을 관리합니다.</p>
					</div>
				</div>

				<div class="search-section issuetype-search">
					<div class="search-header">
						<div class="search-title">검색조건</div>

						<div class="header-actions">
							<a th:href="@{/issuetype/summary}"
								class="btn btn-custon-rounded-four btn-default search-action-btn">
								요약 </a> <a th:href="@{/issuetype/create}"
								class="btn btn-custon-rounded-four btn-primary search-action-btn">
								유형 생성 </a>
						</div>
					</div>

					<form th:action="@{/issuetype/list}" method="get">
						<div class="search-form-row">

							<div class="search-field">
								<label for="issueTypeName">유형명</label> <input type="text"
									id="issueTypeName" name="issueTypeName"
									th:value="${searchVO != null ? searchVO.issueTypeName : ''}"
									placeholder="input">
							</div>

							<div class="search-field">
								<label>초기 상태</label>
								<details class="filter-dropdown" data-placeholder="전체">
									<summary><span class="filter-selected-text" th:text="${selectedInitialStatusText}">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item" th:each="status : ${issueStatusList}">
											<input type="checkbox" name="initialStatusIdList"
												th:value="${status.issueStatusId}"
												th:checked="${searchVO != null and searchVO.initialStatusIdList != null and #lists.contains(searchVO.initialStatusIdList, status.issueStatusId)}">
											<span th:text="${status.statusName}">신규</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field">
								<label for="description">설명</label> <input type="text"
									id="description" name="description"
									th:value="${searchVO != null ? searchVO.description : ''}"
									placeholder="input">
							</div>

						</div>

						<div class="search-btn-area">
							<a th:href="@{/issuetype/list}"
								class="btn btn-custon-rounded-four btn-default filter-btn">
								초기화 </a>

							<button type="submit"
								class="btn btn-custon-rounded-four btn-primary filter-btn">
								검색</button>
						</div>
					</form>
				</div>

				<div th:if="${message}" class="page-message page-message-success"
					th:text="${message}"></div>

				<div th:if="${errorMessage}" class="page-message page-message-error"
					th:text="${errorMessage}"></div>

				<div class="issuetype-card issuetype-list-card">
					<div class="issuetype-card-title">
						<h4>일감유형 목록</h4>
					</div>

					<div class="issuetype-table-wrap">
						<table class="table table-hover issuetype-table">
							<colgroup>
								<col style="width: 70px;">
								<col style="width: 220px;">
								<col style="width: 160px;">
								<col>
								<col style="width: 184px;">
							</colgroup>

							<thead>
								<tr>
									<th>번호</th>
									<th>유형명</th>
									<th>초기 상태</th>
									<th>설명</th>
									<th style="text-align: center;">관리</th>
								</tr>
							</thead>

							<tbody>
								<tr th:if="${#lists.isEmpty(issueTypeList)}">
									<td colspan="5" class="empty-row">등록된 일감유형이 없습니다.</td>
								</tr>

								<tr th:each="issueType, stat : ${issueTypeList}">
									<td th:text="${stat.count}">1</td>

									<td><span class="strong-text"
										th:text="${issueType.issueTypeName}"
										th:title="${issueType.issueTypeName}"> 결함 </span></td>

									<td><span class="status-badge"
										th:text="${issueType.initialStatusName}"> 신규 </span></td>

									<td><span class="ellipsis-text"
										th:text="${issueType.description != null ? issueType.description : '-'}"
										th:title="${issueType.description != null ? issueType.description : '-'}">
											설명 </span></td>

									<td class="issuetype-action-cell">
										<div class="table-actions">
											<a class="btn btn-custon-rounded-four btn-default"
												th:href="@{/issuetype/update(issueTypeId=${issueType.issueTypeId})}">
												수정 </a>
											<a class="btn btn-custon-rounded-four btn-default"
												th:href="@{/issuetype/copy(issueTypeId=${issueType.issueTypeId})}">
												복사 </a>

											<form th:action="@{/issuetype/delete}" method="post"
												class="inline-form js-pf-confirm-submit"
												data-confirm-title="삭제 확인"
												data-confirm-message="선택한 일감유형을 삭제하시겠습니까?"
												data-confirm-confirm-text="삭제"
												data-confirm-icon="warning">
												<input type="hidden" name="issueTypeId"
													th:value="${issueType.issueTypeId}">

												<button type="submit"
													class="btn btn-custon-rounded-four btn-danger">삭제
												</button>
											</form>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

			</div>
		</div>

	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script th:src="@{/js/common/pf-confirm.js}"></script>
	<script>
		(function() {
			function updateFilterSummary(dropdown) {
				var checkedLabels = Array.prototype.slice.call(
						dropdown.querySelectorAll('input[type="checkbox"]:checked, input[type="radio"]:checked'))
						.map(function(input) {
							var label = input.closest('.filter-check-item');
							return label ? label.innerText.trim() : '';
						}).filter(function(text) {
							return text.length > 0;
						});
				var summaryText = dropdown.querySelector('.filter-selected-text');
				var placeholder = dropdown.getAttribute('data-placeholder') || '전체';

				if (!summaryText) {
					return;
				}

				if (!dropdown.dataset.summaryInitialized) {
					dropdown.dataset.summaryInitialized = 'true';
					if (summaryText.textContent.trim() && summaryText.textContent.trim() !== placeholder) {
						dropdown.classList.add('has-selected');
						return;
					}
				}

				if (checkedLabels.length === 0) {
					summaryText.textContent = placeholder;
					dropdown.classList.remove('has-selected');
					return;
				}

				summaryText.textContent = checkedLabels.join(', ');
				dropdown.classList.add('has-selected');
			}

			document.querySelectorAll('.filter-dropdown').forEach(function(dropdown) {
				updateFilterSummary(dropdown);
				dropdown.addEventListener('change', function() {
					updateFilterSummary(dropdown);
				});
			});

			document.addEventListener('click', function(event) {
				document.querySelectorAll('.filter-dropdown[open]').forEach(function(dropdown) {
					if (!dropdown.contains(event.target)) {
						dropdown.removeAttribute('open');
					}
				});
			});
		})();
	</script>
	</div>
</body>
</html>
