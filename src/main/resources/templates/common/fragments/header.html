<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

 <div th:fragment="HeaderFragment">

<div class="header-advance-area">
    <div class="container-fluid">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <!-- 왼쪽: 타이틀 -->
            <h3 style="color:white; margin:10px 0;">
                <img th:src="@{/img/logo1.png}" style="height:45px;" />PIXCEL 프로젝트 관리 시스템
            </h3>

        </div>
    </div>
</div>

        <!-- Header Top -->
        <div class="header-top-area">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="header-top-wraper">

                            <div class="row">

                                
                                <!-- Top Menu -->

            					<div class="col-lg-6 col-md-5 col-sm-6 col-xs-12">
        								<div class="header-top-menu tabl-d-n">
            							<ul class="nav navbar-nav mai-top-nav">
                                        	
                                            <li class="nav-item">
                                                <a th:href="@{/myproject/list}">프로젝트</a>
                                            </li>
                                            

                                            <!-- subscribeYn = Y 이면 관리 탭 표시 -->
    										<li class="nav-item" th:if="${subscribeYn == 'Y'}">
    											<a th:href="@{/issuetype/list}">관리</a>
											</li>

                                        </ul>
                                    </div>
                                </div>

                                <!-- Right Menu -->
                                <div class="col-lg-6 col-md-7 col-sm-12 col-xs-12">
    								<div class="header-right-info">
        								<ul class="nav navbar-nav mai-top-nav header-right-menu" 
            								style="margin:0; justify-content:flex-end;">
                                           
                                            <!-- User -->
                                            <li class="nav-item">
                                            <a href="#" data-toggle="dropdown" class="nav-link dropdown-toggle">
    											<span th:text="${userName != null ? userName : 'Guest'}">USER</span>
    											<i class="fa fa-angle-down edu-icon edu-down-arrow"></i>
											</a>
											
                                            </li>


                                            <li class="nav-item">
                                                <a th:href="@{/usersMypage}" class="nav-link">내정보</a>
                                            </li>

                                            <li class="nav-item">
                                                <a th:href="@{/logout}" class="nav-link">로그아웃</a>
                                            </li>

                                        </ul>

                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>    
</div>
</body>
</html>
