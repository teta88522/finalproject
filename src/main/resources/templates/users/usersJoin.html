<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<link rel="stylesheet" th:href="@{/css/users/user.css}">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/common/pf-confirm.js}"></script>
</head>

<body>

<div class="user-page">

    <!-- 왼쪽 파란 영역 -->
    <div class="user-left">
        <div class="user-logo-area">
             <img th:src="@{/img/login.png}" class="logo-img" />
        </div>
    </div>

    <!-- 오른쪽 회원가입 영역 -->
    <div class="user-right">

        <form class="user-form-box"
              th:action="@{/join}"
              th:object="${userServiceVO}"
              method="post"
              onsubmit="return checkJoinForm()">

            <h1 class="user-title">회원가입</h1>

            <div class="form-row">
                <label for="userName">이름</label>
                <input type="text"
                       id="userName"
                       th:field="*{userName}"
                       placeholder="홍길동">
            </div>

            <div class="form-row">
                <label for="loginId">아이디</label>

                <div class="id-input-wrap">
                    <input type="text"
                           id="loginId"
                           th:field="*{loginId}"
                           placeholder="test1234">

                    <button type="button"
                            class="check-btn"
                            onclick="checkLoginId()">
                        중복확인
                    </button>
                </div>
            </div>

            <p class="info-message" id="idCheckMessage"></p>

            <div class="form-row">
                <label for="password">비밀번호</label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       placeholder="비밀번호">
            </div>

            <p class="info-message" id="passwordMessage"></p>

            <div class="form-row">
                <label for="passwordCheck">비밀번호 확인</label>
                <input type="password"
                       id="passwordCheck"
                       name="passwordCheck"
                       placeholder="비밀번호 확인">
            </div>

            <p class="info-message" id="passwordCheckMessage"></p>

            <div class="form-row">
                <label for="email">이메일</label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       placeholder="test1234@email.com">
            </div>

            <div class="form-row">
                <label for="phone">연락처</label>
                <input type="text"
                       id="phone"
                       th:field="*{phone}"
                       placeholder="01012341234"
                       maxlength="11"
                       inputmode="numeric">
            </div>

            <p class="info-message" id="phoneCheckMessage"></p>

            <input type="hidden" id="idCheckYn" value="N">
            <input type="hidden" id="phoneCheckYn" value="N">

            <div class="form-btn-area">
                <button type="submit" class="user-btn">회원가입</button>

                <button type="button"
                        class="user-btn"
                        th:onclick="|location.href='@{/login}'|">
                    취소
                </button>
            </div>

        </form>

    </div>

</div>

<script>
    function pfAlert(message, title, icon, focusTarget) {
        window.PFDialog.alert(message, {
            title: title || "입력 확인",
            icon: icon || "warning"
        }).then(function () {
            if (focusTarget) {
                focusTarget.focus();
            }
        });
    }

    function checkLoginId() {
        const loginIdInput = document.getElementById("loginId");
        const loginId = loginIdInput.value;
        const message = document.getElementById("idCheckMessage");
        const idCheckYn = document.getElementById("idCheckYn");

        if (loginId.trim() === "") {
            pfAlert("아이디를 입력하세요.", "아이디 확인", "warning", loginIdInput);
            return;
        }

        fetch("/checkId?loginId=" + encodeURIComponent(loginId))
            .then(response => response.json())
            .then(data => {
                if (data.duplicated) {
                    message.innerText = "* 이미 사용중인 아이디입니다.";
                    message.style.color = "red";
                    idCheckYn.value = "N";
                } else {
                    message.innerText = "* 사용가능한 아이디입니다.";
                    message.style.color = "#3366cc";
                    idCheckYn.value = "Y";
                }
            })
            .catch(error => {
                console.log(error);
                pfAlert("아이디 중복확인 중 오류가 발생했습니다.", "중복확인 오류", "error");
            });
    }

    document.getElementById("loginId").addEventListener("input", function () {
        document.getElementById("idCheckYn").value = "N";
        document.getElementById("idCheckMessage").innerText = "";
    });

    document.getElementById("password").addEventListener("input", function () {
        const password = document.getElementById("password").value;
        const message = document.getElementById("passwordMessage");

        if (password.trim() === "") {
            message.innerText = "";
            return;
        }

        if (password.length >= 8) {
            message.innerText = "* 안전한 비밀번호입니다.";
            message.style.color = "#3366cc";
        } else {
            message.innerText = "* 비밀번호는 8자 이상 입력하세요.";
            message.style.color = "red";
        }
    });

    document.getElementById("passwordCheck").addEventListener("input", function () {
        const password = document.getElementById("password").value;
        const passwordCheck = document.getElementById("passwordCheck").value;
        const message = document.getElementById("passwordCheckMessage");

        if (passwordCheck.trim() === "") {
            message.innerText = "";
            return;
        }

        if (password === passwordCheck) {
            message.innerText = "* 비밀번호가 일치합니다.";
            message.style.color = "#3366cc";
        } else {
            message.innerText = "* 비밀번호가 일치하지 않습니다.";
            message.style.color = "red";
        }
    });

    document.getElementById("phone").addEventListener("input", function () {
        const phoneInput = document.getElementById("phone");
        const message = document.getElementById("phoneCheckMessage");
        const phoneCheckYn = document.getElementById("phoneCheckYn");

        phoneInput.value = phoneInput.value.replace(/[^0-9]/g, "");

        if (phoneInput.value.length > 11) {
            phoneInput.value = phoneInput.value.substring(0, 11);
        }

        const phone = phoneInput.value;

        phoneCheckYn.value = "N";
        message.innerText = "";

        if (phone.length === 0) {
            return;
        }

        if (phone.length < 11) {
            message.innerText = "* 연락처는 숫자 11자리로 입력하세요.";
            message.style.color = "red";
            return;
        }

        if (!phone.startsWith("010")) {
            message.innerText = "* 연락처는 010으로 시작해야 합니다.";
            message.style.color = "red";
            return;
        }

        fetch("/checkPhone?phone=" + encodeURIComponent(phone))
            .then(response => response.json())
            .then(data => {
                if (data.duplicated) {
                    message.innerText = "* 이미 등록된 연락처입니다.";
                    message.style.color = "red";
                    phoneCheckYn.value = "N";
                } else {
                    message.innerText = "* 사용가능한 연락처입니다.";
                    message.style.color = "#3366cc";
                    phoneCheckYn.value = "Y";
                }
            })
            .catch(error => {
                console.log(error);
                message.innerText = "* 연락처 확인 중 오류가 발생했습니다.";
                message.style.color = "red";
                phoneCheckYn.value = "N";
            });
    });

    function checkJoinForm() {
        const userNameInput = document.getElementById("userName");
        const loginIdInput = document.getElementById("loginId");
        const passwordInput = document.getElementById("password");
        const passwordCheckInput = document.getElementById("passwordCheck");
        const emailInput = document.getElementById("email");
        const phoneInput = document.getElementById("phone");

        const userName = userNameInput.value;
        const loginId = loginIdInput.value;
        const password = passwordInput.value;
        const passwordCheck = passwordCheckInput.value;
        const email = emailInput.value;
        const phone = phoneInput.value;
        const idCheckYn = document.getElementById("idCheckYn").value;
        const phoneCheckYn = document.getElementById("phoneCheckYn").value;

        if (userName.trim() === "") {
            pfAlert("이름을 입력하세요.", "회원가입 확인", "warning", userNameInput);
            return false;
        }

        if (loginId.trim() === "") {
            pfAlert("아이디를 입력하세요.", "회원가입 확인", "warning", loginIdInput);
            return false;
        }

        if (idCheckYn !== "Y") {
            pfAlert("아이디 중복확인을 해주세요.", "회원가입 확인", "warning", loginIdInput);
            return false;
        }

        if (password.trim() === "") {
            pfAlert("비밀번호를 입력하세요.", "회원가입 확인", "warning", passwordInput);
            return false;
        }

        if (password.length < 8) {
            pfAlert("비밀번호는 8자 이상 입력하세요.", "회원가입 확인", "warning", passwordInput);
            return false;
        }

        if (password !== passwordCheck) {
            pfAlert("비밀번호가 일치하지 않습니다.", "회원가입 확인", "warning", passwordCheckInput);
            return false;
        }

        if (email.trim() === "") {
            pfAlert("이메일을 입력하세요.", "회원가입 확인", "warning", emailInput);
            return false;
        }

        if (phone.trim() === "") {
            pfAlert("연락처를 입력하세요.", "회원가입 확인", "warning", phoneInput);
            return false;
        }

        if (!/^[0-9]{11}$/.test(phone)) {
            pfAlert("연락처는 숫자 11자리로 입력하세요.", "회원가입 확인", "warning", phoneInput);
            return false;
        }

        if (!phone.startsWith("010")) {
            pfAlert("연락처는 010으로 시작해야 합니다.", "회원가입 확인", "warning", phoneInput);
            return false;
        }

        if (phoneCheckYn !== "Y") {
            pfAlert("이미 등록된 연락처이거나 연락처 확인이 완료되지 않았습니다.", "회원가입 확인", "warning", phoneInput);
            return false;
        }

        return true;
    }
</script>

</body>
</html>
