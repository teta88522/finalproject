<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/users/user.css}">
<title>로그인</title>
</head>

<body>

<h1>로그인</h1>

<div>
    <p>환영합니다.</p>
</div>

<form th:action="@{/login}" method="post">

    <div>
        <label for="loginId">아이디</label>
        <input type="text"
               id="loginId"
               name="loginId"
               placeholder="아이디를 입력하세요">
    </div>

    <div>
        <label for="password">비밀번호</label>
        <input type="password"
               id="password"
               name="password"
               placeholder="비밀번호를 입력하세요">
    </div>

    <div th:if="${param.error}">
        <p>아이디 또는 비밀번호가 일치하지 않습니다.</p>
    </div>

    <div th:if="${param.logout}">
        <p>로그아웃 되었습니다.</p>
    </div>

    <div>
        <button type="submit">로그인</button>
    </div>

    <div>
        <button type="button"
                th:onclick="|location.href='@{/join}'|">
            회원가입
        </button>

        <button type="button">
            아이디 찾기
        </button>

        <button type="button">
            비밀번호 찾기
        </button>
    </div>

</form>

</body>
</html>
