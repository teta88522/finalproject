<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>관리 프로젝트</title>

<link rel="stylesheet" th:href="@{/css/project/project.css}">
</head>
<body>
	<div layout:fragment="Content">
 
		<div class="project-container">
 
			<h2 style="font-weight: 700; margin-bottom: 8px; color: #111;">모듈
				설정</h2>
			<p style="color: #777; margin-bottom: 25px;">
				<strong th:text="${project.projectName}">프로젝트명</strong> 프로젝트에서
				사용할 모듈을 선택하거나 제거할 수 있습니다.
			</p>
 
			<!-- ✅ 처리 결과 메시지 -->
			<div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
 
			<!-- 사용 중인 모듈 -->
			<div class="card mb-4">
				<div class="card-header">
					<h5>사용 중인 모듈</h5>
				</div>
				<div class="card-body">
 
					<div th:if="${projectModuleList == null or #lists.isEmpty(projectModuleList)}"
						class="alert-secondary">현재 등록된 모듈이 없습니다.</div>
 
					<div th:each="pm : ${projectModuleList}" class="input-group mb-2">
						<div class="module-name"
							th:text="${moduleMap.get(pm.moduleCode)} ?: ${pm.moduleCode}">모듈명</div>
 
						<!-- ✅ 프로젝트 표준 패턴(js-pf-confirm-submit)으로 통일 - 폼마다 자동으로 확인창이 붙음 -->
						<form
							th:action="@{/project/{projectId}/settings/modules/delete(projectId=${projectId})}"
							method="post"
							class="inline-form js-pf-confirm-submit"
							data-confirm-title="모듈 제거"
							th:attr="data-confirm-message='&quot;' + (${moduleMap.get(pm.moduleCode)} ?: ${pm.moduleCode}) + '&quot; 모듈을 프로젝트에서 제거하시겠습니까?'"
							data-confirm-confirm-text="제거"
							data-confirm-icon="warning">
							<input type="hidden" name="moduleCode" th:value="${pm.moduleCode}">
							<button type="submit" class="btn btn-outline-secondary btn-sm">제거</button>
						</form>
					</div>
 
				</div>
			</div>
 
			<!-- 모듈 추가 -->
			<div class="card">
				<div class="card-header">
					<h5>모듈 추가</h5>
				</div>
				<div class="card-body">
 
					<form th:if="${availableModules != null and !#maps.isEmpty(availableModules)}"
						th:action="@{/project/{projectId}/settings/modules/add(projectId=${projectId})}"
						method="post" class="input-group">
						<select name="moduleCode" class="form-select" required>
							<option value="">추가할 모듈을 선택하세요</option>
							<option th:each="entry : ${availableModules}" th:value="${entry.key}"
								th:text="${entry.value}">모듈명</option>
						</select>
						<button type="submit" class="btn btn-primary">추가</button>
					</form>
 
					<div th:if="${availableModules == null or #maps.isEmpty(availableModules)}"
						class="alert-secondary">모든 모듈이 이미 등록되어 있습니다.</div>
 
				</div>
			</div>
 
			<div class="text-end mt-4">
				<a th:href="@{/projectdetail/{projectId}(projectId=${projectId})}"
					class="btn btn-outline-secondary">돌아가기</a>
			</div>

			<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
			<script th:src="@{/js/common/pf-confirm.js}"></script>

		</div>

	</div>
</body>
</html>
