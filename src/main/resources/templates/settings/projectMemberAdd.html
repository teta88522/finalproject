<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>프로젝트 구성원 추가</title>

<link rel="stylesheet" th:href="@{/css/settings/projectMemberAdd.css}">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/common/pf-confirm.js}"></script>
</head>

<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
    <div class="project-member-add-page">

        <div class="add-page-header">
            <div>
                <h1 class="add-page-title">설정 &gt; 구성원 추가</h1>
                <p class="add-page-sub-title">
                    프로젝트 생성자의 팀 구성원 중 프로젝트에 추가할 팀원을 선택합니다.
                </p>
            </div>

            <div class="add-project-info">
                <span>프로젝트</span>
                <strong th:text="${project.projectName}">프로젝트명</strong>
            </div>
        </div>

        <form th:action="@{/project/{projectId}/settings/members/add(projectId=${projectId})}"
              method="post"
              onsubmit="return validateMemberAddForm();">

            <!-- 역할 선택 -->
            <div class="add-section">
                <div class="section-title">역할 선택</div>
                <div class="section-sub-text">
                    추가할 구성원에게 부여할 역할을 선택하세요. 역할 없이도 등록할 수 있습니다.
                </div>

                <div class="role-select-row">
                    <label for="roleId">역할</label>
                    <select id="roleId" name="roleId">
                        <option value="">역할 없음</option>
                        <option th:each="role : ${projectRoleList}"
                                th:value="${role.roleId}"
                                th:text="${role.roleName}">
                            역할명
                        </option>
                    </select>
                </div>
            </div>

            <!-- 구성원 선택 -->


                <div class="section-header">
                    <div>
                        <div class="section-title">팀 구성원 목록</div>
                        <div class="section-sub-text">
                            이미 프로젝트에 참가 중인 팀원은 선택할 수 없습니다. 여러 명 선택 후 한 번에 저장할 수 있습니다.
                        </div>
                    </div>

                    <div class="section-count">
                        총
                        <strong th:text="${candidateList == null ? 0 : #lists.size(candidateList)}">0</strong>
                        명
                    </div>
                </div>

                <div class="candidate-table-wrap">
                    <table class="candidate-table">
                        <thead>
                            <tr>
                                <th class="check-col">
                                    <input type="checkbox"
                                           id="allCheck"
                                           onclick="toggleAllMembers(this)">
                                </th>
                                <th>상태</th>
                                <th>팀명</th>
                                <th>이름</th>
                                <th>로그인 ID</th>
                                <th>이메일</th>
                                <th>연락처</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:if="${candidateList == null or #lists.isEmpty(candidateList)}">
                                <td colspan="7" class="empty-row">
                                    조회된 팀 구성원이 없습니다.
                                </td>
                            </tr>

                            <tr th:each="member : ${candidateList}"
                                th:classappend="${member.joinedYn == 'Y'} ? ' already-joined-row' : ''">

                                <td class="check-col">
                                    <input type="checkbox"
                                           name="teamMemberIds"
                                           class="member-check"
                                           th:value="${member.teamMemberId}"
                                           th:disabled="${member.joinedYn == 'Y'}"
                                           onclick="syncAllCheckState()">
                                </td>

                                <td>
                                    <span th:if="${member.joinedYn == 'Y'}"
                                          class="join-badge joined">
                                        이미 참가중
                                    </span>

                                    <span th:if="${member.joinedYn != 'Y'}"
                                          class="join-badge available">
                                        추가 가능
                                    </span>
                                </td>

                                <td th:text="${member.teamName}">팀명</td>

                                <td th:text="${member.userName}">홍길동</td>

                                <td th:text="${member.loginId}">loginId</td>

                                <td th:text="${member.email}">email@test.com</td>

                                <td th:text="${member.phone != null ? member.phone : '-'}">
                                    010-0000-0000
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>



            <div class="form-btn-area">
                <a th:href="@{/project/{projectId}/settings/members(projectId=${projectId})}"
                   class="btn btn-custon-rounded-four custom-white-btn">
                    취소
                </a>

                <button type="submit" class="btn btn-custon-rounded-four custom-default-btn">
                    저장
                </button>
            </div>

        </form>

    </div>
   </div>
</div>
    <script th:inline="javascript">
        const message = /*[[${message}]]*/ null;

        if (message != null) {
            window.PFDialog.alert(message, {
                title: '알림',
                icon: 'info'
            });
        }

        function pfAlert(message, title, icon) {
            window.PFDialog.alert(message, {
                title: title || "알림",
                icon: icon || "warning"
            });
        }

        function toggleAllMembers(allCheck) {
            const checks = document.querySelectorAll('.member-check:not(:disabled)');

            checks.forEach(function (check) {
                check.checked = allCheck.checked;
            });
        }

        function syncAllCheckState() {
            const allCheck = document.getElementById("allCheck");
            const checks = document.querySelectorAll('.member-check:not(:disabled)');

            if (!allCheck) {
                return;
            }

            if (checks.length === 0) {
                allCheck.checked = false;
                return;
            }

            let checkedCount = 0;

            checks.forEach(function (check) {
                if (check.checked) {
                    checkedCount++;
                }
            });

            allCheck.checked = checkedCount === checks.length;
        }

        function validateMemberAddForm() {
            const checkedMembers = document.querySelectorAll('input[name="teamMemberIds"]:checked');

            if (checkedMembers.length === 0) {
                pfAlert("추가할 구성원을 선택하세요.", "구성원 선택 확인", "warning");
                return false;
            }

            return true;
        }
    </script>

</div>
</body>
</html>
