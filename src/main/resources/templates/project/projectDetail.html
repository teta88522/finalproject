<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>프로젝트 상세조회</title>
<link rel="stylesheet" th:href="@{/css/project/projectDetail.css}">
</head>

<body>
	<div layout:fragment="Content">
 <div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
   

			<!-- 왼쪽 컬럼: 프로젝트 정보 + 일감 추적 -->
			<div class="detail-left">

				<!-- 프로젝트 정보 -->

					<div class="section-body">
						<h1>프로젝트 정보</h1>
						<div class="info-card">
							<div class="info-card-header">
								<span class="project-name-badge"
									th:text="${project.projectName}">프로젝트명</span> <span
									class="status-badge"
									th:text="${project.statusName != null ? project.statusName : project.statusCode}">
									진행중 </span>
							</div>
							<p class="info-description"
								th:text="${project.description != null ? project.description : '설명이 없습니다.'}">
								프로젝트 설명</p>
							<ul class="info-meta-list">
								<li><span class="meta-icon">📅</span> <span
									class="meta-label">시작일</span> <span class="meta-value"
									th:text="${project.startDate != null ? #dates.format(project.startDate, 'yyyy-MM-dd') : '-'}">-</span>
								</li>
								<li><span class="meta-icon">🏁</span> <span
									class="meta-label">완료일</span> <span class="meta-value"
									th:text="${project.endDate != null ? #dates.format(project.endDate, 'yyyy-MM-dd') : '-'}">-</span>
								</li>
								<li><span class="meta-icon">👤</span> <span
									class="meta-label">PM</span> <span class="meta-value"
									th:text="${project.ownerName != null ? project.ownerName : '-'}">-</span>
								</li>
								<li
									th:if="${project.gitUrl != null and project.gitUrl != '' and project.gitUrl != 'none'}">
									<span class="meta-icon">🔗</span> <span class="meta-label">GitHub</span>
									<a class="meta-value meta-link" th:href="${project.gitUrl}"
									th:text="${project.gitUrl}" target="_blank">-</a>
								</li>
								<li
									th:if="${project.projectUrl != null and project.projectUrl != ''}">
									<span class="meta-icon">🌐</span> <span class="meta-label">사이트</span>
									<a class="meta-value meta-link" th:href="${project.projectUrl}"
									th:text="${project.projectUrl}" target="_blank">-</a>
								</li>
							</ul>
						</div>
					</div>


				<!-- 일감 추적 -->

					<div class="section-body">
						<h2 class="section-title">일감 추적</h2>
						<div class="table-wrap">
							<table class="tracker-table">
								<thead>
									<tr>
										<th>유형</th>
										<th>진행 중</th>
										<th>완료됨</th>
										<th>합계</th>
									</tr>
								</thead>
								<tbody>
									<!-- 일감 데이터가 있을 때 -->
									<th:block
										th:if="${issueStatList != null and !#lists.isEmpty(issueStatList)}">
										<tr th:each="stat : ${issueStatList}" class="tracker-row"
											th:data-project-id="${projectId}"
											th:data-issue-type-code="${stat.issueTypeCode}"
											th:onclick="'goToIssueList(this)'"
											onmouseover="this.style.backgroundColor='#f0f0f0'"
											onmouseout="this.style.backgroundColor='white'">
											<td th:text="${stat.typeName}">-</td>
											<td class="count-cell" th:text="${stat.inProgressCount}">0</td>
											<td class="count-cell" th:text="${stat.doneCount}">0</td>
											<td class="count-cell" th:text="${stat.totalCount}">0</td>
										</tr>
									</th:block>
									<!-- 일감 데이터가 없을 때: 분류별 빈 행 -->
									<th:block
										th:if="${issueStatList == null or #lists.isEmpty(issueStatList)}">
										<tr>
											<td colspan="4" class="tracker-empty">등록된 일감 유형이 없습니다.</td>
										</tr>
									</th:block>
								</tbody>
							</table>

					</div>
				</div>

			</div>
		</div>
</div>
		<script th:inline="javascript">
			/**
			 * 일감 목록 페이지로 이동
			 * 해당 유형의 일감을 필터링하여 표시
			 */
			function goToIssueList(row) {
				const projectId = row.dataset.projectId;
				const issueTypeCode = row.dataset.issueTypeCode;

				if (!projectId || !issueTypeCode) {
					console.error('필수 데이터가 없습니다.');
					return;
				}

				// 일감 목록 페이지로 이동 (유형별 필터링)
				// ✅ 실제 컨트롤러 매핑은 '/project/{projectId}/issues' (복수형)이고,
				//    검색 파라미터도 IssuesVO의 issueTypeIdList를 사용해야 함.
				//    기존엔 '/issue?typeCode=...'로 되어 있어 404가 발생했음.
				location.href = '/project/' + encodeURIComponent(projectId)
						+ '/issues?issueTypeIdList=' + encodeURIComponent(issueTypeCode);
			}
		</script>

	</div>
</body>
</html>
