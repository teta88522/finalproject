<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>프로젝트 전체조회</title>

<link rel="stylesheet" th:href="@{/css/project/projectList.css}">
<link rel="stylesheet" th:href="@{/css/common-fliter.css}">
</head>

<body>
	<div layout:fragment="Content">

		<div class="project-list-page" th:data-subscribe-yn="${subscribeYn}">

			<!-- 상단 제목 -->
			<div class="project-page-header">
				<div>
					<h1 class="project-page-title">프로젝트</h1>
					<p class="project-page-sub-title">프로젝트 목록을 조회하고 조건별로 검색할 수
						있습니다.</p>
				</div>
			</div>

			<!-- 검색 조건 영역 -->
			<div class="search-section project-search-class">
				<div class="search-header">
					<div class="search-title">검색조건</div>

					<!-- 관리자만 생성/관리 버튼 노출 -->
					<div class="search-action-area" th:if="${subscribeYn == 'Y'}">
						<a th:href="@{/project/register}" class="search-action-btn">
							프로젝트 생성 </a> <a th:href="@{/project/manage}"
							class="search-action-btn manage"> 프로젝트 관리 </a>
					</div>
				</div>

				<form th:action="@{/project}" method="get">
					<div class="search-form-row">

						<!-- 프로젝트 명 검색 -->
						<div class="search-field">
							<label for="projectName">프로젝트 명</label> <input type="text"
								id="projectName" name="projectName"
								th:value="${projectSearchVO != null ? projectSearchVO.projectName : ''}"
								placeholder="input">
						</div>

						<!-- 생성자 검색 -->
						<div class="search-field">
							<label for="ownerName">생성자</label> <input type="text"
								id="ownerName" name="ownerName"
								th:value="${projectSearchVO != null ? projectSearchVO.ownerName : ''}"
								placeholder="input">
						</div>

						<!-- 시작일 검색 -->
						<div class="search-field">
							<label for="startDate">시작일</label> <input type="date"
								id="startDate" name="startDate"
								th:value="${projectSearchVO != null and projectSearchVO.startDate != null ? #dates.format(projectSearchVO.startDate, 'yyyy-MM-dd') : ''}">
						</div>

						<!-- 완료일 검색 -->
						<div class="search-field">
							<label for="endDate">완료일</label> <input type="date" id="endDate"
								name="endDate"
								th:value="${projectSearchVO != null and projectSearchVO.endDate != null ? #dates.format(projectSearchVO.endDate, 'yyyy-MM-dd') : ''}">
						</div>

						<!-- 프로젝트 상태 검색 -->
						<div class="search-field">
							<label for="statusCode">프로젝트 상태</label> <select id="statusCode"
								name="statusCode">
								<option value="">선택</option>

								<option value="a001"
									th:selected="${projectSearchVO != null and projectSearchVO.statusCode == 'a001'}">
									예정</option>

								<option value="a002"
									th:selected="${projectSearchVO != null and projectSearchVO.statusCode == 'a002'}">
									진행중</option>

								<option value="a003"
									th:selected="${projectSearchVO != null and projectSearchVO.statusCode == 'a003'}">
									종료</option>
							</select>
						</div>

					</div>

					<div class="search-btn-area">
						<!-- clean은 검색 파라미터 제거용 -->
						<a th:href="@{/project}" class="btn-basic">clean</a>

						<!-- apply는 GET submit -->
						<button type="submit" class="btn-basic btn-primary">apply</button>
					</div>
				</form>
			</div>

			<!-- 프로젝트 목록 영역 -->
			<div class="project-list-section">

				<div class="list-header">
					<div>
						<div class="list-title">프로젝트 목록</div>

						<div class="list-sub-text" th:if="${subscribeYn == 'Y'}">
							관리자는 본인이 생성한 프로젝트 목록을 조회합니다.</div>

						<div class="list-sub-text" th:if="${subscribeYn != 'Y'}">일반
							이용자는 본인이 소속된 프로젝트 목록을 조회합니다.</div>
					</div>

					<div class="list-count">
						총 <strong
							th:text="${projectList == null ? 0 : #lists.size(projectList)}">0</strong>
						건
					</div>
				</div>

				<div class="project-table-wrap">
					<table class="project-table">
						<thead>
							<tr>
								<th>식별자</th>
								<th>프로젝트 명</th>
								<th>설명</th>
								<th>생성자</th>
								<th>홈페이지</th>
								<th>상태</th>
								<th>시작일</th>
								<th>완료일</th>
								<th th:if="${subscribeYn == 'Y'}">관리</th>
							</tr>
						</thead>

						<tbody>
							<!-- 데이터 없음 -->
							<tr th:if="${projectList == null or #lists.isEmpty(projectList)}">
								<td th:colspan="${subscribeYn == 'Y' ? 9 : 8}" class="empty-row">
									조회된 프로젝트가 없습니다.</td>
							</tr>

							<!-- 프로젝트 목록 -->
							<tr th:each="project : ${projectList}"
								th:data-project-id="${project.projectId}"
								onclick="goProjectDetail(this)">

								<td th:text="${project.identifier}">identifier</td>

								<td class="project-name-cell"><span
									th:text="${project.projectName}"> 프로젝트명 </span></td>

								<td class="desc-cell" th:text="${project.description}">
									프로젝트 설명</td>

								<td th:text="${project.ownerName}">생성자</td>

								<td onclick="event.stopPropagation();"><a
									th:if="${project.projectUrl != null and project.projectUrl != ''}"
									th:href="${project.projectUrl}" target="_blank"
									th:text="${project.projectUrl}"> 홈페이지 </a> <span
									th:if="${project.projectUrl == null or project.projectUrl == ''}">
										- </span></td>

								<td><span class="status-badge"
									th:text="${project.statusName != null ? project.statusName : project.statusCode}">
										진행중 </span></td>

								<td
									th:text="${project.startDate != null ? #dates.format(project.startDate, 'yyyy/MM/dd') : '-'}">
									2026/06/01</td>

								<td
									th:text="${project.endDate != null ? #dates.format(project.endDate, 'yyyy/MM/dd') : '-'}">
									2026/12/31</td>

								<!-- 관리자만 수정 / 삭제 버튼 노출 -->
								<td th:if="${subscribeYn == 'Y'}" class="project-action-cell"
									onclick="event.stopPropagation();">

									<button type="button" class="mini-btn"
										th:data-project-id="${project.projectId}"
										onclick="goProjectEdit(this)">수정</button>

									<button type="button" class="mini-btn delete"
										th:data-project-id="${project.projectId}"
										th:data-project-name="${project.projectName}"
										onclick="deleteProject(this)">삭제</button>

								</td>
							</tr>
						</tbody>
					</table>
				</div>

				<!-- 페이징 영역 : 일단 화면만 -->
				<div class="pagination">
					<button type="button" class="page-btn">&lt;</button>
					<button type="button" class="page-btn active">1</button>
					<button type="button" class="page-btn">2</button>
					<button type="button" class="page-btn">3</button>
					<span class="page-dots">...</span>
					<button type="button" class="page-btn">&gt;</button>
				</div>

			</div>

		</div>

		<script>
			function goProjectDetail(row) {
				const projectId = row.dataset.projectId;

				if (!projectId) {
					return;
				}

				location.href = "/projectdetail/" + encodeURIComponent(projectId);
			}

			function goProjectEdit(button) {
				const projectId = button.dataset.projectId;

				if (!projectId) {
					return;
				}

				location.href = "/project/update/"
						+ encodeURIComponent(projectId);
			}

			function deleteProject(button) {
				const projectId = button.dataset.projectId;
				const projectName = button.dataset.projectName;

				if (!projectId) {
					return;
				}

				if (!confirm("'" + projectName + "' 프로젝트를 삭제하시겠습니까?")) {
					return;
				}

				console.log("삭제 대상 projectId =", projectId);
			}
		</script>

	</div>
</body>
</html>
