<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>프로젝트 전체조회</title>

<link rel="stylesheet" th:href="@{/css/project/projectList.css}">
<link rel="stylesheet" th:href="@{/css/common-filter.css}">
</head>

<body>
	<div layout:fragment="Content">

		<div class="project-list-page" th:data-subscribe-yn="${subscribeYn}">

			<!-- 상단 제목 -->
			<div class="project-page-header">
				<div>
					<h1 class="project-page-title">프로젝트</h1>
					<p class="project-page-sub-title">프로젝트 목록을 조회하고 조건별로 검색할 수
						있습니다.</p>
				</div>
			</div>

			<!-- 검색 조건 영역 -->
			<div class="search-section project-search-class">
				<div class="search-header">
					<div class="search-title">검색조건</div>
					<div class="search-action-area" th:if="${subscribeYn == 'Y'}">
						<a th:href="@{/myproject/register}" class="search-action-btn">프로젝트
							생성</a>
					</div>
				</div>

				<form id="searchForm" th:action="@{/myproject/list}" method="get">
					<div class="search-form-row">

						<!-- 프로젝트 명 -->
						<div class="search-field">
							<label for="searchProjectName">프로젝트 명</label> <input type="text"
								id="searchProjectName" name="searchProjectName"
								th:value="${searchVO != null ? searchVO.searchProjectName : ''}"
								placeholder="프로젝트 명을 입력해주세요.">
						</div>

						<!-- 생성자 -->
						<div class="search-field">
							<label for="searchOwnerName">생성자</label> <input type="text"
								id="searchOwnerName" name="searchOwnerName"
								th:value="${searchVO != null ? searchVO.searchOwnerName : ''}"
								placeholder="생성자 명을 입력해주세요.">
						</div>

						<!-- ✅ 프로젝트 상태 - 다중선택 (체크박스) -->
						<div class="search-field">
							<label>프로젝트 상태</label>
							<details class="filter-dropdown" id="statusDropdown">
								<summary>
									<span class="filter-selected-text">전체</span>
								</summary>
								<div class="filter-dropdown-panel">
									<label class="filter-check-item"> <input
										type="checkbox" name="searchStatusCode" value="a001"
										th:checked="${searchVO != null and searchVO.searchStatusCode != null and searchVO.searchStatusCode.contains('a001')}">
										<span>예정</span>
									</label> <label class="filter-check-item"> <input
										type="checkbox" name="searchStatusCode" value="a002"
										th:checked="${searchVO != null and searchVO.searchStatusCode != null and searchVO.searchStatusCode.contains('a002')}">
										<span>진행중</span>
									</label> <label class="filter-check-item"> <input
										type="checkbox" name="searchStatusCode" value="a003"
										th:checked="${searchVO != null and searchVO.searchStatusCode != null and searchVO.searchStatusCode.contains('a003')}">
										<span>종료</span>
									</label>
								</div>
							</details>
						</div>

					</div>

					<div class="search-btn-area">
						<a th:href="@{/myproject/list}" class="btn-basic">초기화</a>
						<button type="button" class="btn-basic btn-primary"
							onclick="submitSearch()">검색</button>
					</div>
				</form>
			</div>

			<!-- 프로젝트 목록 영역 -->
			<div class="project-list-section">
				<div class="list-header">
					<div>
						<div class="list-title">프로젝트 목록</div>
						<div class="list-sub-text" th:if="${subscribeYn == 'Y'}">관리자는
							본인이 생성한 프로젝트 목록을 조회합니다.</div>
						<div class="list-sub-text" th:if="${subscribeYn != 'Y'}">일반
							이용자는 본인이 소속된 프로젝트 목록을 조회합니다.</div>
					</div>
					<div class="list-count">
						총 <strong th:text="${searchVO != null ? searchVO.totalCount : 0}">0</strong>
						건
					</div>
				</div>

				<div class="project-table-wrap">
					<table class="project-table">
						<thead>
							<tr>
								<!-- ✅ 수정: subscribe_yn이 Y일 때만 식별자 열 표시 -->
								<th th:if="${subscribeYn == 'Y'}">식별자</th>
								<th>프로젝트 명</th>
								<th>설명</th>
								<th>생성자</th>
								<th>홈페이지</th>
								<th>상태</th>
								<th>시작일</th>
								<th>완료일</th>
								<th th:if="${subscribeYn == 'Y'}">관리</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${projectList == null or #lists.isEmpty(projectList)}">
								<td th:colspan="${subscribeYn == 'Y' ? 9 : 7}" class="empty-row">조회된
									프로젝트가 없습니다.</td>
							</tr>
							<tr th:each="project : ${projectList}"
								th:data-project-id="${project.projectId}"
								onclick="goProjectDetail(this)">
								<!-- ✅ 수정: subscribe_yn이 Y일 때만 식별자 표시 -->
								<td th:if="${subscribeYn == 'Y'}"
									th:text="${project.identifier}">identifier</td>
								<td class="project-name-cell"><span
									th:text="${project.projectName}">프로젝트명</span></td>
								<td class="desc-cell" th:text="${project.description}">프로젝트
									설명</td>
								<td th:text="${project.ownerName}">생성자</td>
								<td onclick="event.stopPropagation();"><a
									th:if="${project.projectUrl != null and project.projectUrl != ''}"
									th:href="${project.projectUrl}" target="_blank"
									th:text="${project.projectUrl}">홈페이지</a> <span
									th:if="${project.projectUrl == null or project.projectUrl == ''}">-</span>
								</td>
								<td><span class="status-badge"
									th:text="${project.statusName != null ? project.statusName : project.statusCode}">진행중</span></td>
								<td
									th:text="${project.startDate != null ? #dates.format(project.startDate, 'yyyy/MM/dd') : '-'}">2026/06/01</td>
								<td
									th:text="${project.endDate != null ? #dates.format(project.endDate, 'yyyy/MM/dd') : '-'}">2026/12/31</td>
								<td th:if="${subscribeYn == 'Y'}" class="project-action-cell"
									onclick="event.stopPropagation();"><a class="mini-btn"
									th:href="@{/myproject/update(projectId=${project.projectId})}">수정</a>
									<button type="button" class="mini-btn delete"
										th:data-project-id="${project.projectId}"
										th:data-project-name="${project.projectName}"
										onclick="deleteProject(this)">삭제</button></td>
							</tr>
						</tbody>
					</table>
				</div>

				<!-- 페이징 영역 -->
				<div class="pagination"
					th:if="${searchVO != null and searchVO.totalPage > 0}">
					<button type="button" class="page-btn"
						th:classappend="${!searchVO.hasPrevious} ? ' disabled'"
						th:disabled="${!searchVO.hasPrevious}"
						th:onclick="${searchVO.hasPrevious} ? 'goPage(' + (searchVO.page - 1) + ')' : 'return false'">&lt;</button>

					<th:block
						th:each="pageNum : ${#numbers.sequence(1, searchVO.totalPage)}">
						<button type="button" class="page-btn"
							th:classappend="${pageNum == searchVO.page} ? ' active'"
							th:onclick="'goPage(' + ${pageNum} + ')'">
							<span th:text="${pageNum}">1</span>
						</button>
					</th:block>

					<button type="button" class="page-btn"
						th:classappend="${!searchVO.hasNext} ? ' disabled'"
						th:disabled="${!searchVO.hasNext}"
						th:onclick="${searchVO.hasNext} ? 'goPage(' + (searchVO.page + 1) + ')' : 'return false'">&gt;</button>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
		/* 드롭다운 외부 클릭 시 닫기 */
		document.addEventListener('click', function(e) {
			document.querySelectorAll('details.filter-dropdown').forEach(function(d) {
				if (!d.contains(e.target)) d.removeAttribute('open');
			});
		});
 
		/* ✅ 체크박스 선택 시 summary 텍스트 업데이트 */
		document.querySelectorAll('details.filter-dropdown').forEach(function(dropdown) {
			const summary = dropdown.querySelector('.filter-selected-text');
			const checkboxes = dropdown.querySelectorAll('input[type="checkbox"]');
 
			function updateSummary() {
				const checked = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.nextElementSibling.textContent);
				summary.textContent = checked.length > 0 ? checked.join(', ') : '전체';
			}
 
			checkboxes.forEach(cb => cb.addEventListener('change', updateSummary));
			updateSummary(); // 초기 렌더링 시 적용
		});
 
		function goPage(page) {
			const form = document.getElementById('searchForm');
			let pageInput = form.querySelector('input[name="page"]');
			if (!pageInput) {
				pageInput = document.createElement('input');
				pageInput.type = 'hidden';
				pageInput.name = 'page';
				form.appendChild(pageInput);
			}
			pageInput.value = page;
			form.submit();
		}
 
		function submitSearch() {
			const projectName = document.getElementById('searchProjectName').value.trim();
			const ownerName = document.getElementById('searchOwnerName').value.trim();
			const statusChecked = document.querySelectorAll('input[name="searchStatusCode"]:checked').length > 0;
 
			if (!projectName && !ownerName && !statusChecked) {
				alert('검색 조건을 하나 이상 입력하거나 선택해 주세요.\n(프로젝트명, 생성자 입력 또는 상태 중 하나를 선택하세요.)');
				return;
			}
			
			// ✅ 다중선택된 status 값들을 쉼표로 구분하여 전송
			let form = document.getElementById('searchForm');
			
			// 기존 hidden input 제거
			let oldStatusInputs = form.querySelectorAll('input[name="searchStatusCode"][type="hidden"]');
			oldStatusInputs.forEach(input => input.remove());
			
			// 선택된 checkbox 값들을 hidden input으로 변환
			let checkedBoxes = Array.from(document.querySelectorAll('input[name="searchStatusCode"]:checked'));
			let statusValues = checkedBoxes.map(cb => cb.value).join(',');
			
			// status 값을 hidden input으로 추가
			if (statusValues) {
				let hiddenInput = document.createElement('input');
				hiddenInput.type = 'hidden';
				hiddenInput.name = 'searchStatusCode';
				hiddenInput.value = statusValues;
				form.appendChild(hiddenInput);
			}

			// ✅ 원본 체크박스가 같이 제출되면 searchStatusCode 값이 중복/뒤섞여서 전송되던 문제 수정.
			//    콤마로 합친 hidden input만 보내지도록 원본 체크박스는 제출에서 제외.
			checkedBoxes.forEach(cb => cb.disabled = true);
			
			let pageInput = form.querySelector('input[name="page"]');
			if (!pageInput) {
				pageInput = document.createElement('input');
				pageInput.type = 'hidden';
				pageInput.name = 'page';
				form.appendChild(pageInput);
			}
			pageInput.value = 1;
			form.submit();
		}
 
		function goProjectDetail(row) {
			const projectId = row.dataset.projectId;
			if (!projectId) return;
			location.href = '/projectdetail/' + encodeURIComponent(projectId);
		}
 
		function deleteProject(button){
			const projectId = button.dataset.projectId;
			const projectName = button.dataset.projectName;
			if (!projectId) return;
			
			if (confirm("'" + projectName + "' 프로젝트를 삭제하시겠습니까?")){
				const form = document.createElement('form');
				form.method = "POST";
				form.action = '/myproject/delete';
				
				const input = document.createElement('input');
				input.type = 'hidden';
				input.name = 'projectId';
				input.value = projectId;
				
				form.appendChild(input);
				document.body.appendChild(form);
				form.submit();
			}
		}
	</script>

	</div>
</body>
</html>
