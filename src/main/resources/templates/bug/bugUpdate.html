<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>버그 수정</title>
<link rel="stylesheet" th:href="@{/css/bug/bugUpdate.css}">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/common/pf-confirm.js}"></script>
</head>

<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
    <div class="bug-update-page">

        <div class="page-header">
            <div>
                <h2>버그 수정</h2>
                <p>등록된 버그 정보를 수정합니다.</p>
            </div>

            <a class="btn btn-custon-rounded-four custom-default-btn"
               th:href="@{/project/{projectId}/bugs(projectId=${projectId})}">
                목록
            </a>
        </div>

        <div th:if="${message != null}" class="alert-box"
             th:text="${message}">
            메시지
        </div>

        <form class="bug-form js-pf-confirm-submit"
              th:action="@{/project/{projectId}/bugs/update(projectId=${projectId})}"
              method="post"
              enctype="multipart/form-data"
              th:object="${bugVO}"
              data-confirm-title="수정 확인"
              data-confirm-message="버그 정보를 수정하시겠습니까?"
              data-confirm-confirm-text="수정"
              data-confirm-icon="question">

            <input type="hidden" th:field="*{bugId}">
            <input type="hidden" th:field="*{executionId}">
            <input type="hidden" th:field="*{reporterId}">
            <input type="hidden" th:field="*{versionId}">
            <input type="hidden" th:field="*{assigneeId}">

            <section class="form-card">
                <div class="card-title">
                    <h3>기본정보</h3>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>버그 제목 <span>*</span></label>
                        <input type="text"
                               th:field="*{title}"
                               maxlength="255"
                               placeholder="버그 제목을 입력하세요"
                               required>
                    </div>

                    <div class="form-group">
                        <label>발견 버전 <span>*</span></label>
                        <input type="text"
                               th:field="*{foundVersion}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>버그 유형 <span>*</span></label>
                        <select th:field="*{bugTypeCode}" required>
                            <option value="">선택</option>
                            <option value="d001">기능</option>
                            <option value="d002">UI/UX</option>
                            <option value="d003">성능</option>
                            <option value="d004">보안</option>
                            <option value="d005">데이터</option>
                            <option value="d006">기타</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>심각도 <span>*</span></label>
                        <select th:field="*{severityCode}" required>
                            <option value="">선택</option>
                            <option value="q001">심각</option>
                            <option value="q002">높음</option>
                            <option value="q003">보통</option>
                            <option value="q004">낮음</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>우선순위 <span>*</span></label>
                        <select th:field="*{priorityCode}" required>
                            <option value="">선택</option>
                            <option value="c001">상</option>
                            <option value="c002">중</option>
                            <option value="c003">하</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>버그 상태 <span>*</span></label>
                        <select th:field="*{bugStatusCode}" required>
                            <option value="">선택</option>
                            <option value="p001">진행중</option>
                            <option value="p002">해결</option>
                            <option value="p003">보류</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>담당자명</label>
                        <input type="text"
                               th:value="${bugVO.assigneeName != null and bugVO.assigneeName != '' ? bugVO.assigneeName : '-'}"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label>발견자</label>
                        <input type="text"
                               th:value="${bugVO.reporterName != null and bugVO.reporterName != '' ? bugVO.reporterName : bugVO.reporterId}"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label>발생일자 <span>*</span></label>
                        <input type="date"
                               th:field="*{occurredAtText}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>프로젝트명</label>
                        <input type="text"
                               th:value="${bugVO.projectName}"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label>테스트명</label>
                        <input type="text"
                               th:value="${bugVO.testName}"
                               readonly>
                    </div>

                    <div class="form-group full">
                        <label>발견 환경</label>
                        <input type="text"
                               th:field="*{testEnv}"
                               maxlength="255"
                               placeholder="예: Chrome, Windows, 테스트 서버">
                    </div>

                </div>
            </section>

            <section class="form-card detail-card">
                <div class="card-title">
                    <h3>상세정보</h3>
                </div>

                <div class="detail-grid">

                    <div class="detail-row">
                        <label>버그 설명</label>
                        <textarea th:field="*{description}"
                                  maxlength="255"
                                  placeholder="발생한 버그에 대한 상세한 설명을 입력하세요."></textarea>
                    </div>

                    <div class="detail-row">
                        <label>실제 결과</label>
                        <textarea th:field="*{actualResult}"
                                  maxlength="255"
                                  placeholder="실제 발생한 결과를 입력하세요."></textarea>
                    </div>

                    <div class="detail-row">
                        <label>재현 절차</label>
                        <textarea th:field="*{reproduceStep}"
                                  maxlength="255"
                                  placeholder="재현했던 절차를 입력하세요."></textarea>
                    </div>

                    <div class="detail-row full">
                        <label>예상 결과</label>
                        <textarea th:field="*{expectedResult}"
                                  maxlength="255"
                                  placeholder="정상적으로 동작했을 때의 기대 결과를 입력하세요."></textarea>
                    </div>

                    <div class="detail-row full file-row">
                        <label>기존 파일</label>

                        <div class="file-box">

                            <div th:if="${fileList == null or #lists.isEmpty(fileList)}"
                                 class="file-guide empty-file-guide">
                                등록된 첨부파일이 없습니다.
                            </div>

                            <div th:if="${fileList != null and !#lists.isEmpty(fileList)}"
                                 class="file-list-box">

                                <div class="file-list-head">
                                    <span class="file-count"
                                          th:text="${#lists.size(fileList)} + '개 파일'">
                                        0개 파일
                                    </span>

                                    <a class="btn small"
                                       th:href="@{/project/{projectId}/bugs/{bugId}/files/download-all(projectId=${projectId}, bugId=${bugVO.bugId})}">
                                        전체 다운로드
                                    </a>
                                </div>

                                <div th:each="file : ${fileList}" class="file-item">
                                    <a class="file-name"
                                       th:href="@{/project/{projectId}/bugs/files/{fileId}/download(projectId=${projectId}, fileId=${file.fileId})}"
                                       th:text="${file.originalName}">
                                        첨부파일명
                                    </a>

                                    <a class="btn small"
                                       th:href="@{/project/{projectId}/bugs/files/{fileId}/download(projectId=${projectId}, fileId=${file.fileId})}">
                                        다운로드
                                    </a>
                                </div>

                            </div>

                        </div>
                    </div>

                    <div class="detail-row full file-row">
                        <label for="attachFiles">파일 추가</label>

                        <div class="file-box">
                            <input type="file"
                                   id="attachFiles"
                                   name="files"
                                   multiple>

                            <div class="file-guide">
                                새 파일을 추가로 첨부합니다. 파일은 1개당 최대 <strong>100MB</strong>까지 가능합니다.
                                기존 첨부파일은 유지됩니다.
                            </div>

                            <div id="selectedFileList" class="selected-file-list">
                                <div class="selected-file-empty">선택된 파일이 없습니다.</div>
                            </div>
                        </div>
                    </div>

                </div>
            </section>

            <div class="form-actions">
                <a class="btn btn-custon-rounded-four custom-white-btn"
                   th:href="@{/project/{projectId}/bugs(projectId=${projectId})}">
                    취소
                </a>

                <button type="submit" class="btn btn-custon-rounded-four custom-default-btn">
                    수정
                </button>
            </div>

        </form>

    </div>
</div>
</div>

    <script th:inline="javascript">
        const message = /*[[${message}]]*/ null;

        if (message != null) {
            window.PFDialog.alert(message, {
                title: '알림',
                icon: 'info'
            });
        }

        const attachFiles = document.getElementById("attachFiles");
        const selectedFileList = document.getElementById("selectedFileList");
        const maxFileSize = 100 * 1024 * 1024;

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return "";
            }

            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatFileSize(size) {
            if (size === 0) {
                return "0 B";
            }

            const unitList = ["B", "KB", "MB", "GB"];
            const unitIndex = Math.floor(Math.log(size) / Math.log(1024));
            const fixedSize = size / Math.pow(1024, unitIndex);

            return fixedSize.toFixed(unitIndex === 0 ? 0 : 1) + " " + unitList[unitIndex];
        }

        function clearSelectedFileList() {
            if (selectedFileList) {
                selectedFileList.innerHTML =
                    "<div class='selected-file-empty'>선택된 파일이 없습니다.</div>";
            }
        }

        function renderSelectedFileList(files) {
            if (!selectedFileList) {
                return;
            }

            selectedFileList.innerHTML = "";

            if (files.length === 0) {
                clearSelectedFileList();
                return;
            }

            files.forEach(function (file) {
                const fileItem = document.createElement("div");
                fileItem.className = "selected-file-item";

                fileItem.innerHTML =
                    "<span class='selected-file-name'>" + escapeHtml(file.name) + "</span>" +
                    "<span class='selected-file-size'>" + formatFileSize(file.size) + "</span>";

                selectedFileList.appendChild(fileItem);
            });
        }

        if (attachFiles) {
            attachFiles.addEventListener("change", function () {
                const files = Array.from(attachFiles.files);

                for (const file of files) {
                    if (file.size > maxFileSize) {
                        window.PFDialog.alert("파일은 1개당 최대 100MB까지만 업로드할 수 있습니다.", {
                            title: "파일 용량 초과",
                            icon: "warning"
                        });

                        attachFiles.value = "";
                        clearSelectedFileList();
                        return;
                    }
                }

                renderSelectedFileList(files);
            });
        }
    </script>

</div>
</body>
</html>
