<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">

<head>
    <meta charset="UTF-8">
    <title>코드값 관리</title>

    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/common-filter.css}">
    <link rel="stylesheet" th:href="@{/css/codevalue/codevalue.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="codevalue-page">
        <div class="container-fluid">

            <div class="codevalue-header">
                <div>
                    <h1>코드값 관리</h1>
                    <p>
                        프로젝트에서 사용하는 작업분류, 일감 우선순위, 문서유형 코드값을 그룹별로 관리합니다.
                        기본값은 각 그룹마다 하나만 설정할 수 있습니다.
                    </p>
                </div>
            </div>

            <div class="search-section codevalue-search">
                <div class="search-header">
                    <div class="search-title">검색조건</div>
                </div>

                <form th:action="@{/codevalue/list}" method="get">
                    <div class="search-form-row">

                        <div class="search-field">
                            <label>그룹</label>
                            <details class="filter-dropdown" data-placeholder="전체">
                                <summary><span class="filter-selected-text" th:text="${selectedGroupNameText}">전체</span></summary>
                                <div class="filter-check-list filter-dropdown-panel">
                                    <label class="filter-check-item">
                                        <input type="checkbox" name="settingGroupNameList" value="g001"
                                               th:checked="${searchVO != null and searchVO.settingGroupNameList != null and #lists.contains(searchVO.settingGroupNameList, 'g001')}">
                                        <span>작업분류</span>
                                    </label>
                                    <label class="filter-check-item">
                                        <input type="checkbox" name="settingGroupNameList" value="g002"
                                               th:checked="${searchVO != null and searchVO.settingGroupNameList != null and #lists.contains(searchVO.settingGroupNameList, 'g002')}">
                                        <span>일감 우선순위</span>
                                    </label>
                                    <label class="filter-check-item">
                                        <input type="checkbox" name="settingGroupNameList" value="g003"
                                               th:checked="${searchVO != null and searchVO.settingGroupNameList != null and #lists.contains(searchVO.settingGroupNameList, 'g003')}">
                                        <span>문서유형</span>
                                    </label>
                                </div>
                            </details>
                        </div>

                        <div class="search-field">
                            <label for="settingName">코드값명</label>
                            <input type="text"
                                   id="settingName"
                                   name="settingName"
                                   th:value="${searchVO != null ? searchVO.settingName : ''}"
                                   placeholder="input">
                        </div>

                        <div class="search-field">
                            <label>기본값 여부</label>
                            <details class="filter-dropdown" data-placeholder="전체">
                                <summary><span class="filter-selected-text" th:text="${selectedDefaultYnText}">전체</span></summary>
                                <div class="filter-check-list filter-dropdown-panel">
                                    <label class="filter-check-item">
                                        <input type="checkbox" name="defaultYnList" value="Y"
                                               th:checked="${searchVO != null and searchVO.defaultYnList != null and #lists.contains(searchVO.defaultYnList, 'Y')}">
                                        <span>기본값</span>
                                    </label>
                                    <label class="filter-check-item">
                                        <input type="checkbox" name="defaultYnList" value="N"
                                               th:checked="${searchVO != null and searchVO.defaultYnList != null and #lists.contains(searchVO.defaultYnList, 'N')}">
                                        <span>일반값</span>
                                    </label>
                                </div>
                            </details>
                        </div>

                    </div>

                    <div class="search-btn-area">
                        <a th:href="@{/codevalue/list}"
                           class="btn btn-custon-rounded-four btn-default filter-btn">
                            초기화
                        </a>

                        <button type="submit"
                                class="btn btn-custon-rounded-four btn-primary filter-btn">
                            검색
                        </button>
                    </div>
                </form>
            </div>

            <div th:if="${message}"
                 class="page-message page-message-success"
                 th:text="${message}">
            </div>

            <div th:if="${errorMessage}"
                 class="page-message page-message-error"
                 th:text="${errorMessage}">
            </div>

            <div class="codevalue-grid">

                <div class="codevalue-card"
                     th:each="entry : ${codeValueGroupMap}"
                     th:classappend="${searchVO != null and ((searchVO.settingGroupNameList != null and #lists.contains(searchVO.settingGroupNameList, entry.key)) or searchVO.settingGroupName == entry.key)} ? ' is-selected' : ''">

                    <div class="codevalue-card-header">
                        <div class="codevalue-title-wrap">
                            <h2 th:text="${groupNameMap.get(entry.key)}">그룹명</h2>
                            <span>
                                등록된 코드값
                                <strong th:text="${#lists.size(entry.value)}">0</strong>
                                개
                            </span>
                        </div>

                        <a th:href="@{/codevalue/create(settingGroupName=${entry.key})}"
                           class="btn btn-custon-rounded-four btn-primary codevalue-add-btn">
                            + 새 코드값
                        </a>
                    </div>

                    <div class="codevalue-table-scroll">
                        <table class="table table-hover codevalue-table">
                            <thead>
                            <tr>
                                <th class="codevalue-order">순서</th>
                                <th>이름</th>
                                <th style="width: 85px;">기본값</th>
                                <th style="width: 170px; text-align: center;">관리</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:if="${#lists.isEmpty(entry.value)}">
                                <td colspan="4" class="codevalue-empty">
                                    등록된 코드값이 없습니다.
                                </td>
                            </tr>

                            <tr th:each="codeValue, stat : ${entry.value}">
                                <td class="codevalue-order" th:text="${stat.count}">1</td>

                                <td>
                                    <span class="codevalue-name"
                                          th:text="${codeValue.settingName}"
                                          th:title="${codeValue.settingName}">
                                        코드값명
                                    </span>
                                </td>

                                <td>
                                    <span th:if="${codeValue.defaultYn == 'Y'}"
                                          class="codevalue-badge-default">
                                        기본
                                    </span>

                                    <span th:unless="${codeValue.defaultYn == 'Y'}"
                                          class="codevalue-badge-none">
                                        -
                                    </span>
                                </td>

                                <td>
                                    <div class="table-actions codevalue-actions">

                                        <form th:if="${codeValue.defaultYn != 'Y'}"
                                              th:action="@{/codevalue/default/set}"
                                              method="post">
                                            <input type="hidden"
                                                   name="settingCodeId"
                                                   th:value="${codeValue.settingCodeId}">

                                            <button type="submit"
                                                    class="btn btn-custon-rounded-four btn-default">
                                                기본
                                            </button>
                                        </form>

                                        <form th:if="${codeValue.defaultYn == 'Y'}"
                                              th:action="@{/codevalue/default/cancel}"
                                              method="post">
                                            <input type="hidden"
                                                   name="settingCodeId"
                                                   th:value="${codeValue.settingCodeId}">

                                            <button type="submit"
                                                    class="btn btn-custon-rounded-four btn-default">
                                                취소
                                            </button>
                                        </form>

                                        <form th:action="@{/codevalue/delete}"
                                              method="post"
                                              onsubmit="return confirm('해당 코드값을 삭제하시겠습니까?');">
                                            <input type="hidden"
                                                   name="settingCodeId"
                                                   th:value="${codeValue.settingCodeId}">

                                            <button type="submit"
                                                    class="btn btn-custon-rounded-four btn-danger">
                                                삭제
                                            </button>
                                        </form>

                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>

            </div>

        </div>
    </div>

<script>
    (function() {
        function updateFilterSummary(dropdown) {
            var checkedLabels = Array.prototype.slice.call(
                dropdown.querySelectorAll('input[type="checkbox"]:checked, input[type="radio"]:checked'))
                .map(function(input) {
                    var label = input.closest('.filter-check-item');
                    return label ? label.innerText.trim() : '';
                })
                .filter(function(text) {
                    return text.length > 0;
                });
            var summaryText = dropdown.querySelector('.filter-selected-text');
            var placeholder = dropdown.getAttribute('data-placeholder') || '전체';

            if (!summaryText) {
                return;
            }

            if (!dropdown.dataset.summaryInitialized) {
                dropdown.dataset.summaryInitialized = 'true';
                if (summaryText.textContent.trim() && summaryText.textContent.trim() !== placeholder) {
                    dropdown.classList.add('has-selected');
                    return;
                }
            }

            if (checkedLabels.length === 0) {
                summaryText.textContent = placeholder;
                dropdown.classList.remove('has-selected');
                return;
            }

            summaryText.textContent = checkedLabels.join(', ');
            dropdown.classList.add('has-selected');
        }

        document.querySelectorAll('.filter-dropdown').forEach(function(dropdown) {
            updateFilterSummary(dropdown);
            dropdown.addEventListener('change', function() {
                updateFilterSummary(dropdown);
            });
        });

        document.addEventListener('click', function(event) {
            document.querySelectorAll('.filter-dropdown[open]').forEach(function(dropdown) {
                if (!dropdown.contains(event.target)) {
                    dropdown.removeAttribute('open');
                }
            });
        });
    })();
</script>
</div>
</body>
</html>
