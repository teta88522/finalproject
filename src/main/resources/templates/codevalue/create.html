<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">

<head>
    <meta charset="UTF-8">
    <title>새 코드값 생성</title>

    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/codevalue/codevalue.css}">
</head>

<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
    <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <div class="codevalue-form-page">
        <div class="container-fluid">

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div>
                    <h1>새 코드값 생성</h1>
                    <p>
                        <span th:text="${groupNameMap.get(codeValue.settingGroupName)}">그룹명</span>
                        그룹에 새 코드값을 등록합니다.
                    </p>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:8px;">
                        <a th:href="@{/codevalue/list}"
                           class="btn btn-custon-rounded-four btn-primary custom-white-btn">
                            취소
                        </a>

                        <button type="submit"
                                class="btn btn-custon-rounded-four btn-primary custom-default-btn">
                            등록
                        </button>
                    </div>
            </div>

            <div th:if="${errorMessage}"
                 class="page-message page-message-error"
                 th:text="${errorMessage}">
            </div>

            <div class="codevalue-form-card">
                <div class="codevalue-form-title">
                    <h2>기본 정보</h2>
                    <p>코드값 이름과 기본값 여부를 설정합니다.</p>
                </div>

                <form th:action="@{/codevalue/create}"
                      th:object="${codeValue}"
                      method="post">

                    <input type="hidden" th:field="*{settingGroupName}">

                    <div class="form-group">
                        <label for="settingGroupNameText">그룹</label>
                        <input type="text"
                               id="settingGroupNameText"
                               class="form-control"
                               th:value="${groupNameMap.get(codeValue.settingGroupName)}"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label for="settingName">이름</label>
                        <input type="text"
                               id="settingName"
                               th:field="*{settingName}"
                               class="form-control"
                               placeholder="코드값 이름을 입력하세요"
                               required>
                    </div>

                    <div class="form-group">
                        <label class="codevalue-check-label">
                            <input type="checkbox"
                                   name="defaultYn"
                                   value="Y"
                                   th:checked="${codeValue.defaultYn == 'Y'}">
                            기본값으로 설정
                        </label>

                        <p class="help-block">
                            기본값은 그룹별로 하나만 설정할 수 있습니다.
                        </p>
                    </div>

                    

                </form>
            </div>

        </div>
    </div>
    </div>
    </div>

</div>
</body>
</html>
