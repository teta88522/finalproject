<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">

<head>
    <meta charset="UTF-8">
    <title>코드값 대체 삭제</title>

    <link rel="stylesheet" th:href="@{/css/common-ui.css}">
    <link rel="stylesheet" th:href="@{/css/codevalue/codevalue.css}">
</head>

<body>

<div layout:fragment="Content">

<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <div class="codevalue-form-page">
        <div class="container-fluid">

            <div class="codevalue-header">
                <div>
                    <h1>코드값 대체 삭제</h1>
                    <p>
                        기본값 또는 사용 중인 코드값은 같은 그룹의 다른 코드값으로 대체한 후 삭제합니다.
                    </p>
                </div>
            </div>

            <div th:if="${errorMessage}"
                 class="page-message page-message-error"
                 th:text="${errorMessage}">
            </div>

            <div class="page-message page-message-info">
                <strong th:text="${deleteTarget.settingName}">삭제 대상</strong>
                코드값을 삭제하려면 같은 그룹의 다른 코드값을 대체값으로 선택해야 합니다.
            </div>

            <div class="codevalue-form-card">
                <div class="codevalue-form-title">
                    <h2>대체 코드값 선택</h2>
                    <p>삭제 대상과 같은 그룹의 코드값만 대체값으로 선택할 수 있습니다.</p>
                </div>

                <form th:action="@{/codevalue/delete/replace}"
                      method="post">

                    <input type="hidden"
                           name="deleteSettingCodeId"
                           th:value="${deleteTarget.settingCodeId}">

                    <div class="form-group">
                        <label for="deleteGroupName">삭제 대상 그룹</label>
                        <input type="text"
                               id="deleteGroupName"
                               class="form-control"
                               th:value="${groupNameMap.get(deleteTarget.settingGroupName)}"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label for="deleteSettingName">삭제 대상 코드값</label>
                        <input type="text"
                               id="deleteSettingName"
                               class="form-control"
                               th:value="${deleteTarget.settingName}"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label for="replaceSettingCodeId">대체 코드값</label>
                        <select id="replaceSettingCodeId"
                                name="replaceSettingCodeId"
                                class="form-control"
                                required>
                            <option value="">대체 코드값을 선택하세요</option>

                            <option th:each="replacement : ${replacementList}"
                                    th:value="${replacement.settingCodeId}"
                                    th:text="${replacement.settingName}">
                                대체값
                            </option>
                        </select>

                        <p class="help-block">
                            삭제 대상이 기본값이면 선택한 대체 코드값이 기본값을 대신하게 됩니다.
                        </p>
                    </div>

                    <div class="codevalue-form-actions">
                        <a th:href="@{/codevalue/list}"
                           class="btn btn-custon-rounded-four btn-primary custom-white-btn">
                            취소
                        </a>

                        <button type="submit"
                                class="btn btn-custon-rounded-four btn-danger custom-btn">
                            대체 후 삭제
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
</div>
</div>
</body>
</html>
