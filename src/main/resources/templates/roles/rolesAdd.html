<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>역할 추가</title>

<style>
.role-add-page {
	padding: 28px 32px;
	background-color: #ffffff;
}

.role-page-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 24px;
}

.role-page-title {
	font-size: 26px;
	font-weight: 500;
	color: #111111;
	margin: 0;
}

.role-top-btn-area {
	display: flex;
	gap: 10px;
}

.role-btn {
	min-width: 70px;
	height: 36px;
	border: 1px solid #d7dbe7;
	border-radius: 5px;
	background-color: #ffffff;
	color: #333333;
	font-size: 13px;
	cursor: pointer;
}

.role-btn.primary {
	background-color: #252ba3;
	border-color: #252ba3;
	color: #ffffff;
}

.role-section {
	border: 1px solid #dfe3f0;
	border-radius: 7px;
	background-color: #ffffff;
	margin-bottom: 16px;
}

.role-section-inner {
	padding: 18px 20px;
}

.section-title {
	font-size: 15px;
	font-weight: 500;
	color: #333333;
	margin-bottom: 16px;
}

.form-row {
	display: flex;
	align-items: center;
}

.form-row label {
	width: 90px;
	font-size: 13px;
	color: #333333;
}

.form-row input {
	width: 350px;
	height: 32px;
	border: 1px solid #d7dbe7;
	border-radius: 5px;
	padding: 0 10px;
	font-size: 13px;
	outline: none;
}

.form-row input:focus {
	border-color: #252ba3;
}

.step-area {
	display: grid;
	grid-template-columns: repeat(5, 1fr);
	gap: 8px;
	padding: 10px 12px;
}

.step-item {
	height: 46px;
	border: 1px solid #dfe3f0;
	border-radius: 7px;
	display: flex;
	align-items: center;
	padding: 0 14px;
	color: #777777;
	background-color: #ffffff;
	font-size: 13px;
	cursor: pointer;
}

.step-item.active {
	border-color: #252ba3;
	color: #252ba3;
	font-weight: 600;
}

.step-num {
	width: 22px;
	height: 22px;
	border-radius: 50%;
	background-color: #eef0f6;
	color: #777777;
	font-size: 12px;
	display: inline-flex;
	justify-content: center;
	align-items: center;
	margin-right: 10px;
	flex-shrink: 0;
}

.step-item.active .step-num, .permission-box-title .step-num {
	background-color: #252ba3;
	color: #ffffff;
}

.permission-wrap {
	padding: 18px 20px;
}

.permission-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 14px;
}

.page-chip {
	padding: 6px 12px;
	border-radius: 16px;
	background-color: #f2f3f7;
	color: #555555;
	font-size: 12px;
}

.permission-control {
	display: flex;
	gap: 8px;
}

.small-btn {
	height: 32px;
	padding: 0 14px;
	border: 1px solid #d7dbe7;
	border-radius: 5px;
	background-color: #ffffff;
	font-size: 12px;
	cursor: pointer;
}

.permission-box {
	border: 1px solid #dfe3f0;
	border-radius: 7px;
	overflow: hidden;
}

.permission-box-title {
	height: 44px;
	display: flex;
	align-items: center;
	padding: 0 16px;
	background-color: #f5f6fb;
	font-size: 14px;
	font-weight: 500;
	color: #333333;
}

.permission-content {
	padding: 22px 18px;
}

.permission-page {
	display: none;
}

.permission-page.active {
	display: block;
}

.permission-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 18px;
}

.permission-grid.three {
	grid-template-columns: repeat(3, 1fr);
}

.permission-card {
	border: 1px solid #dfe3f0;
	border-radius: 6px;
	padding: 18px 20px;
	min-height: 130px;
}

.permission-sub-title {
	font-size: 14px;
	font-weight: 600;
	color: #222222;
	margin-bottom: 18px;
	padding-bottom: 10px;
	border-bottom: 1px solid #eeeeee;
}

.check-row {
	display: grid;
	grid-template-columns: repeat(2, minmax(120px, 1fr));
	row-gap: 16px;
	column-gap: 30px;
}

.check-row.one {
	grid-template-columns: 1fr;
}

.check-row label {
	display: flex;
	align-items: center;
	gap: 8px;
	font-size: 13px;
	color: #333333;
	cursor: pointer;
}

.check-row input[type="checkbox"] {
	width: 15px;
	height: 15px;
}

.bottom-btn-area {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
	margin-top: 18px;
}

.next-btn, .prev-btn {
	width: 76px;
	height: 38px;
	border: none;
	border-radius: 5px;
	background-color: #252ba3;
	color: #ffffff;
	font-size: 13px;
	cursor: pointer;
}

.prev-btn {
	background-color: #777777;
}

.role-btn:hover, .small-btn:hover, .next-btn:hover, .prev-btn:hover {
	opacity: 0.9;
}
</style>
</head>

<body>
	<div layout:fragment="Content">

		<div class="role-add-page">

			<div class="role-page-header">
				<h1 class="role-page-title">역할 &gt;&gt; 역할 추가</h1>

				<div class="role-top-btn-area">
					<button type="button" class="role-btn"
						th:onclick="|location.href='@{/roles}'|">취소</button>

					<button type="button" class="role-btn primary">저장</button>
				</div>
			</div>

			<!-- 기본 정보 -->
			<div class="role-section">
				<div class="role-section-inner">
					<div class="section-title">기본 정보</div>

					<div class="form-row">
						<label for="roleName">역할명</label> <input type="text" id="roleName"
							name="roleName" placeholder="역할명을 입력하세요. 예: 팀장">
					</div>
				</div>
			</div>

			<!-- 권한 단계 -->
			<div class="role-section">
				<div class="step-area">
					<div class="step-item active" data-page="1"
						onclick="showPermissionPage(1)">
						<span class="step-num">1</span> 프로젝트 / 마일스톤
					</div>

					<div class="step-item" data-page="2"
						onclick="showPermissionPage(2)">
						<span class="step-num">2</span> 일감 관리
					</div>

					<div class="step-item" data-page="3"
						onclick="showPermissionPage(3)">
						<span class="step-num">3</span> 게시판 관리
					</div>

					<div class="step-item" data-page="4"
						onclick="showPermissionPage(4)">
						<span class="step-num">4</span> 문서/파일/시각화 관련
					</div>

					<div class="step-item" data-page="5"
						onclick="showPermissionPage(5)">
						<span class="step-num">5</span> 저장소 관리
					</div>
				</div>
			</div>

			<!-- 권한 설정 -->
			<div class="role-section">
				<div class="permission-wrap">

					<div class="section-title">권한 설정</div>

					<div class="permission-header">
						<span class="page-chip" id="pageChip">1 / 5 페이지</span>

						<div class="permission-control">
							<button type="button" class="small-btn"
								onclick="checkCurrentPageAll(true)">전체 선택</button>
							<button type="button" class="small-btn"
								onclick="checkCurrentPageAll(false)">전체 해제</button>
						</div>
					</div>

					<div class="permission-box">

						<!-- 1. 프로젝트 및 마일스톤 권한 -->
						<div class="permission-page active" data-page="1">
							<div class="permission-box-title">
								<span class="step-num">1</span> 프로젝트 및 마일스톤 권한
							</div>

							<div class="permission-content">
								<div class="permission-grid">

									<div class="permission-card">
										<div class="permission-sub-title">프로젝트</div>

										<div class="check-row">
											<label> <input type="checkbox" name="permissionIds"
												value="PROJECT_EDIT"> 편집
											</label> <label> <input type="checkbox" name="permissionIds"
												value="PROJECT_MEMBER_MANAGE"> 구성원 관리
											</label> <label> <input type="checkbox" name="permissionIds"
												value="PROJECT_VERSION_MANAGE"> 버전 관리
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">마일스톤</div>

										<div class="check-row">
											<label> <input type="checkbox" name="permissionIds"
												value="MILESTONE_VIEW"> 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="MILESTONE_CREATE"> 생성
											</label> <label> <input type="checkbox" name="permissionIds"
												value="MILESTONE_UPDATE"> 수정
											</label> <label> <input type="checkbox" name="permissionIds"
												value="MILESTONE_DELETE"> 삭제
											</label>
										</div>
									</div>

								</div>
							</div>
						</div>

						<!-- 2. 일감 관리 -->
						<div class="permission-page" data-page="2">
							<div class="permission-box-title">
								<span class="step-num">2</span> 일감 관리 권한
							</div>

							<div class="permission-content">
								<div class="permission-grid three">

									<div class="permission-card">
										<div class="permission-sub-title">일감 기본</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="ISSUE_CREATE"> 일감 추가
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_DELETE"> 일감 삭제
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_EDIT_ALL"> 일감 편집&#40;전체&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_EDIT_OWN"> 나의 일감 편집&#40;본인&#41;
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">구조 및 속성</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="ISSUE_RELATION_MANAGE"> 일감 관계 관리
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_SUBTASK_MANAGE"> 하위 일감 관리
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_CATEGORY_MANAGE"> 일감 범주 관리
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_IMPORT"> 일감 가져오기
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">공개 설정</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="ISSUE_PUBLIC_PRIVATE_ALL"> 전체 공개/비공개 설정
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_PUBLIC_PRIVATE_OWN"> 본인 일감 공개/비공개 설정
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">댓글 관리</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="ISSUE_COMMENT_CREATE"> 댓글 추가
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_COMMENT_EDIT_ALL"> 댓글 편집&#40;전체&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_COMMENT_EDIT_OWN"> 나의 댓글 편집&#40;본인&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_COMMENT_PRIVATE_SET"> 댓글 비공개 설정
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_COMMENT_PRIVATE_VIEW"> 비공개 댓글 보기
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">관람자</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="ISSUE_WATCHER_VIEW"> 일감관람자 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_WATCHER_ADD"> 일감관람자 추가
											</label> <label> <input type="checkbox" name="permissionIds"
												value="ISSUE_WATCHER_REMOVE"> 일감관람자 지우기
											</label>
										</div>
									</div>

								</div>
							</div>
						</div>

						<!-- 3. 게시판 관리 -->
						<div class="permission-page" data-page="3">
							<div class="permission-box-title">
								<span class="step-num">3</span> 게시판 관리 권한
							</div>

							<div class="permission-content">
								<div class="permission-grid three">

									<div class="permission-card">
										<div class="permission-sub-title">기본 조작</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="BOARD_MANAGE"> 게시판 관리
											</label> <label> <input type="checkbox" name="permissionIds"
												value="POST_CREATE"> 게시글 추가
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">편집/삭제</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="POST_EDIT_ALL"> 게시글 편집&#40;전체&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="POST_EDIT_OWN"> 나의 게시글 편집&#40;본인&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="POST_DELETE_ALL"> 게시글 삭제&#40;전체&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="POST_DELETE_OWN"> 나의 게시글 삭제&#40;본인&#41;
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">관람자</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="BOARD_VIEWER_LIST"> 볼 수 있는 사람 리스트 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="BOARD_VIEWER_ADD"> 볼 수 있는 사람 추가
											</label> <label> <input type="checkbox" name="permissionIds"
												value="BOARD_VIEWER_REMOVE"> 볼 수 있는 사람 삭제
											</label>
										</div>
									</div>

								</div>
							</div>
						</div>

						<!-- 4. 문서 및 시각화 도구 -->
						<div class="permission-page" data-page="4">
							<div class="permission-box-title">
								<span class="step-num">4</span> 문서/파일/시각화 관련 권한
							</div>

							<div class="permission-content">
								<div class="permission-grid three">

									<div class="permission-card">
										<div class="permission-sub-title">문서</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="DOCUMENT_VIEW"> 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="DOCUMENT_CREATE"> 추가
											</label> <label> <input type="checkbox" name="permissionIds"
												value="DOCUMENT_EDIT"> 편집
											</label> <label> <input type="checkbox" name="permissionIds"
												value="DOCUMENT_DELETE"> 삭제
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">파일</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="FILE_VIEW"> 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="FILE_MANAGE"> 관리
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">시각화</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="VIEW_GANTT_BY_GROUP"> 일감 기준 그룹별
												표시&#40;간트차트&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="VIEW_CALENDAR_BY_GROUP"> 일감 기준 그룹별
												표시&#40;달력&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="VIEW_KANBAN_BY_GROUP"> 일감 기준 그룹별
												표시&#40;칸반&#41;
											</label> <label> <input type="checkbox" name="permissionIds"
												value="VIEW_OTHER_GROUP_ISSUE"> 타 그룹 일감 조회 가능
											</label>
										</div>
									</div>

								</div>
							</div>
						</div>

						<!-- 5. 저장소 관리 -->
						<div class="permission-page" data-page="5">
							<div class="permission-box-title">
								<span class="step-num">5</span> 저장소 관리 권한 &#91;보류&#93;
							</div>

							<div class="permission-content">
								<div class="permission-grid">

									<div class="permission-card">
										<div class="permission-sub-title">조회</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="REPOSITORY_VIEW"> 저장소 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="REPOSITORY_CHANGELOG_VIEW"> 변경로그 보기
											</label> <label> <input type="checkbox" name="permissionIds"
												value="REPOSITORY_COMMIT_VIEW"> 변경묶음 보기&#40;commit
												기록&#41;
											</label>
										</div>
									</div>

									<div class="permission-card">
										<div class="permission-sub-title">관리</div>

										<div class="check-row one">
											<label> <input type="checkbox" name="permissionIds"
												value="REPOSITORY_MANAGE"> 저장소 관리
											</label> <label> <input type="checkbox" name="permissionIds"
												value="REPOSITORY_ISSUE_MANAGE"> 연결된 일감 관리
											</label>
										</div>
									</div>

								</div>
							</div>
						</div>

					</div>

					<div class="bottom-btn-area">
						<button type="button" id="prevBtn" class="prev-btn"
							onclick="movePage(-1)">이전</button>

						<button type="button" id="nextBtn" class="next-btn"
							onclick="movePage(1)">다음</button>
					</div>

				</div>
			</div>

		</div>

		<script>
    let currentPage = 1;
    const maxPage = 5;

    function showPermissionPage(pageNo) {
        currentPage = pageNo;

        // 권한 내용 페이지 변경
        const pages = document.querySelectorAll(".permission-page");
        pages.forEach(page => {
            page.classList.remove("active");
        });

        const targetPage = document.querySelector('.permission-page[data-page="' + pageNo + '"]');
        if (targetPage) {
            targetPage.classList.add("active");
        }

        // 상단 1 2 3 4 5 단계 active 변경
        const steps = document.querySelectorAll(".step-item");
        steps.forEach(step => {
            step.classList.remove("active");
        });

        const targetStep = document.querySelector('.step-item[data-page="' + pageNo + '"]');
        if (targetStep) {
            targetStep.classList.add("active");
        }

        // 페이지 표시 변경
        document.getElementById("pageChip").innerText = pageNo + " / 5 페이지";

        // 이전/다음 버튼 상태 변경
        updatePageButton();
    }

    function movePage(direction) {
        let nextPage = currentPage + direction;

        if (nextPage < 1) {
            nextPage = 1;
        }

        if (nextPage > maxPage) {
            nextPage = maxPage;
        }

        showPermissionPage(nextPage);
    }

    function updatePageButton() {
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        if (currentPage === 1) {
            prevBtn.disabled = true;
            prevBtn.classList.add("disabled");
        } else {
            prevBtn.disabled = false;
            prevBtn.classList.remove("disabled");
        }

        if (currentPage === maxPage) {
            nextBtn.disabled = true;
            nextBtn.classList.add("disabled");
        } else {
            nextBtn.disabled = false;
            nextBtn.classList.remove("disabled");
        }
    }

    function checkCurrentPageAll(checked) {
        const activePage = document.querySelector(".permission-page.active");

        if (!activePage) {
            return;
        }

        const checkboxes = activePage.querySelectorAll('input[type="checkbox"]');

        checkboxes.forEach(checkbox => {
            checkbox.checked = checked;
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        showPermissionPage(1);
    });
</script>

	</div>
</body>
</html>
