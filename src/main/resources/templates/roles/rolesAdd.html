<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>역할 추가</title>
<link rel="stylesheet" th:href="@{/css/roles/rolesAdd.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="role-add-page">

        <form th:action="@{/roles/add}"
              th:object="${roleServiceVO}"
              method="post"
              id="roleAddForm">

            <div class="role-page-header">
                <h1 class="role-page-title">역할 &gt;&gt; 역할 추가</h1>

                <div class="role-top-btn-area">
                    <button type="button"
                            class="role-btn"
                            th:onclick="|location.href='@{/roles}'|">
                        취소
                    </button>

                    <button type="button"
                            class="role-btn primary"
                            id="rolePreviewBtn">
                        저장
                    </button>
                </div>
            </div>

            <div class="role-section">
                <div class="role-section-inner">
                    <div class="section-title">기본 정보</div>

                    <div class="form-row">
                        <label for="roleName">역할명</label>
                        <input type="text"
                               id="roleName"
                               th:field="*{roleName}"
                               placeholder="역할명을 입력하세요. 예: 팀장"
                               required>
                    </div>
                </div>
            </div>

            <div class="role-section">
                <div class="permission-wrap">

                    <div class="section-title">권한 설정</div>

                    <div class="permission-header">
                        <span class="page-chip">전체 권한</span>

                        <div class="permission-control">
                            <button type="button"
                                    class="small-btn"
                                    onclick="checkAllPermissions(true)">
                                전체 선택
                            </button>

                            <button type="button"
                                    class="small-btn"
                                    onclick="checkAllPermissions(false)">
                                전체 해제
                            </button>
                        </div>
                    </div>

                    <div class="permission-box all-permission-box">

                        <div class="permission-grid all">

                            <!-- PC001 프로젝트 -->
                            <div class="permission-card">
                                <div class="permission-sub-title">프로젝트</div>

                                <div class="check-row one">
                                    <label th:each="permission : ${permissionList}"
                                           th:if="${permission.permissionCategoryId == 'PC001'}">
                                        <input type="checkbox"
                                               name="permissionIds"
                                               class="permission-check"
                                               th:value="${permission.permissionId}"
                                               th:data-permission-name="${permission.permissionName}"
                                               th:data-category-name="'프로젝트'"
                                               th:checked="${checkedPermissionIds != null and checkedPermissionIds.contains(permission.permissionId)}">
                                        <span th:text="${permission.permissionName}">
                                            권한명
                                        </span>
                                    </label>
                                </div>
                            </div>

                            <!-- PC002 마일스톤 -->
                            <div class="permission-card">
                                <div class="permission-sub-title">마일스톤</div>

                                <div class="check-row one">
                                    <label th:each="permission : ${permissionList}"
                                           th:if="${permission.permissionCategoryId == 'PC002'}">
                                        <input type="checkbox"
                                               name="permissionIds"
                                               class="permission-check"
                                               th:value="${permission.permissionId}"
                                               th:data-permission-name="${permission.permissionName}"
                                               th:data-category-name="'마일스톤'"
                                               th:checked="${checkedPermissionIds != null and checkedPermissionIds.contains(permission.permissionId)}">
                                        <span th:text="${permission.permissionName}">
                                            권한명
                                        </span>
                                    </label>
                                </div>
                            </div>

                            <!-- PC003 일감 -->
                            <div class="permission-card">
                                <div class="permission-sub-title">일감</div>

                                <div class="check-row one">
                                    <label th:each="permission : ${permissionList}"
                                           th:if="${permission.permissionCategoryId == 'PC003'}">
                                        <input type="checkbox"
                                               name="permissionIds"
                                               class="permission-check"
                                               th:value="${permission.permissionId}"
                                               th:data-permission-name="${permission.permissionName}"
                                               th:data-category-name="'일감'"
                                               th:checked="${checkedPermissionIds != null and checkedPermissionIds.contains(permission.permissionId)}">
                                        <span th:text="${permission.permissionName}">
                                            권한명
                                        </span>
                                    </label>
                                </div>
                            </div>

                            <!-- PC004 게시판 -->
                            <div class="permission-card">
                                <div class="permission-sub-title">게시판</div>

                                <div class="check-row one">
                                    <label th:each="permission : ${permissionList}"
                                           th:if="${permission.permissionCategoryId == 'PC004'}">
                                        <input type="checkbox"
                                               name="permissionIds"
                                               class="permission-check"
                                               th:value="${permission.permissionId}"
                                               th:data-permission-name="${permission.permissionName}"
                                               th:data-category-name="'게시판'"
                                               th:checked="${checkedPermissionIds != null and checkedPermissionIds.contains(permission.permissionId)}">
                                        <span th:text="${permission.permissionName}">
                                            권한명
                                        </span>
                                    </label>
                                </div>
                            </div>

                            <!-- PC005 저장소 -->
                            <div class="permission-card">
                                <div class="permission-sub-title">저장소</div>

                                <div class="check-row one">
                                    <label th:each="permission : ${permissionList}"
                                           th:if="${permission.permissionCategoryId == 'PC005'}">
                                        <input type="checkbox"
                                               name="permissionIds"
                                               class="permission-check"
                                               th:value="${permission.permissionId}"
                                               th:data-permission-name="${permission.permissionName}"
                                               th:data-category-name="'저장소'"
                                               th:checked="${checkedPermissionIds != null and checkedPermissionIds.contains(permission.permissionId)}">
                                        <span th:text="${permission.permissionName}">
                                            권한명
                                        </span>
                                    </label>
                                </div>
                            </div>

                        </div>

                    </div>

                </div>
            </div>

        </form>

        <div class="modal fade" id="rolePreviewModal" tabindex="-1" role="dialog">
            <div class="modal-dialog" role="document" style="width:640px; max-width:calc(100% - 40px); border-radius:20px;">
                <div class="modal-content" style="border-radius:20px; overflow:hidden; border:none;">

                    <div style="background:#1a6fe8; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
                        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
                            역할 등록 미리보기
                        </h4>
                        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
                    </div>

                    <div class="modal-body" style="padding:24px;">

                        <div style="margin-bottom:16px;">
                            <label style="font-size:13px; color:#555; display:block; margin-bottom:6px;">
                                역할명 <span style="color:#e24b4a">*</span>
                            </label>

                            <div id="previewRoleName"
                                 style="min-height:38px; display:flex; align-items:center; border:1px solid #ddd; border-radius:10px; padding:0 12px; font-size:13px; color:#222; background:#fafafa;">
                                -
                            </div>
                        </div>

                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:6px;">
                                    선택 권한 수
                                </label>

                                <div id="previewPermissionCount"
                                     style="min-height:38px; display:flex; align-items:center; border:1px solid #ddd; border-radius:10px; padding:0 12px; font-size:13px; color:#222; background:#fafafa;">
                                    0개
                                </div>
                            </div>

                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:6px;">
                                    권한 분류 수
                                </label>

                                <div id="previewPermissionCategoryCount"
                                     style="min-height:38px; display:flex; align-items:center; border:1px solid #ddd; border-radius:10px; padding:0 12px; font-size:13px; color:#222; background:#fafafa;">
                                    0개
                                </div>
                            </div>
                        </div>

                        <div>
                            <label style="font-size:13px; color:#555; display:block; margin-bottom:6px;">
                                선택 권한 목록
                            </label>

							<div id="previewPermissionList" class="preview-permission-list">
    							선택된 권한이 없습니다.
							</div>
                        </div>

                    </div>

                    <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
                        <button type="button"
                                class="btn btn-default btn-custon-three btn-custon-rounded-three"
                                data-dismiss="modal">
                            취소
                        </button>

                        <button type="button"
                                id="roleRealSubmitBtn"
                                class="btn btn-primary btn-custon-three btn-custon-rounded-three">
                            저장
                        </button>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script>
        function checkAllPermissions(checked) {
            const checkboxes = document.querySelectorAll(".permission-check");

            checkboxes.forEach(function (checkbox) {
                checkbox.checked = checked;
            });
        }

        function getPermissionText(checkbox) {
            const permissionName = checkbox.dataset.permissionName || "";
            const categoryName = checkbox.dataset.categoryName || "";

            if (categoryName !== "" && permissionName !== "") {
                return categoryName + " > " + permissionName;
            }

            if (permissionName !== "") {
                return permissionName;
            }

            const label = checkbox.closest("label");

            if (label) {
                return label.innerText.trim();
            }

            return checkbox.value;
        }

        function getCheckedCategoryCount(checkedPermissions) {
            const categorySet = new Set();

            checkedPermissions.forEach(function (checkbox) {
                const categoryName = checkbox.dataset.categoryName || "";

                if (categoryName !== "") {
                    categorySet.add(categoryName);
                }
            });

            return categorySet.size;
        }

        function openRolePreviewModal() {
            const roleNameInput = document.getElementById("roleName");
            const roleName = roleNameInput.value.trim();
            const checkedPermissions = document.querySelectorAll(".permission-check:checked");

            if (roleName === "") {
                alert("역할명을 입력하세요.");
                roleNameInput.focus();
                return;
            }

            if (checkedPermissions.length === 0) {
                alert("권한을 1개 이상 선택하세요.");
                return;
            }

            const previewRoleName = document.getElementById("previewRoleName");
            const previewPermissionCount = document.getElementById("previewPermissionCount");
            const previewPermissionCategoryCount = document.getElementById("previewPermissionCategoryCount");
            const previewPermissionList = document.getElementById("previewPermissionList");

            previewRoleName.textContent = roleName;
            previewPermissionCount.textContent = checkedPermissions.length + "개";
            previewPermissionCategoryCount.textContent = getCheckedCategoryCount(checkedPermissions) + "개";

            const categoryMap = {};

            checkedPermissions.forEach(function (checkbox) {
                const categoryName = checkbox.dataset.categoryName || "기타";
                const permissionName = checkbox.dataset.permissionName || checkbox.closest("label").innerText.trim();

                if (!categoryMap[categoryName]) {
                    categoryMap[categoryName] = [];
                }

                categoryMap[categoryName].push(permissionName);
            });

            previewPermissionList.innerHTML = "";

            const categoryOrder = ["프로젝트", "마일스톤", "일감", "게시판", "저장소", "기타"];

            categoryOrder.forEach(function (categoryName) {
                const permissionNames = categoryMap[categoryName];

                if (!permissionNames || permissionNames.length === 0) {
                    return;
                }

                const categoryBox = document.createElement("div");
                categoryBox.className = "preview-category-box";

                const categoryHeader = document.createElement("div");
                categoryHeader.className = "preview-category-header";

                const categoryTitle = document.createElement("div");
                categoryTitle.className = "preview-category-title";
                categoryTitle.textContent = categoryName;

                const categoryCount = document.createElement("div");
                categoryCount.className = "preview-category-count";
                categoryCount.textContent = permissionNames.length + "개";

                categoryHeader.appendChild(categoryTitle);
                categoryHeader.appendChild(categoryCount);

                const permissionUl = document.createElement("ul");
                permissionUl.className = "preview-permission-ul";

                permissionNames.forEach(function (permissionName) {
                    const permissionLi = document.createElement("li");
                    permissionLi.className = "preview-permission-item";
                    permissionLi.textContent = permissionName;

                    permissionUl.appendChild(permissionLi);
                });

                categoryBox.appendChild(categoryHeader);
                categoryBox.appendChild(permissionUl);

                previewPermissionList.appendChild(categoryBox);
            });

            if (window.jQuery && $("#rolePreviewModal").modal) {
                $("#rolePreviewModal").modal("show");
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const rolePreviewBtn = document.getElementById("rolePreviewBtn");
            const roleRealSubmitBtn = document.getElementById("roleRealSubmitBtn");
            const roleAddForm = document.getElementById("roleAddForm");

            rolePreviewBtn.addEventListener("click", function () {
                openRolePreviewModal();
            });

            roleRealSubmitBtn.addEventListener("click", function () {
                roleAddForm.submit();
            });
        });
    </script>

</div>
</body>
</html>
