<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/gantt/dhtmlxgantt.css}">
<script th:src="@{/js/gantt/dhtmlxgantt.js}"></script>
<link rel="stylesheet" th:href="@{/css/gantt/gantt.css}" />
</head>
<body>
<div layout:fragment="Content">
	
    <div class="container-fluid">
		<!-- 🌟 [UI/UX] 로딩 엇박자를 완벽 차단하기 위해 제목, 필터, 간트 전체를 래퍼로 묶고 처음에 투명하게 숨김 -->
		<div id="ganttAllWrapper">
			<div class="kiaalap-panel main-box">
			    <div class="main-header">
			        <h2>간트차트</h2>
			        <p>프로젝트 내의 마일스톤과 일감을 간트차트로 확인할 수 있습니다.</p>
			    </div>
			</div>
			
			<!-- 📝 일감 목록과 100% 동일한 검색조건 테두리 박스로 개량 -->
			<div class="search-section">
			    <div class="search-header">
			        <div class="search-title">검색조건</div>
			    </div>
			    
			    <div class="js-filter-row">
			        <div class="js-filter-group">
			            <label> 마일스톤</label>
			            <select id="f_milestone">
			                <option value="all">전체 마일스톤</option>
			            </select>
			        </div>
			        <div class="js-filter-group">
			            <label> 상태</label>
			            <select id="f_status">
			                <option value="all">전체 상태</option>
			            </select>
			        </div>
			        <div class="js-filter-group">
			            <label> 담당자</label>
			            <select id="f_assignee">
			                <option value="all">전체 담당자</option>
			            </select>
			        </div>
			        <div class="js-filter-group search-group">
			            <label> 일감 검색</label>
			            <input type="text" id="f_text" placeholder="일감 제목 입력..." autocomplete="off" />
			        </div>
			        <div class="js-filter-group date-group">
			            <label><i class="far fa-calendar-alt"></i> 기간</label>
			            <div class="date-inputs">
			                <input type="date" id="f_start" />
			                <span>~</span>
			                <input type="date" id="f_end" />
			            </div>
			        </div>
			    </div>
			    
			    <!-- 📝 간트 필터 전용 초기화 및 검색 버튼 영역 추가 -->
			    <div class="filter-actions-row">
			        <button type="button" id="btnFilterReset" class="btn btn-default">초기화</button>
			        <button type="button" id="btnFilterSearch" class="btn btn-primary">검색</button>
			    </div>
			</div>
			
			<!-- [수정]: 필터 아래, 간트차트 위에 우측 정렬로 깔끔하게 배치되는 ➕/➖ 버튼 -->
			<div class="gantt-toolbar">
				<button type="button" id="btnZoomIn" class="btn btn-default btn-sm">➕ 15일</button>
				<button type="button" id="btnZoomOut" class="btn btn-default btn-sm">➖ 15일</button>
			</div>
			
			<!-- 간트차트 컨테이너 -->
			<div id="gantt_container"></div>
		</div>

    </div>

	<input type="hidden" id="globalProjectId" th:value="${projectId}" />
	<script th:inline="javascript">
		// [기술적 이유] 외부 정적 파일인 gantt.js가 타임리프의 projectId 변수를 참조하여 API 비동기 조회를 수행할 수 있도록 전역 window 영역에 마인딩합니다.
		window.projectId = /*[[${projectId}]]*/ '';
	</script>
	
	<script th:src="@{/js/gantt/gantt.js}"></script>
</div>
</body>
</html>
