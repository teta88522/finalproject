<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>버전(로드맵) 수정</title>

    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/setting-create.css}" />
  </head>
  <body>
    <div layout:fragment="Content">
      <div class="kiaalap-wrapper milestone-container">
        <div class="kiaalap-panel form-panel">
          <div class="panel-header">
            <h2>로드맵 수정</h2>
          </div>

          <div class="panel-body">
            <div
              th:if="${errorMessage}"
              class="alert alert-danger"
              style="color: red; margin-bottom: 15px; font-weight: bold"
            >
              <span th:text="${errorMessage}"></span>
            </div>

            <form
              id="versionUpdateForm"
              th:action="@{/project/{projectId}/roadmap/setting_update(projectId=${projectId})}"
              method="POST"
              novalidate
            >
              <input
                type="hidden"
                name="versionId"
                th:value="${roadmap.versionId}"
              />

              <div class="form-group">
                <label class="form-label" for="versionName"
                  >버전명 <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="versionName"
                  name="versionName"
                  class="form-control"
                  th:value="${roadmap.versionName}"
                  placeholder="예: v1.0.0 출시 로드맵"
                />
                <div id="nameError" class="error-message" style="display: none">
                  버전명을 입력해주세요.
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="statusCode"
                  >상태 <span class="required">*</span></label
                >
              </div>

              <div class="form-group">
                <label class="form-label" for="description">설명</label>
                <textarea
                  id="description"
                  name="description"
                  class="form-control"
                  rows="5"
                  th:text="${roadmap.description}"
                  placeholder="이 버전에 대한 상세 설명을 입력하세요."
                ></textarea>
                <div id="descError" class="error-message" style="display: none">
                  이 버전에 대한 상세 설명을 입력해주세요
                </div>
              </div>

				<div class="form-group checkbox-group">
				  <input
				    type="checkbox"
				    id="defaultYn"
				    name="defaultYn"
				    value="Y"
				    class="form-checkbox"
				    th:checked="${roadmap.defaultYn == 'Y'}"
				    th:onclick="${roadmap.defaultYn == 'Y'} ? 'alert(&quot;기본(Default) 버전은 여기서 직접 해제할 수 없습니다.\n다른 버전을 기본으로 설정하면 자동으로 해제됩니다.&quot;); return false;' : ''"
				    th:style="${roadmap.defaultYn == 'Y'} ? 'cursor: not-allowed; opacity: 0.6;' : ''"
				  />
				  <label for="defaultYn">
				    이 버전을 프로젝트의 기본(Default) 버전으로 설정합니다.
				  </label>
				</div>

              <div class="form-actions form-actions-split" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <div class="left-btn">
                  <a th:href="@{/project/{projectId}/roadmap/roadmap_list(projectId=${projectId})}"
                     class="btn-board-cancel"
                     style="background-color: #7f8c8d; color: #fff !important; text-decoration: none; padding: 10px 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; height: 38px; width: 80px; box-sizing: border-box; border: none; cursor: pointer;">
                      목록
                  </a>
                </div>
                <div class="right-btn" style="display: flex; gap: 8px;">
                  <a href="javascript:void(0)"
                     id="btnDelete"
                     class="btn-board-delete"
                     th:data-issue-count="${roadmap.issueCount}"
                     th:data-milestone-count="${roadmap.milestoneCount}"
                     th:data-default-yn="${roadmap.defaultYn}"
                     style="background-color: #e74c3c; color: #fff !important; text-decoration: none; padding: 10px 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; height: 38px; width: 80px; box-sizing: border-box; border: none; cursor: pointer;">
                      삭제
                  </a>
                  <a href="javascript:void(0)"
                     id="btnSubmit"
                     class="btn-board-submit"
                     style="background-color: #006df0; color: #fff !important; text-decoration: none; padding: 10px 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; height: 38px; width: 80px; box-sizing: border-box; border: none; cursor: pointer;">
                      수정
                  </a>
                </div>
              </div>
            </form>

            <form
              id="versionDeleteForm"
              th:action="@{/project/{projectid}/roadmap/setting_delete(projectid=${projectId})}"
              method="POST"
              style="display: none"
            >
              <input
                type="hidden"
                name="versionId"
                th:value="${roadmap.versionId}"
              />
            </form>
          </div>
        </div>
      </div>

      <script th:src="@{/js/roadmap/setting-update.js}"></script>
    </div>
  </body>
</html>
