<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>버전(로드맵) 수정</title>

    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/setting-create.css}" />
  </head>
  <body>
    <div layout:fragment="Content">
      <div class="kiaalap-wrapper milestone-container">
        <div class="kiaalap-panel form-panel">
          <div class="panel-header">
            <h2>로드맵 수정</h2>
          </div>

          <div class="panel-body">
            <div
              th:if="${errorMessage}"
              class="alert alert-danger"
              style="color: red; margin-bottom: 15px; font-weight: bold"
            >
              <span th:text="${errorMessage}"></span>
            </div>

            <form
              id="versionUpdateForm"
              th:action="@{/roadmap/setting_update}"
              method="POST"
              novalidate
            >
              <input
                type="hidden"
                name="versionId"
                th:value="${roadmap.versionId}"
              />

              <div class="form-group">
                <label class="form-label" for="versionName"
                  >버전명 <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="versionName"
                  name="versionName"
                  class="form-control"
                  th:value="${roadmap.versionName}"
                  placeholder="예: v1.0.0 출시 로드맵"
                />
                <div id="nameError" class="error-message" style="display: none">
                  버전명을 입력해주세요.
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="statusCode"
                  >상태 <span class="required">*</span></label
                >
                <select id="statusCode" name="statusCode" class="form-control">
                  <option
                    value="k001"
                    th:selected="${roadmap.statusCode == 'k001'}"
                  >
                    진행 예정
                  </option>
                  <option
                    value="k002"
                    th:selected="${roadmap.statusCode == 'k002'}"
                  >
                    진행 중
                  </option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="description">설명</label>
                <textarea
                  id="description"
                  name="description"
                  class="form-control"
                  rows="5"
                  th:text="${roadmap.description}"
                  placeholder="이 버전에 대한 상세 설명을 입력하세요."
                ></textarea>
                <div id="descError" class="error-message" style="display: none">
                  이 버전에 대한 상세 설명을 입력해주세요
                </div>
              </div>

              <div class="form-group checkbox-group">
                <input
                  type="checkbox"
                  id="defaultYn"
                  name="defaultYn"
                  value="Y"
                  class="form-checkbox"
                  th:checked="${roadmap.defaultYn == 'Y'}"
                />
                <label for="defaultYn"
                  >이 버전을 프로젝트의 기본(Default) 버전으로
                  설정합니다.</label
                >
              </div>

              <div class="form-actions form-actions-split">
                <div class="left-btn">
                  <button
                    type="button"
                    class="btn btn-default"
                    onclick="location.href = '/roadmap/setting_list'"
                  >
                    목록으로
                  </button>
                </div>
                <div class="right-btn">
                  <button type="button" id="btnDelete" class="btn btn-danger">
                    삭제
                  </button>
                  <button type="button" id="btnSubmit" class="btn btn-primary">
                    수정완료
                  </button>
                </div>
              </div>
            </form>

            <form
              id="versionDeleteForm"
              th:action="@{/roadmap/setting_delete}"
              method="POST"
              style="display: none"
            >
              <input
                type="hidden"
                name="versionId"
                th:value="${roadmap.versionId}"
              />
            </form>
          </div>
        </div>
      </div>

      <script th:src="@{/js/roadmap/setting-update.js}"></script>
    </div>
  </body>
</html>
