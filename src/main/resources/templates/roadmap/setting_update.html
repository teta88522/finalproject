<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>버전(로드맵) 수정</title>

    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/setting-create.css}" />
  </head>
  <body>
    <div layout:fragment="Content">
      <div class="container-fluid roadmap-page-wrapper">
        <div class="roadmap-page-panel">
          <div class="roadmap-page-header">
            <div>
              <h3 class="roadmap-page-title">로드맵 수정</h3>
            </div>
          </div>
          <div class="roadmap-page-body">
            <div
              th:if="${errorMessage}"
              class="alert alert-danger"
              style="color: red; margin-bottom: 15px; font-weight: bold"
            >
              <span th:text="${errorMessage}"></span>
            </div>

            <form
              id="versionUpdateForm"
              th:action="@{/project/{projectId}/roadmap/setting_update(projectId=${projectId})}"
              method="POST"
              novalidate
            >
              <input
                type="hidden"
                name="versionId"
                th:value="${roadmap.versionId}"
              />

              <div class="form-group">
                <label class="form-label" for="versionName"
                  >버전명 <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="versionName"
                  name="versionName"
                  class="form-control"
                  th:value="${roadmap.versionName}"
                  placeholder="예: v1.0.0 출시 로드맵"
                />
                <div id="nameError" class="error-message" style="display: none">
                  버전명을 입력해주세요.
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="description">설명</label>
                <textarea
                  id="description"
                  name="description"
                  class="form-control"
                  rows="5"
                  th:text="${roadmap.description}"
                  placeholder="이 버전에 대한 상세 설명을 입력하세요."
                ></textarea>
                <div id="descError" class="error-message" style="display: none">
                  이 버전에 대한 상세 설명을 입력해주세요
                </div>
              </div>

				<div class="form-group checkbox-group">
				  <input
				    type="checkbox"
				    id="defaultYn"
				    name="defaultYn"
				    value="Y"
				    class="form-checkbox"
				    th:checked="${roadmap.defaultYn == 'Y'}"
				    th:style="${roadmap.defaultYn == 'Y'} ? 'cursor: not-allowed; opacity: 0.6;' : ''"
				  />
				  <label for="defaultYn">
				    이 버전을 프로젝트의 기본(Default) 버전으로 설정합니다.
				  </label>
				</div>

              <div class="roadmap-page-footer" style="border-top: 1px solid #eee; display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding-top: 20px;">
                  <a th:href="@{/project/{projectId}/roadmap/roadmap_list(projectId=${projectId})}"
                     class="btn btn-custon-rounded-four custom-white-btn" id="btnCancel">
                       목록
                  </a>
                  <a href="javascript:void(0)"
                     id="btnDelete"
                     class="btn btn-custon-rounded-four btn-danger custom-btn"
                     th:data-issue-count="${roadmap.issueCount}"
                     th:data-milestone-count="${roadmap.milestoneCount}"
                     th:data-default-yn="${roadmap.defaultYn}">
                       삭제
                  </a>
                  <a href="javascript:void(0)"
                     id="btnSubmit"
                     class="btn btn-custon-rounded-four custom-default-btn">
                       수정
                  </a>
              </div>
            </form>

            <form
              id="versionDeleteForm"
              th:action="@{/project/{projectid}/roadmap/setting_delete(projectid=${projectId})}"
              method="POST"
              style="display: none"
            >
              <input
                type="hidden"
                name="versionId"
                th:value="${roadmap.versionId}"
              />
            </form>
          </div>
        </div>
      </div>

      <!-- SweetAlert2 및 공통 다이얼로그 추가 -->
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <script th:src="@{/js/common/pf-confirm.js}"></script>
      <script th:src="@{/js/roadmap/setting-update.js}"></script>
      
    </div>
  </body>
</html>
