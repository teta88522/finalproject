<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>새 버전(로드맵) 생성</title>

    <link rel="stylesheet" th:href="@{/css/milestones/common_layout_mile.css}" />
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/setting-create.css}" />
  </head>
  <body>
    <div layout:fragment="Content">
      <div class="container-fluid roadmap-page-wrapper">
        <div class="roadmap-page-panel">
          <div class="roadmap-page-header">
            <div>
              <h3 class="roadmap-page-title">새 로드맵 만들기</h3>
            </div>
          </div>
          <div class="roadmap-page-body">
            <form
              id="versionCreateForm"
              th:action="@{/project/{projectId}/roadmap/setting_create(projectId=${projectId})}"
              method="POST"
              novalidate
            >
              <input
                type="hidden"
                name="projectId"
                id="hiddenProjectId"
                th:value="${projectId}"
              />
              <input type="hidden" name="statusCode" value="k001" />

              <div class="form-group">
                <label class="form-label" for="versionName"
                  >버전명 <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="versionName"
                  name="versionName"
                  class="form-control"
                  placeholder="예: v1.0.0 출시 로드맵"
                />

                <div id="nameError" class="error-message" style="display: none">
                  버전명을 입력해주세요.
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="description"
                  >설명<span class="required">*</span></label
                >
                <textarea
                  id="description"
                  name="description"
                  class="form-control"
                  rows="5"
                  placeholder="이 버전에 대한 상세 설명을 입력하세요."
                ></textarea>

                <div id="descError" class="error-message" style="display: none">
                  이 버전에 대한 상세 설명을 입력하세요.
                </div>
              </div>

              <div class="form-group checkbox-group">
                <input
                  type="checkbox"
                  id="defaultYn"
                  name="defaultYn"
                  value="Y"
                  class="form-checkbox"
                  checked
                />
                <label for="defaultYn"
                  >이 버전을 프로젝트의 기본(Default) 버전으로
                  설정합니다.</label
                >
              </div>

              <div class="roadmap-page-footer">
                <button
                  type="button"
                  class="btn btn-custon-rounded-four custom-white-btn"
                  onclick="history.back()"
                >
                  취소
                </button>
                <button type="button" id="btnSubmit" class="btn btn-custon-rounded-four custom-default-btn">
                  생성하기
                </button>
              </div>
            </form>
        </div>
      </div>

      <script th:src="@{/js/roadmap/setting-create.js}"></script>
    </div>
  </body>
</html>
