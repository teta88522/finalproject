<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>로드맵(버전) 목록</title>
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/roadmap/roadmap-list-full.css}" />
  </head>
  <body>
    <div layout:fragment="Content">
      <div class="kiaalap-wrapper milestone-container">
        <script th:if="${errorMessage}">
          alert("[[${errorMessage}]]");
        </script>

        <div class="list-header-controls">
          <h2>로드맵 목록</h2>
          <a th:href="@{/roadmap/roadmap_create}" class="btn btn-primary">
            ➕ 버전 추가
          </a>
        </div>

        <div class="kiaalap-panel filter-panel">
          <div class="filter-group">
            <label for="roadmapFilter">로드맵 :</label>
            <select id="roadmapFilter" class="filter-control">
              <option value="">전체 로드맵</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="milestoneFilter">마일스톤 :</label>
            <select id="milestoneFilter" class="filter-control">
              <option value="">전체 마일스톤</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="issueSearch">일감 검색 :</label>
            <input
              type="text"
              id="issueSearch"
              class="filter-control"
              placeholder="일감 제목 입력"
            />
          </div>
        </div>

        <div class="kiaalap-panel list-panel">
          <div th:if="${#lists.isEmpty(roadmapList)}" class="empty-msg">
            생성된 로드맵(버전)이 없습니다.
          </div>

          <div
            class="roadmap-item"
            th:each="roadmap : ${roadmapList}"
            th:attr="data-roadmap-id=${roadmap.versionId}"
          >
            <div class="roadmap-header">
              <div class="title-area">
                <span th:if="${roadmap.defaultYn == 'Y'}" class="badge-default"
                  >★ 기본</span
                >

                <h3>
                  <a
                    th:href="@{/roadmap/detail(id=${roadmap.versionId})}"
                    class="title-link hover-primary"
                    th:text="${roadmap.versionName}"
                    >1.0.0</a
                  >
                </h3>

                <span
                  class="status-badge"
                  th:classappend="${roadmap.statusCode == 'k001' ? 'status-planned' : (roadmap.statusCode == 'k002' ? 'status-progress' : 'status-done')}"
                  th:text="${roadmap.statusCode == 'k001' ? '진행 예정' : (roadmap.statusCode == 'k002' ? '진행 중' : '완료')}"
                >
                </span>
              </div>
              <div class="control-area">
                <a
                  th:href="@{/roadmap/roadmap_update(versionId=${roadmap.versionId})}"
                  class="btn btn-sm btn-default"
                  th:if="${roadmap.statusCode != 'k003'}"
                  >관리</a
                >
                <span class="toggle-icon">▼</span>
              </div>
            </div>

            <div class="roadmap-body">
              <div
                class="milestone-item"
                th:each="milestone : ${roadmap.milestoneList}"
                th:if="${milestone != null and milestone.milestoneId != null}"
                th:attr="data-milestone-id=${milestone.milestoneId}"
              >
                <div class="milestone-header">
                  <div class="milestone-info">
                    <span class="m-title">
                      <a
                        th:href="@{/milestones/detail(id=${milestone.milestoneId})}"
                        class="title-link hover-primary"
                        th:text="${milestone.title}"
                        >마일스톤 타이틀</a
                      >
                    </span>

                    <span
                      class="status-badge status-progress"
                      th:text="${milestone.statusCode}"
                      >진행 중</span
                    >
                  </div>
                  <div class="m-date">
                    <span th:text="${milestone.startDate}"></span> ~
                    <span th:text="${milestone.endDate}"></span>
                  </div>
                </div>

                <div
                  class="issue-list"
                  th:if="${milestone.issueList != null and not #lists.isEmpty(milestone.issueList)}"
                >
                  <div
                    class="issue-item"
                    th:each="issue : ${milestone.issueList}"
                    th:if="${issue.issueId != null}"
                    th:attr="data-issue-id=${issue.issueId}"
                  >
                    <div class="issue-info-wrap">
                      <span
                        class="status-badge status-planned"
                        th:text="${issue.issueStatusId}"
                        >진행 예정</span
                      >

                      <span class="issue-info">
                        <a
                          th:href="@{/issues/detail(id=${issue.issueId})}"
                          class="title-link hover-primary"
                          th:text="${issue.title}"
                          >일감 타이틀</a
                        >
                      </span>
                    </div>
                    <div class="issue-date">
                      <span th:text="${issue.startDate}"></span> ~
                      <span th:text="${issue.dueDate}"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <script th:src="@{/js/roadmap/roadmap-list-full.js}"></script>
    </div>
  </body>
</html>
