<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	th:href="@{/css/sourcerepository/sourcerepositoryFileDetail.css}">
</head>
<body>
	<div layout:fragment="Content">
		<div class="file-detail-container">
			<!-- Breadcrumb -->
			<div class="detail-breadcrumb">
				<a th:href="@{/project/{projectId}/sourcerepository(projectId=${projectId})}">저장소 관리</a>
				/ <a th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, branch=${branch})}">파일 목록</a>
				<!-- ✅ 경로 전체를 breadcrumb로 표시. 마지막 조각(파일명)은 링크 없이 텍스트로만 -->
				<th:block th:each="crumb, iter : ${breadcrumbs}">
					/ <a th:if="${!iter.last}"
						th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, path=${crumb.path}, branch=${branch})}"
						th:text="${crumb.name}">folder</a>
					<span th:if="${iter.last}" th:text="${crumb.name}">README.md</span>
				</th:block>
			</div>
 
			<!-- Header -->
			<div class="detail-header">
				<div class="detail-header-top">
					<h1 th:text="${fileName}">README.md</h1>
					<!-- ✅ 브랜치 전체 이력이 아니라 "이 파일 경로"의 커밋 이력으로 이동 (GitHub commits?path= 활용) -->
					<a
						th:href="@{/project/{projectId}/sourcerepository/file-history(projectId=${projectId}, path=${filePath}, branch=${branch})}"
						class="detail-history-btn"
						style="text-decoration: none;">
						📜 History
					</a>
				</div>
				<div class="detail-meta">
					<span class="detail-meta-item">
						<strong>Size:</strong> <span th:text="${fileSize}">1.2 KB</span>
					</span>
					<span class="detail-meta-item">
						<strong>Last Modified:</strong> <span th:text="${#temporals.format(lastModified, 'yyyy-MM-dd HH:mm:ss')}">2024-06-30 14:30:00</span>
					</span>
				</div>
			</div>
 
			<!-- File Content Header (코드 복사, 다운로드, 파일명 복사) -->
			<div class="detail-content-header">
				<div class="detail-content-title">
					<span class="detail-file-icon">📄</span>
					<span class="detail-file-name" th:text="${fileName}">README.md</span>
					<button
						type="button"
						class="detail-copy-btn"
						onclick="copyFileName()"
						title="파일명 복사">
						📋 복사
					</button>
				</div>
				<div class="detail-content-actions">
					<button
						type="button"
						class="detail-action-btn detail-action-copy"
						onclick="copyCode()"
						title="코드 전체 복사">
						📋 코드 복사
					</button>
					<button
						type="button"
						class="detail-action-btn detail-action-download"
						onclick="downloadFile()"
						title="파일 다운로드">
						⬇️ 다운로드
					</button>
				</div>
			</div>
 
			<!-- File Content -->
			<div class="detail-content">
				<pre class="file-content" id="fileContent" th:text="${fileContent}">// File content here</pre>
			</div>
 
			<!-- Actions -->
			<div class="detail-actions">
				<a
					th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, branch=${branch})}"
					class="detail-btn detail-btn-secondary">
					← 파일 목록으로 돌아가기
				</a>
				<a
					th:href="@{/project/{projectId}/sourcerepository(projectId=${projectId})}"
					class="detail-btn detail-btn-secondary">
					🏠 저장소 메인
				</a>
			</div>
		</div>

		<!-- ✅✅ layout:fragment="Content" 안쪽으로 이동: fragment 밖에 있으면 Thymeleaf Layout
		     Dialect가 최종 렌더링에서 제외시켜서, 복사/다운로드 버튼의 onclick이
		     "함수가 정의되지 않음" 에러로 조용히 실패하던 문제가 있었음 -->
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script th:src="@{/js/common/pf-confirm.js}"></script>
		<script>
			// 파일명 복사
			function copyFileName() {
				const fileName = document.querySelector('.detail-file-name').textContent;
				navigator.clipboard.writeText(fileName).then(() => {
					window.PFDialog.alert('파일명이 복사되었습니다: ' + fileName, { title: '복사 완료', icon: 'success' });
				}).catch(() => {
					window.PFDialog.alert('복사에 실패했습니다', { title: '복사 실패', icon: 'error' });
				});
			}
 
			// 코드 전체 복사
			function copyCode() {
				const fileContent = document.getElementById('fileContent').textContent;
				navigator.clipboard.writeText(fileContent).then(() => {
					window.PFDialog.alert('코드가 복사되었습니다', { title: '복사 완료', icon: 'success' });
				}).catch(() => {
					window.PFDialog.alert('복사에 실패했습니다', { title: '복사 실패', icon: 'error' });
				});
			}

			// ✅ 파일 다운로드 (기존엔 파일 내용을 그대로 URL로 써서 깨져 있었음 → Blob으로 다운로드)
			function downloadFile() {
				const fileName = document.querySelector('.detail-file-name').textContent;
				const fileContent = document.getElementById('fileContent').textContent;
				const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = fileName;
				document.body.appendChild(a);
				a.click();
				document.body.removeChild(a);
				URL.revokeObjectURL(url);
			}
		</script>
	</div>
</body>

</html>
