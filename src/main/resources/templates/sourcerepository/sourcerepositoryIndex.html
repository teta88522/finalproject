<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	th:href="@{/css/sourcerepository/sourcerepositoryIndex.css}">
</head>
<body>
	<div layout:fragment="Content">
	<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
		<div class="index-container">

			<!-- Alert Messages -->
			<div th:if="${errorMessage}"
				style="color: red; padding: 10px; background: #ffebee; margin-bottom: 20px;">
				<span th:text="${errorMessage}"></span>
			</div>

			<div th:if="${successMessage}"
				style="color: green; padding: 10px; background: #e8f5e9; margin-bottom: 20px;">
				<span th:text="${successMessage}"></span>
			</div>

			<!-- ✅ 저장소 미연결(신규 프로젝트 등) 안내 - issues 일감생성 화면과 동일한 스타일 재사용 -->
			<div th:if="${repoNotConnected}" class="page-message page-message-info">
				<span>저장소 연결이 필요합니다. 'GitHub 동기화' 버튼으로 연동해주세요.</span>
			</div>

			<!-- Header -->
			<div class="index-header">
				<h1>저장소 관리</h1>
				<p>GitHub 저장소의 파일과 커밋 이력을 조회합니다</p>
			</div>

			<!-- Info Grid -->
			<div class="index-info-grid">
				<div class="index-info-card">
					<div class="label">프로젝트 ID</div>
					<div class="value" th:text="${projectId}">-</div>
				</div>
				<div class="index-info-card">
					<div class="label">Repository</div>
					<div class="value" th:text="${savedGitUrl != null ? savedGitUrl : '-'}">-</div>
				</div>
				<div class="index-info-card">
					<div class="label">Branch</div>
					<div class="value" th:text="${savedBranch != null ? savedBranch : '-'}">-</div>
				</div>
			</div>

			<!-- Actions -->
			<div class="index-actions">
				<!-- ✅ 동기화된 적이 없으면(savedGitUrl 없음) 클릭 안 되는 비활성 버튼으로 표시 -->
				<a th:if="${savedGitUrl != null and !savedGitUrl.isEmpty()}"
					th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId})}"
					class="btn btn-custon-rounded-four custom-white-btn">파일 목록 보기 </a>
				<button th:unless="${savedGitUrl != null and !savedGitUrl.isEmpty()}"
					type="button" class="btn btn-custon-rounded-four custom-white-btn" disabled
					title="먼저 GitHub 동기화를 진행해주세요"
					style="opacity: 0.5; cursor: not-allowed;">파일 목록 보기 </button>
				<!-- ✅ "전체 브랜치 동기화" 버튼 제거: 모달 안의 "모든 브랜치 동기화" 체크박스로 이미 커버됨 -->
				<button type="button" data-toggle="modal" data-target="#syncModal"
					onclick="setSyncAllMode(false)"
					class="btn btn-custon-rounded-four custom-default-btn">GitHub 동기화</button>
			</div>
		</div>

		<!-- GitHub 동기화 모달 (단일 브랜치 / 전체 브랜치 공용) -->
		<div class="modal fade" id="syncModal" tabindex="-1" role="dialog">
			<div class="modal-dialog" role="document"
				style="border-radius: 20px;">
				<div class="modal-content"
					style="border-radius: 20px; overflow: hidden; border: none;">
					<form id="syncForm"
						th:action="@{/project/{projectId}/sourcerepository/sync-modal(projectId=${projectId})}"
						method="post" onsubmit="showSyncingModal();">
						<!-- 헤더 -->
						<div
							style="background: #031225; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between;">
							<h4
								style="color: #fff; margin: 0; font-size: 15px; font-weight: 500;">
								GitHub 저장소 연동</h4>
							<span data-dismiss="modal"
								style="color: #fff; font-size: 18px; cursor: pointer;">✕</span>
						</div>
						<!-- 바디 -->
						<div class="modal-body" style="padding: 24px;">
							<div class="form-group">
								<label style="font-size: 13px; color: #555;"> GitHub URL
									<span style="color: #e24b4a">*</span>
								</label> <input type="text" name="gitHubUrl" class="form-control"
									placeholder="https://github.com/owner/repository" required
									th:value="${savedGitUrl}"
									style="border-radius: 10px; border: 1px solid #ddd; font-size: 13px; height: 36px;">
								<small style="color: #999; margin-top: 4px; display: block;">
									예: https://github.com/pixcel-team/pixcel-project </small>
							</div>
							<div class="form-group" style="margin-top: 16px;">
								<label style="font-size: 13px; color: #555;"> Branch <span
									style="color: #e24b4a">*</span>
								</label> <select name="branch" class="form-control" required
									style="border-radius: 10px; border: 1px solid #ddd; font-size: 13px; height: 36px;">
									<option value="">Branch를 선택하세요</option>
									<option value="master">master</option>
									<option value="main">main</option>
									<option value="develop">develop</option>
									<option value="dev">dev</option>
								</select> <small style="color: #999; margin-top: 4px; display: block;">
									기본 Branch를 선택하세요 (전체 브랜치 동기화 시에도 기본 브랜치로 저장됩니다) </small>
							</div>
							<!-- ✅ 전체 브랜치 동기화 여부 -->
							<div class="form-group" style="margin-top: 16px;">
								<label style="font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px;">
									<input type="checkbox" id="syncAllBranchesCheckbox" name="syncAllBranches" value="true">
									이 저장소의 모든 브랜치를 동기화
								</label>
								<small style="color: #999; margin-top: 4px; display: block;">
									체크하지 않으면 위에서 선택한 브랜치만 동기화됩니다 </small>
							</div>
						</div>
						<!-- 푸터 -->
						<div class="modal-footer"
							style="border-top: 1px solid #f0f0f0; padding: 14px 24px 20px;">
							<button type="button"
								class="btn btn-custon-rounded-four custom-white-btn"
								data-dismiss="modal">취소</button>
							<button type="submit"
								class="btn btn-custon-rounded-four custom-default-btn">
								저장</button>
						</div>
						</form>
				</div>
			</div>
		</div>
	</div>
</div>
		<!-- ✅ 동기화 중 로딩 오버레이 - issues 화면과 동일한 프로젝트 표준 패턴 -->
		<div id="syncLoadingOverlay" class="issues-loading-overlay" hidden
			aria-live="polite" aria-busy="true">
			<div class="issues-loading-box">
				<span class="issues-loading-spinner"></span>
				<strong>동기화 중</strong>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script th:src="@{/js/common/pf-confirm.js}"></script>
		<script>
    const gitHubUrlInput = document.querySelector('input[name="gitHubUrl"]');
    const branchSelect = document.querySelector('select[name="branch"]');

    // ✅ 같은 URL을 반복 검증하지 않도록 마지막으로 검증한 URL을 기억
    let lastValidatedUrl = null;

    function validateGitHubUrlAndLoadBranches(url) {
        if (!url) return;
        if (url === lastValidatedUrl) return;

        setBranchLoadingState();

        fetch(`/project/${getProjectIdFromURL()}/sourcerepository/validate-url?gitHubUrl=${encodeURIComponent(url)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success && data.branches) {
                lastValidatedUrl = url;
                branchSelect.innerHTML = '';
                data.branches.forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch.name;
                    option.textContent = branch.isDefault === 'true' ? `${branch.name} (기본)` : branch.name;
                    if (branch.isDefault === 'true') option.selected = true;
                    branchSelect.appendChild(option);
                });
            } else {
                // ✅ 실패 시 원인을 사용자에게 노출 (기존엔 조용히 무시되어 원인 파악이 불가능했음)
                resetBranchSelectToDefault();
                window.PFDialog.alert(data.error || 'GitHub 저장소 검증에 실패했습니다. 잠시 후 다시 시도해주세요.', {
                    title: '저장소 검증 실패',
                    icon: 'warning'
                });
            }
        })
        .catch(error => {
            console.error('Error:', error);
            resetBranchSelectToDefault();
            window.PFDialog.alert('GitHub 저장소 검증 요청 중 오류가 발생했습니다: ' + error.message, {
                title: '오류',
                icon: 'error'
            });
        });
    }

    gitHubUrlInput.addEventListener('blur', function() {
        validateGitHubUrlAndLoadBranches(this.value.trim());
    });

    // ✅ 이전에 저장해둔 GitHub URL이 이미 입력창에 채워져 있다면(재동기화 상황),
    //    사용자가 다시 타이핑하지 않아도 자동으로 브랜치 목록을 불러옴
    document.addEventListener('DOMContentLoaded', function() {
        const prefilled = gitHubUrlInput.value.trim();
        if (prefilled) {
            validateGitHubUrlAndLoadBranches(prefilled);
        }
    });

    function setBranchLoadingState() {
        branchSelect.innerHTML = '<option value="">확인 중...</option>';
    }

    function resetBranchSelectToDefault() {
        branchSelect.innerHTML = `
            <option value="">Branch를 선택하세요</option>
            <option value="master">master</option>
            <option value="main">main</option>
            <option value="develop">develop</option>
            <option value="dev">dev</option>
        `;
    }

    function getProjectIdFromURL() {
        const match = window.location.pathname.match(/\/project\/([^/]+)\//);
        return match ? match[1] : '';
    }

    // ✅ "GitHub 동기화" / "전체 브랜치 동기화" 버튼 중 어떤 걸 눌렀는지에 따라 체크박스를 미리 세팅
    function setSyncAllMode(allBranches) {
        const checkbox = document.getElementById('syncAllBranchesCheckbox');
        if (checkbox) checkbox.checked = allBranches;
    }

    // ✅ 동기화 폼 제출 시 "동기화 중" 로딩 모달로 전환.
    //    실제 폼 submit(페이지 이동)은 그대로 진행되고, 응답이 올 때까지 이 로딩 화면이 보임.
    function showSyncingModal() {
        $('#syncModal').modal('hide');
        // ✅ issues 상세화면과 동일한 프로젝트 표준 로딩 오버레이 패턴으로 통일
        var overlay = document.getElementById('syncLoadingOverlay');
        if (overlay) {
            overlay.hidden = false;
        }
    }
</script>

	</div>
</body>
</html>
