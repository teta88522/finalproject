<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	th:href="@{/css/sourcerepository/sourcerepositoryCommitList.css}">
</head>
<body>
	<div layout:fragment="Content">
		<div class="list-container">
 
			<!-- Breadcrumb -->
			<div class="detail-breadcrumb" style="margin-bottom: 20px; color: #666; font-size: 13px;">
				<a th:href="@{/project/{projectId}/sourcerepository(projectId=${projectId})}"
					style="color: #007bff; text-decoration: none;">저장소 관리</a> /
				<a th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, branch=${branch})}"
					style="color: #007bff; text-decoration: none;">파일 목록</a> /
				<!-- ✅ 이 경로가 파일인지 폴더인지 여기서는 알 수 없어서(폴더 경로로도 들어올 수 있음)
				     잘못된 링크를 걸지 않도록 일반 텍스트로만 표시 -->
				<span th:text="${fileName}">README.md</span> /
				<span>History</span>
			</div>
 
			<!-- Header -->
			<div class="list-header">
				<div>
					<h2>📜 <span th:text="${fileName}">파일</span> 이력</h2>
					<div class="list-header-meta" th:text="${filePath}">src/main/App.js</div>
				</div>
				<div class="list-header-meta" th:text="'Branch: ' + ${branch}">Branch: main</div>
			</div>
 
			<!-- Commit List -->
			<div class="list-commit-list" th:if="${!commits.isEmpty()}">
				<div class="list-commit-item" th:each="commit : ${commits}">
					<div class="list-commit-header">
						<div class="list-commit-message" th:text="${commit.commitMessage}">
							Fix #123 - Update login</div>
						<div class="list-commit-sha" th:text="${commit.commitHash}">abc123def456</div>
					</div>
 
					<div class="list-commit-meta">
						<div class="list-commit-author">
							<span>✍️</span> <span th:text="${commit.authorName}">John
								Doe</span>
						</div>
					</div>
 
					<div class="list-commit-footer">
						<div class="list-commit-date"
							th:text="${#temporals.format(commit.committedAt, 'yyyy-MM-dd HH:mm:ss')}">
							2024-06-30 14:30:00</div>
					</div>
				</div>
			</div>
 
			<!-- Empty State -->
			<div class="list-empty-state" th:if="${commits.isEmpty()}">
				<p>💭 이 파일과 관련된 커밋이 없습니다</p>
				<p style="font-size: 13px;">GitHub에 해당 경로의 커밋 이력이 없거나, 아직 반영되지 않았을 수 있습니다</p>
			</div>
 
		</div>
	</div>
</body>
</html>
