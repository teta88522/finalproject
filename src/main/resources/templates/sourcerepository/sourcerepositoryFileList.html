<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	th:href="@{/css/sourcerepository/sourcerepositoryFileList.css}">
</head>
<body>
	<div layout:fragment="Content">
	<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
		<div class="file-list-container">
			<!-- ✅ 파일 상세 조회 실패 등으로 리다이렉트되어 온 에러 메시지 표시 (이전엔 표시할 곳이 없어 조용히 사라졌음) -->
			<div th:if="${errorMessage}"
				style="color: red; padding: 10px; background: #ffebee; margin-bottom: 20px;">
				<span th:text="${errorMessage}"></span>
			</div>

			<!-- Breadcrumb -->
			<div class="file-breadcrumb">
				<div class="file-breadcrumb-text">
					<a
						th:href="@{/project/{projectId}/sourcerepository(projectId=${projectId})}">저장소
						관리</a> /
					<!-- ✅ 현재 폴더 경로 전체를 breadcrumb로 표시. 각 조각은 그 폴더로 바로 이동 -->
					<a th:if="${breadcrumbs == null or breadcrumbs.isEmpty()}"
						th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, branch=${branch})}">파일 목록</a>
					<th:block th:unless="${breadcrumbs == null or breadcrumbs.isEmpty()}">
						<a th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, branch=${branch})}">파일 목록</a>
						<th:block th:each="crumb, iter : ${breadcrumbs}">
							/ <a th:if="${!iter.last}"
								th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, path=${crumb.path}, branch=${branch})}"
								th:text="${crumb.name}">folder</a>
							<span th:if="${iter.last}" th:text="${crumb.name}">folder</span>
						</th:block>
					</th:block>
				</div>
				<!-- ✅ 저장소 메인으로 가는 버튼을 하단에서 breadcrumb 우측(상단)으로 이동 -->
				<a
					th:href="@{/project/{projectId}/sourcerepository(projectId=${projectId})}"
					class="btn btn-custon-rounded-four custom-default-btn">저장소 메인</a>
			</div>
 
			<!-- Header with Branch Selector -->
			<div class="file-header">
				<div>
					<h2>파일 목록</h2>
					<div class="file-header-meta">
						<form method="get"
							style="display: flex; gap: 10px; align-items: center;">
							<label for="branchSelect" style="font-size: 13px; color: #666;">Branch:</label>
							<select id="branchSelect" name="branch"
								onchange="this.form.submit()"
								style="padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;">
								<option th:value="${branch}" th:text="${branch}"></option>
							</select>
						</form>
					</div>
				</div>
				<!-- ✅ 현재 보고 있는 경로(폴더)가 있으면 그 경로 기준으로 필터링된 이력으로,
				     루트(경로 없음)면 브랜치 전체 이력으로 이동 -->
				<a
					th:href="${currentPath != null and !currentPath.isEmpty()} ? @{/project/{projectId}/sourcerepository/file-history(projectId=${projectId}, path=${currentPath}, branch=${branch})} : @{/project/{projectId}/sourcerepository/commits(projectId=${projectId}, branch=${branch})}"
					class="btn btn-custon-rounded-four custom-default-btn"
					style="text-decoration: none;">History</a>
			</div>
 
			<!-- File List -->
			<div class="file-list-wrapper">
				<div class="file-list" th:if="${!files.isEmpty()}">
					<div class="file-item" th:each="file : ${files}">
						<div class="file-icon">
							<i th:if="${file.get('type') == 'dir'}" class="fa fa-folder"
								style="font-size: 18px; color: #f9a825;"></i> <i
								th:if="${file.get('type') == 'file'}" class="fa fa-file"
								style="font-size: 18px; color: #007bff;"></i>
						</div>
						<div class="file-info">
							<a th:if="${file.get('type') == 'file'}"
								th:href="@{/project/{projectId}/sourcerepository/file/{path}(projectId=${projectId}, path=${file.get('path')}, branch=${branch})}"
								class="file-name" th:text="${file.get('name')}"> README.md </a>
							<a th:if="${file.get('type') == 'dir'}"
								th:href="@{/project/{projectId}/sourcerepository/files(projectId=${projectId}, path=${file.get('path')}, branch=${branch})}"
								class="file-name" th:text="${file.get('name')}"> src </a>
							<div class="file-meta">
								<span th:if="${file.get('type') == 'file'}"
									th:text="${file.get('size')} + ' bytes'">1.2 KB</span>
							</div>
						</div>
					</div>
				</div>
 
				<!-- Empty State -->
				<div class="file-empty-state" th:if="${files.isEmpty()}">
					<p>📂 파일이 없습니다</p>
				</div>
			</div>
		</div>

			<!-- ✅ 동적 branch 로드 JavaScript -->
			<!-- ✅✅ layout:fragment="Content" 안쪽으로 이동: fragment 밖에 있으면 Thymeleaf Layout
			     Dialect가 최종 렌더링에서 제외시켜서 이 스크립트가 브라우저에 아예 전달되지 않았음
			     (그래서 /api/branches가 영영 호출되지 않고 드롭다운이 고정된 것처럼 보였음) -->
			<script>
			document.addEventListener('DOMContentLoaded', function() {
			    const projectId = '[[${projectId}]]';
			    const currentBranch = '[[${branch}]]';
			    
			    fetch(`/project/${projectId}/sourcerepository/api/branches`)
			        .then(response => response.json())
			        .then(data => {
			            const select = document.getElementById('branchSelect');
			            select.innerHTML = '';
			            
			            data.forEach(branch => {
			                const option = document.createElement('option');
			                option.value = branch;
			                option.textContent = branch;
			                if (branch === currentBranch) option.selected = true;
			                select.appendChild(option);
			            });
			        })
			        .catch(error => console.error('Error:', error));
			});
			</script>
	</div>
	</div>
</div>
</body>

</html>
