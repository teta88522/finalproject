<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	th:href="@{/css/sourcerepository/sourcerepositoryCommitList.css}">
</head>
<body>
	<div layout:fragment="Content">
	<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
		<div class="list-container">
			<!-- Header -->
			<div class="list-header">
				<div>
					<h2>Commit 목록</h2>
					<div class="list-header-meta"
						th:text="'총 ' + ${totalElements} + '개 커밋'">총 0개 커밋</div>
				</div>
				<div class="list-header-meta" th:text="'Branch: ' + ${branch}">Branch:
					main</div>
			</div>

			<!-- Controls - ✅ select에 ID 추가됨 -->
			<div class="list-controls">
				<form method="get" style="display: flex; gap: 10px; width: 100%;">
					<select id="branchSelect" name="branch"
						onchange="this.form.submit()"
						style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
						<option th:value="${branch}" th:text="${branch}"></option>
					</select>
					<button type="submit" class="btn btn-custon-rounded-four custom-default-btn">조회</button>
				</form>
			</div>

			<!-- Commit List -->
			<div class="list-commit-list" th:if="${!commits.isEmpty()}">
				<div class="list-commit-item" th:each="commit : ${commits}">
					<div class="list-commit-header">
						<div class="list-commit-message" th:text="${commit.commitMessage}">
							Fix #123 - Update login</div>
						<div class="list-commit-sha" th:text="${commit.commitHash}">abc123def456</div>
					</div>

					<div class="list-commit-meta">
						<div class="list-commit-author">
							<span></span> <span th:text="${commit.authorName}">John
								Doe</span>
						</div>
						<div th:if="${commit.issueId != null and commit.issueId != '-'}"
							class="list-commit-issue" th:text="'#' + ${commit.issueId}">
							#123</div>
						<div th:if="${commit.issueId == null or commit.issueId == '-'}"
							class="list-commit-issue none">이슈 없음</div>
					</div>

					<div class="list-commit-footer">
						<div class="list-commit-date"
							th:text="${#temporals.format(commit.committedAt, 'yyyy-MM-dd HH:mm:ss')}">
							2024-06-30 14:30:00</div>
					</div>
				</div>
			</div>

			<!-- Empty State -->
			<div class="list-empty-state" th:if="${commits.isEmpty()}">
				<p>조회된 커밋이 없습니다</p>
				<p style="font-size: 13px;">이 브랜치는 아직 동기화되지 않았을 수 있습니다.
					<a th:href="@{/project/{projectId}/sourcerepository(projectId=${projectId})}">저장소 메인에서 동기화하기 →</a>
				</p>
			</div>

			<!-- Pagination -->
			<div class="list-pagination" th:if="${totalPages > 1}">
				<!-- Previous Page -->
				<a th:if="${hasPreviousPage}"
					th:href="@{/project/{projectId}/sourcerepository/commits(projectId=${projectId}, branch=${branch}, page=${currentPage - 1})}"
					class="list-pagination-link">← 이전</a> <span
					th:if="!${hasPreviousPage}" class="disabled">← 이전</span>

				<!-- Page Numbers -->
				<a th:each="p : ${#numbers.sequence(startPage, endPage)}"
					th:href="@{/project/{projectId}/sourcerepository/commits(projectId=${projectId}, branch=${branch}, page=${p})}"
					th:text="${p}" th:class="${p == currentPage ? 'active' : ''}">
					1 </a>

				<!-- Next Page -->
				<a th:if="${hasNextPage}"
					th:href="@{/project/{projectId}/sourcerepository/commits(projectId=${projectId}, branch=${branch}, page=${currentPage + 1})}"
					class="list-pagination-link">다음 →</a> <span th:if="!${hasNextPage}"
					class="disabled">다음 →</span>
			</div>
		</div>

		<!-- ✅ 동적 branch 로드 JavaScript -->
		<!-- ✅✅ layout:fragment="Content" 안쪽으로 이동: Thymeleaf Layout Dialect는 fragment 밖의
		     내용을 최종 렌더링에서 제외시켜서, 예전 위치(fragment 밖)에서는 이 스크립트가
		     브라우저에 아예 전달되지 않아 /api/branches가 영영 호출되지 않던 문제가 있었음. -->
		<script>
		document.addEventListener('DOMContentLoaded', function() {
		    const projectId = '[[${projectId}]]';
		    const currentBranch = '[[${branch}]]';
		    
		    fetch(`/project/${projectId}/sourcerepository/api/branches`)
		        .then(response => response.json())
		        .then(data => {
		            const select = document.getElementById('branchSelect');
		            if (!select) {
		                console.error('branchSelect element not found');
		                return;
		            }
		            select.innerHTML = '';
		            
		            data.forEach(branch => {
		                const option = document.createElement('option');
		                option.value = branch;
		                option.textContent = branch;
		                if (branch === currentBranch) option.selected = true;
		                select.appendChild(option);
		            });
		        })
		        .catch(error => console.error('Error loading branches:', error));
		});
		</script>
	</div>
</div>
</div>
</body>
</html>
