<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>테스트 케이스 목록</title>

<link rel="stylesheet" th:href="@{/css/testcase/testCaseList.css}">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/common/pf-confirm.js}"></script>
</head>

<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
    <div class="testcase-list-page">

        <!-- 상단 -->
        <div class="page-header">
            <div>
                <h2 class="page-title">테스트 케이스 목록</h2>
                <p class="page-sub-title">
                    프로젝트 버전별 테스트 케이스를 조회합니다.
                </p>
            </div>

            <button type="button"
                    class="btn btn-custon-rounded-four custom-default-btn"
                    th:onclick="|location.href='@{/project/{projectId}/testcases/new(projectId=${projectId})}'|">
                테스트 케이스 생성
            </button>
        </div>

        <!-- 검색 영역 -->
        <form th:action="@{/project/{projectId}/testcases(projectId=${projectId})}"
              method="get"
              class="search-section"
              th:object="${testCaseSearchVO}"
              id="testCaseSearchForm">

            <input type="hidden" name="page" value="1">

            <div class="search-row">

                <!-- 버전 다중선택 -->
                <div class="search-field filter-group">
                    <label>버전</label>

                    <div class="filter-dropdown">
                        <button type="button" class="filter-dropdown-btn">
                            버전 선택
                        </button>

                        <div class="filter-check-list filter-dropdown-panel">
                            <label class="filter-check-item"
                                   th:each="version : ${versionList}">
                                <input type="checkbox"
                                       name="versionIdList"
                                       th:value="${version.versionId}"
                                       th:checked="${testCaseSearchVO.versionIdList != null and #lists.contains(testCaseSearchVO.versionIdList, version.versionId)}">
                                <span th:text="${version.versionName}">1.0.0</span>
                            </label>

                            <div th:if="${versionList == null or #lists.isEmpty(versionList)}"
                                 class="filter-empty">
                                등록된 버전이 없습니다.
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 유형 다중선택 -->
                <div class="search-field filter-group">
                    <label>유형</label>

                    <div class="filter-dropdown">
                        <button type="button" class="filter-dropdown-btn">
                            유형 선택
                        </button>

                        <div class="filter-check-list filter-dropdown-panel">
                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="testTypeCodeList"
                                       value="d001"
                                       th:checked="${testCaseSearchVO.testTypeCodeList != null and #lists.contains(testCaseSearchVO.testTypeCodeList, 'd001')}">
                                <span>기능</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="testTypeCodeList"
                                       value="d002"
                                       th:checked="${testCaseSearchVO.testTypeCodeList != null and #lists.contains(testCaseSearchVO.testTypeCodeList, 'd002')}">
                                <span>UI/UX</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="testTypeCodeList"
                                       value="d003"
                                       th:checked="${testCaseSearchVO.testTypeCodeList != null and #lists.contains(testCaseSearchVO.testTypeCodeList, 'd003')}">
                                <span>성능</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="testTypeCodeList"
                                       value="d004"
                                       th:checked="${testCaseSearchVO.testTypeCodeList != null and #lists.contains(testCaseSearchVO.testTypeCodeList, 'd004')}">
                                <span>보안</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="testTypeCodeList"
                                       value="d005"
                                       th:checked="${testCaseSearchVO.testTypeCodeList != null and #lists.contains(testCaseSearchVO.testTypeCodeList, 'd005')}">
                                <span>데이터</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="testTypeCodeList"
                                       value="d006"
                                       th:checked="${testCaseSearchVO.testTypeCodeList != null and #lists.contains(testCaseSearchVO.testTypeCodeList, 'd006')}">
                                <span>기타</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 상태 다중선택 -->
                <div class="search-field filter-group">
                    <label>상태</label>

                    <div class="filter-dropdown">
                        <button type="button" class="filter-dropdown-btn">
                            상태 선택
                        </button>

                        <div class="filter-check-list filter-dropdown-panel">
                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="statusCodeList"
                                       value="g001"
                                       th:checked="${testCaseSearchVO.statusCodeList != null and #lists.contains(testCaseSearchVO.statusCodeList, 'g001')}">
                                <span>활성</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="statusCodeList"
                                       value="g002"
                                       th:checked="${testCaseSearchVO.statusCodeList != null and #lists.contains(testCaseSearchVO.statusCodeList, 'g002')}">
                                <span>비활성</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 우선순위 다중선택 -->
                <div class="search-field filter-group">
                    <label>우선순위</label>

                    <div class="filter-dropdown">
                        <button type="button" class="filter-dropdown-btn">
                            우선순위 선택
                        </button>

                        <div class="filter-check-list filter-dropdown-panel">
                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="priorityCodeList"
                                       value="c001"
                                       th:checked="${testCaseSearchVO.priorityCodeList != null and #lists.contains(testCaseSearchVO.priorityCodeList, 'c001')}">
                                <span>상</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="priorityCodeList"
                                       value="c002"
                                       th:checked="${testCaseSearchVO.priorityCodeList != null and #lists.contains(testCaseSearchVO.priorityCodeList, 'c002')}">
                                <span>중</span>
                            </label>

                            <label class="filter-check-item">
                                <input type="checkbox"
                                       name="priorityCodeList"
                                       value="c003"
                                       th:checked="${testCaseSearchVO.priorityCodeList != null and #lists.contains(testCaseSearchVO.priorityCodeList, 'c003')}">
                                <span>하</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="search-field title-field">
                    <label for="title">제목</label>
                    <input type="text"
                           id="title"
                           th:field="*{title}"
                           placeholder="테스트 케이스 제목">
                </div>

                <div class="search-btn-area">
                    <button type="button"
                            class="btn btn-custon-rounded-four custom-white-btn"
                            th:onclick="|location.href='@{/project/{projectId}/testcases(projectId=${projectId})}'|">
                        초기화
                    </button>

                    <button type="submit"
                            class="btn btn-custon-rounded-four custom-default-btn">
                        검색
                    </button>
                </div>

            </div>
        </form>

        <!-- 목록 영역 -->
        <div class="list-section">

            <div class="list-header">
                <div>
                    <div class="list-title">테스트 케이스</div>
                    <div class="list-sub-text">
                        동일 버전에서 재사용 가능한 테스트 케이스 목록입니다.
                    </div>
                </div>

                <div class="list-count">
                    현재 페이지
                    <strong th:text="${testCaseSearchVO.page}">1</strong>
                </div>
            </div>

            <table class="testcase-table">
                <thead>
                    <tr>
                        <th class="check-col"></th>
                        <th>ID</th>
                        <th>제목</th>
                        <th>버전</th>
                        <th>유형</th>
                        <th>상태</th>
                        <th>우선순위</th>
                        <th>작성자</th>
                        <th>작성일</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:if="${testCaseList == null or #lists.isEmpty(testCaseList)}">
                        <td colspan="9" class="empty-row">
                            등록된 테스트 케이스가 없습니다.
                        </td>
                    </tr>

                    <tr th:each="testCase : ${testCaseList}">
                        <td class="check-col">
                            <input type="checkbox"
                                   class="case-check"
                                   th:value="${testCase.testCaseId}">
                        </td>

                        <td>
                            <a class="case-link"
                               th:href="@{/project/{projectId}/testcases/{testCaseId}/edit(
                                    projectId=${projectId},
                                    testCaseId=${testCase.testCaseId}
                               )}"
                               th:text="${testCase.testCaseId}">
                                TC_202606_0001
                            </a>
                        </td>

                        <td class="title-cell">
                            <a class="case-title-link"
                               th:href="@{/project/{projectId}/testcases/{testCaseId}/edit(
                                    projectId=${projectId},
                                    testCaseId=${testCase.testCaseId}
                               )}"
                               th:text="${testCase.title}">
                                테스트 케이스 제목
                            </a>
                        </td>

                        <td th:text="${testCase.versionName}">1.0.0</td>
                        <td th:text="${testCase.testTypeName}">기능</td>

                        <td>
                            <span class="status-badge"
                                  th:classappend="${testCase.statusCode == 'g001'} ? ' active' : ' inactive'"
                                  th:text="${testCase.statusName}">
                                활성
                            </span>
                        </td>

                        <td>
                            <span class="priority-badge"
                                  th:classappend="${testCase.priorityCode == 'c001'} ? ' high' : (${testCase.priorityCode == 'c002'} ? ' middle' : ' low')"
                                  th:text="${testCase.priorityName}">
                                중
                            </span>
                        </td>

                        <td th:text="${testCase.createdByName != null ? testCase.createdByName : '-'}">작성자</td>
                        <td th:text="${testCase.createdAt}">2026-06-29</td>
                    </tr>
                </tbody>
            </table>

            <!-- 선택 테스트케이스 상세 -->
            <div class="case-detail-section"
                 id="caseDetailSection"
                 style="display:none;">

                <div class="detail-selected-id" id="detailSelectedId">
                    선택된 테스트 케이스
                </div>

                <div class="detail-layout">

                    <div class="detail-left">
                        <div class="detail-title">기본 정보</div>

                        <div class="detail-form-row">
                            <label>제목</label>
                            <input type="text" id="detailTitle" readonly>
                        </div>

                        <div class="detail-form-row">
                            <label>유형</label>
                            <input type="text" id="detailType" readonly>
                        </div>

                        <div class="detail-form-row">
                            <label>상태</label>
                            <input type="text" id="detailStatus" readonly>
                        </div>

                        <div class="detail-form-row">
                            <label>버전</label>
                            <input type="text" id="detailVersion" readonly>
                        </div>

                        <div class="detail-form-row">
                            <label>우선순위</label>
                            <input type="text" id="detailPriority" readonly>
                        </div>

                        <div class="detail-form-row">
                            <label>생성자</label>
                            <input type="text" id="detailCreatedBy" readonly>
                        </div>

                        <div class="detail-form-row">
                            <label>생성일</label>
                            <input type="text" id="detailCreatedAt" readonly>
                        </div>
                    </div>

                    <div class="detail-right">

                        <div class="detail-block">
                            <div class="detail-title">사전 조건</div>
                            <textarea id="detailPreCondition" readonly></textarea>
                        </div>

                        <div class="detail-block">
                            <div class="detail-title">테스트 절차</div>

                            <table class="step-table">
                                <thead>
                                    <tr>
                                        <th>NO</th>
                                        <th>단계 설명</th>
                                        <th>예상 결과</th>
                                    </tr>
                                </thead>
                                <tbody id="detailStepBody">
                                    <tr>
                                        <td colspan="3">
                                            선택된 절차가 없습니다.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="detail-block">
                            <div class="detail-title">기대 결과</div>
                            <textarea id="detailExpectedResult" readonly></textarea>
                        </div>

                        <div class="detail-block">
                            <div class="detail-title">첨부파일</div>

                            <div class="detail-file-list"
                                 id="detailFileList">
                                등록된 첨부파일이 없습니다.
                            </div>
                        </div>

                    </div>

                </div>
            </div>

            <!-- 페이징 -->
            <div class="pagination">

                <a class="page-btn"
                   th:if="${testCaseSearchVO.page > 1}"
                   th:href="@{/project/{projectId}/testcases(
                        projectId=${projectId},
                        page=${testCaseSearchVO.page - 1},
                        versionIdList=${testCaseSearchVO.versionIdList},
                        testTypeCodeList=${testCaseSearchVO.testTypeCodeList},
                        statusCodeList=${testCaseSearchVO.statusCodeList},
                        priorityCodeList=${testCaseSearchVO.priorityCodeList},
                        title=${testCaseSearchVO.title}
                   )}">
                    이전
                </a>

                <span class="page-current"
                      th:text="${testCaseSearchVO.page}">
                    1
                </span>

                <a class="page-btn"
                   th:if="${testCaseSearchVO.hasNext}"
                   th:href="@{/project/{projectId}/testcases(
                        projectId=${projectId},
                        page=${testCaseSearchVO.page + 1},
                        versionIdList=${testCaseSearchVO.versionIdList},
                        testTypeCodeList=${testCaseSearchVO.testTypeCodeList},
                        statusCodeList=${testCaseSearchVO.statusCodeList},
                        priorityCodeList=${testCaseSearchVO.priorityCodeList},
                        title=${testCaseSearchVO.title}
                   )}">
                    다음
                </a>

            </div>

        </div>

    </div>
</div>
</div>
    <script th:inline="javascript">
        const message = /*[[${message}]]*/ null;
        const projectId = /*[[${projectId}]]*/ "";
        let currentDetailTestCaseId = "";

        function pfAlert(message, title, icon) {
            window.PFDialog.alert(message, {
                title: title || "알림",
                icon: icon || "info"
            });
        }

        if (message != null) {
            pfAlert(message, "알림", "info");
        }

        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("testCaseSearchForm");

            if (form) {
                form.addEventListener("keydown", function (event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        form.submit();
                    }
                });
            }

            const checks = document.querySelectorAll(".case-check");

            checks.forEach(function (check) {
                check.addEventListener("change", function () {

                    checks.forEach(function (otherCheck) {
                        if (otherCheck !== check) {
                            otherCheck.checked = false;
                        }
                    });

                    if (!check.checked) {
                        hideDetail();
                        return;
                    }

                    loadTestCaseDetail(check.value);
                });
            });
        });

        document.addEventListener("click", function (event) {
            const dropdownButton = event.target.closest(".filter-dropdown-btn");

            if (dropdownButton) {
                event.preventDefault();
                event.stopPropagation();

                const dropdown = dropdownButton.closest(".filter-dropdown");

                document.querySelectorAll(".filter-dropdown").forEach(function (item) {
                    if (item !== dropdown) {
                        item.classList.remove("open");
                    }
                });

                dropdown.classList.toggle("open");
                return;
            }

            if (event.target.closest(".filter-dropdown-panel")) {
                event.stopPropagation();
                return;
            }

            document.querySelectorAll(".filter-dropdown").forEach(function (item) {
                item.classList.remove("open");
            });
        });

        function loadTestCaseDetail(testCaseId) {

            fetch("/project/" + projectId + "/testcases/" + testCaseId)
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {

                    if (data == null || data.testCaseId == null) {
                        pfAlert("테스트 케이스 정보를 조회할 수 없습니다.", "조회 실패", "warning");
                        hideDetail();
                        return;
                    }

                    showDetail(data);
                })
                .catch(function () {
                    pfAlert("테스트 케이스 상세 조회 중 오류가 발생했습니다.", "조회 오류", "error");
                    hideDetail();
                });
        }

        function showDetail(data) {

            document.getElementById("caseDetailSection").style.display = "block";

            currentDetailTestCaseId = data.testCaseId;

            document.getElementById("detailSelectedId").innerText = data.testCaseId;

            document.getElementById("detailTitle").value = data.title || "";
            document.getElementById("detailType").value = data.testTypeName || "";
            document.getElementById("detailStatus").value = data.statusName || "";
            document.getElementById("detailVersion").value = data.versionName || "";
            document.getElementById("detailPriority").value = data.priorityName || "";
            document.getElementById("detailCreatedBy").value = data.createdByName || "";
            document.getElementById("detailCreatedAt").value = data.createdAt || "";

            document.getElementById("detailPreCondition").value = data.preCondition || "";
            document.getElementById("detailExpectedResult").value = data.expectedResult || "";

            drawStepList(data.stepList);
            drawFileList(data.fileList);
        }

        function drawStepList(stepList) {

            const stepBody = document.getElementById("detailStepBody");
            stepBody.innerHTML = "";

            if (stepList == null || stepList.length === 0) {
                const emptyRow = document.createElement("tr");
                emptyRow.innerHTML = '<td colspan="3">등록된 테스트 절차가 없습니다.</td>';
                stepBody.appendChild(emptyRow);
                return;
            }

            stepList.forEach(function (step) {
                const row = document.createElement("tr");

                row.innerHTML =
                    "<td>" + escapeHtml(step.stepNo) + "</td>" +
                    "<td>" + escapeHtml(step.stepDescription || "") + "</td>" +
                    "<td>" + escapeHtml(step.expectedResult || "") + "</td>";

                stepBody.appendChild(row);
            });
        }

        function drawFileList(fileList) {

            const fileBox = document.getElementById("detailFileList");
            fileBox.innerHTML = "";

            if (fileList == null || fileList.length === 0) {
                fileBox.innerHTML = '<div class="detail-file-empty">등록된 첨부파일이 없습니다.</div>';
                return;
            }

            const allDownloadBox = document.createElement("div");
            allDownloadBox.className = "detail-file-header";

            const allDownloadLink = document.createElement("a");
            allDownloadLink.className = "detail-file-download-all";
            allDownloadLink.href = "/project/" + projectId + "/testcases/" + encodeURIComponent(currentDetailTestCaseId) + "/files/download-all";
            allDownloadLink.innerText = "전체 다운로드";

            allDownloadBox.appendChild(allDownloadLink);
            fileBox.appendChild(allDownloadBox);

            fileList.forEach(function (file) {
                const item = document.createElement("div");
                item.className = "detail-file-item";

                const fileName = file.originalName || "파일명 없음";
                const fileSize = file.fileSize != null ? " (" + file.fileSize + " byte)" : "";

                item.innerHTML =
                    '<div class="detail-file-info">' +
                        '<span class="detail-file-name">' + escapeHtml(fileName) + '</span>' +
                        '<span class="detail-file-size">' + escapeHtml(fileSize) + '</span>' +
                    '</div>' +
                    '<a class="detail-file-download-btn" href="/project/' + projectId + '/testcases/files/' + encodeURIComponent(file.fileId) + '/download">다운로드</a>';

                fileBox.appendChild(item);
            });
        }

        function hideDetail() {
            document.getElementById("caseDetailSection").style.display = "none";
            currentDetailTestCaseId = "";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }
    </script>

</div>
</body>
</html>
