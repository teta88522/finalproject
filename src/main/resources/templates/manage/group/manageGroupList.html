<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>관리 - 그룹</title>

<link rel="stylesheet" th:href="@{/css/common-ui.css}">
<link rel="stylesheet" th:href="@{/css/common-fliter.css}">
<link rel="stylesheet"
	th:href="@{/css/manage/group/manageGroupList.css}">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/common/pf-confirm.js}"></script>
</head>

<body>
	<div layout:fragment="Content">
	<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
		<div class="manage-group-page">

			<div class="manage-page-header">
				<div>
					<h1 class="manage-page-title">관리 &gt; 그룹</h1>
					<p class="manage-page-sub-title">본인이 생성한 프로젝트의 그룹을 조회하고 관리할 수
						있습니다.</p>
				</div>

				<div class="manage-user-info">
					<span>관리자</span> <strong
						th:text="${userName != null ? userName : ownerId}">USER_ID</strong>
				</div>
			</div>

			<div th:if="${message != null}" class="message-box">
				<span th:text="${message}">메시지</span>
			</div>

			<div class="search-section manage-group-search">
				<div class="search-header">
					<div class="search-title">검색조건</div>

					<a th:href="@{/manage/groups/new}"
						class="btn btn-custon-rounded-four custom-default-btn">
						그룹 생성 </a>
				</div>

				<form th:action="@{/manage/groups}" method="get">
					<div class="search-form-row">

						<div class="search-field filter-group">
							<label>프로젝트</label>

							<div class="filter-dropdown">
								<button type="button" class="filter-dropdown-btn">프로젝트
									선택</button>

								<div class="filter-check-list filter-dropdown-panel">
									<label class="filter-check-item"
										th:each="project : ${myProjectList}">
										<input
										type="checkbox" name="projectIdList"
										th:value="${project.projectId}"
										th:checked="${projectIdList != null and #lists.contains(projectIdList, project.projectId)}">
										<span th:text="${project.projectName}">프로젝트명</span>
									</label>

									<div
										th:if="${myProjectList == null or #lists.isEmpty(myProjectList)}"
										class="filter-empty">생성한 프로젝트가 없습니다.</div>
								</div>
							</div>
						</div>

						<div class="search-field">
							<label for="groupName">그룹명</label>
							<input type="text"
								id="groupName" name="groupName" th:value="${groupName}"
								placeholder="그룹명 입력">
						</div>

						<div class="search-field">
							<label for="roleName">적용 역할</label>
							<input type="text"
								id="roleName" name="roleName" th:value="${roleName}"
								placeholder="역할명 입력">
						</div>

					</div>

					<div class="search-btn-area">
						<a th:href="@{/manage/groups}"
							class="btn btn-custon-rounded-four custom-white-btn">
							초기화 </a>

						<button type="submit"
							class="btn btn-custon-rounded-four custom-default-btn">
							검색</button>
					</div>
				</form>
			</div>

			<div class="project-summary-section">
				<div class="section-title">내 프로젝트 목록</div>
				<div class="section-sub-text">본인이 생성한 프로젝트 목록입니다. 그룹 생성 시 아래
					프로젝트 중 하나를 선택합니다.</div>

				<div class="project-chip-wrap">
					<div
						th:if="${myProjectList == null or #lists.isEmpty(myProjectList)}"
						class="empty-project">생성한 프로젝트가 없습니다.</div>

					<span th:each="project : ${myProjectList}" class="project-chip"
						th:text="${project.projectName}"> 프로젝트명 </span>
				</div>
			</div>

			<div class="group-list-section">

				<div class="list-header">
					<div>
						<div class="section-title">그룹 목록</div>
						<div class="section-sub-text">본인이 생성한 프로젝트에 등록된 그룹 목록입니다.</div>
					</div>

					<div class="list-count">
						총 <strong
							th:text="${manageGroupList == null ? 0 : #lists.size(manageGroupList)}">0</strong>
						건
					</div>
				</div>

				<div class="group-table-wrap">
					<table class="group-table">
						<thead>
							<tr>
								<th>프로젝트명</th>
								<th>그룹명</th>
								<th>구성원 수</th>
								<th>적용 역할</th>
								<th>설명</th>
								<th>관리</th>
							</tr>
						</thead>

						<tbody>
							<tr
								th:if="${manageGroupList == null or #lists.isEmpty(manageGroupList)}">
								<td colspan="6" class="empty-row">등록된 그룹이 없습니다.</td>
							</tr>

							<tr th:each="group : ${manageGroupList}">
								<td th:text="${group.projectName}">프로젝트명</td>

								<td class="group-name-cell">
									<a
									th:href="@{/manage/groups/{projectGroupId}(projectGroupId=${group.projectGroupId})}"
									th:text="${group.groupName}"> 그룹명 </a>
								</td>

								<td th:text="${group.memberCount}">0</td>

								<td>
									<span class="role-badge"
									th:text="${group.roleName != null ? group.roleName : '-'}">
										역할명 </span>
								</td>

								<td class="desc-cell"
									th:text="${group.groupAnswer != null ? group.groupAnswer : '-'}">
									설명</td>

								<td class="group-action-cell">

									<form th:action="@{/manage/groups/delete}" method="post"
										class="inline-delete-form js-pf-confirm-submit"
										data-confirm-title="그룹 삭제 확인"
										data-confirm-message="그룹을 삭제하시겠습니까?"
										data-confirm-confirm-text="삭제"
										data-confirm-icon="warning">

										<input type="hidden" name="projectGroupId"
											th:value="${group.projectGroupId}">

										<button type="submit" class="btn btn-custon-rounded-four btn-danger custom-btn">삭제</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

			</div>

		</div>
	</div>
</div>
</div>

<script th:inline="javascript">
    const message = /*[[${message}]]*/ null;
    const alertMessage = /*[[${alertMessage}]]*/ null;

    if (message != null) {
        window.PFDialog.alert(message, {
            title: '알림',
            icon: 'info'
        });
    }

    if (alertMessage != null && alertMessage !== '') {
        window.PFDialog.alert(alertMessage, {
            title: '알림',
            icon: 'info'
        });
    }

    function goGroupDetail(button) {
        const projectGroupId = button.dataset.projectGroupId;

        if (!projectGroupId) {
            return;
        }

        location.href = "/manage/groups/" + encodeURIComponent(projectGroupId);
    }

    document.addEventListener("click", function (event) {
        const dropdownButton = event.target.closest(".filter-dropdown-btn");

        if (dropdownButton) {
            event.preventDefault();
            event.stopPropagation();

            const dropdown = dropdownButton.closest(".filter-dropdown");

            document.querySelectorAll(".filter-dropdown").forEach(function (item) {
                if (item !== dropdown) {
                    item.classList.remove("open");
                }
            });

            dropdown.classList.toggle("open");
            return;
        }

        if (event.target.closest(".filter-dropdown-panel")) {
            event.stopPropagation();
            return;
        }

        document.querySelectorAll(".filter-dropdown").forEach(function (item) {
            item.classList.remove("open");
        });
    });
</script>

</div>
</body>
</html>
