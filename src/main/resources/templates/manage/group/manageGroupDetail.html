<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>관리 - 그룹 상세</title>

<link rel="stylesheet" th:href="@{/css/manage/group/manageGroupDetail.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="manage-group-detail-page">

        <!-- 상단 영역 -->
        <div class="detail-page-header">
            <div>
                <h1 class="detail-page-title">관리 &gt; 그룹 상세</h1>
                <p class="detail-page-sub-title">
                    그룹 정보와 그룹 구성원을 조회하고 관리할 수 있습니다.
                </p>
            </div>

            <div class="detail-user-info">
                <span>관리자</span>
                <strong th:text="${userName}">USER_ID</strong>
            </div>
        </div>

        <!-- 메시지 -->
        <div th:if="${message != null}" class="message-box">
            <span th:text="${message}">메시지</span>
        </div>

        <!-- 그룹 기본정보 수정 -->
        <form th:action="@{/manage/groups/update}"
              method="post"
              onsubmit="return validateGroupUpdateForm();">

            <input type="hidden"
                   name="projectGroupId"
                   th:value="${manageGroup.projectGroupId}">

            <div class="detail-section">
                <div class="section-title">그룹 기본정보</div>
                <div class="section-sub-text">
                    그룹 자체의 역할과 기본정보를 수정합니다.
                </div>

                <div class="form-grid">

                    <div class="form-field">
                        <label>프로젝트</label>
                        <input type="text"
                               th:value="${manageGroup.projectName}"
                               readonly>
                    </div>

                    <div class="form-field">
                        <label>구성원 수</label>
                        <input type="text"
                               th:value="${manageGroup.memberCount}"
                               readonly>
                    </div>

                    <div class="form-field">
                        <label for="roleId">그룹 역할 <span class="required">*</span></label>

                        <select id="roleId" name="roleId">
                            <option value="">역할 선택</option>

                            <option th:each="role : ${manageRoleList}"
                                    th:value="${role.roleId}"
                                    th:text="${role.roleName}"
                                    th:selected="${role.roleId == manageGroup.roleId}">
                                역할명
                            </option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>현재 그룹 역할</label>
                        <input type="text"
                               th:value="${manageGroup.roleName != null ? manageGroup.roleName : '-'}"
                               readonly>
                    </div>

                    <div class="form-field full">
                        <label for="groupName">그룹명 <span class="required">*</span></label>

                        <input type="text"
                               id="groupName"
                               name="groupName"
                               maxlength="100"
                               th:value="${manageGroup.groupName}"
                               placeholder="그룹명을 입력하세요">
                    </div>

                    <div class="form-field full">
                        <label for="groupAnswer">설명</label>

                        <textarea id="groupAnswer"
                                  name="groupAnswer"
                                  rows="5"
                                  placeholder="그룹 설명을 입력하세요"
                                  th:text="${manageGroup.groupAnswer}"></textarea>
                    </div>

                </div>
            </div>

            <div class="form-btn-area">
                <a th:href="@{/manage/groups}" class="btn-basic">
                    목록
                </a>

                <button type="submit" class="btn-basic btn-primary">
                    그룹 정보 저장
                </button>
            </div>
        </form>

        <!-- 그룹 구성원 목록 -->
        <div class="detail-section member-section">
            <div class="member-section-top">
                <div>
                    <div class="section-title">그룹 구성원</div>
                    <div class="section-sub-text">
                        현재 그룹에 배정된 구성원 목록입니다.
                    </div>
                </div>

                <a th:href="@{/manage/groups/{projectGroupId}/members(projectGroupId=${manageGroup.projectGroupId})}"
                   class="btn-basic btn-primary">
                    구성원 배정
                </a>
            </div>

            <div class="member-count-box">
                현재 구성원 수
                <strong th:text="${assignedMemberList == null ? 0 : #lists.size(assignedMemberList)}">0</strong>
                명
            </div>

            <div class="member-table-wrap">
                <table class="member-table">
                    <thead>
                        <tr>
                            <th>소속 팀명</th>
                            <th>ID</th>
                            <th>이름</th>
                            <th>Email</th>
                            <th>관리</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:if="${assignedMemberList == null or #lists.isEmpty(assignedMemberList)}">
                            <td colspan="5" class="empty-row">
                                현재 그룹에 배정된 구성원이 없습니다.
                            </td>
                        </tr>

                        <tr th:each="member : ${assignedMemberList}">
                            <td th:text="${member.teamName != null ? member.teamName : '-'}">
                                팀명
                            </td>

                            <td th:text="${member.loginId != null ? member.loginId : '-'}">
                                loginId
                            </td>

                            <td th:text="${member.userName != null ? member.userName : '-'}">
                                이름
                            </td>

                            <td th:text="${member.email != null ? member.email : '-'}">
                                email@test.com
                            </td>

                            <td>
                                <form th:action="@{/manage/groups/{projectGroupId}/members/remove(projectGroupId=${manageGroup.projectGroupId})}"
                                      method="post"
                                      class="inline-form"
                                      onsubmit="return confirm('해당 구성원을 그룹에서 제외하시겠습니까?');">

                                    <input type="hidden"
                                           name="projectMemberId"
                                           th:value="${member.projectMemberId}">

                                    <button type="submit" class="mini-btn delete">
                                        제외
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 그룹 삭제 -->
        <form th:action="@{/manage/groups/delete}"
              method="post"
              class="delete-form"
              onsubmit="return confirm('그룹을 삭제하시겠습니까?');">

            <input type="hidden"
                   name="projectGroupId"
                   th:value="${manageGroup.projectGroupId}">

            <button type="submit" class="btn-delete">
                그룹 삭제
            </button>
        </form>

    </div>

    <script>
        function validateGroupUpdateForm() {
            const roleId = document.getElementById("roleId").value;
            const groupName = document.getElementById("groupName").value.trim();

            if (!roleId) {
                alert("그룹 역할을 선택하세요.");
                document.getElementById("roleId").focus();
                return false;
            }

            if (!groupName) {
                alert("그룹명을 입력하세요.");
                document.getElementById("groupName").focus();
                return false;
            }

            return true;
        }
    </script>

</div>
</body>
</html>
