<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>관리 - 그룹 생성</title>

<link rel="stylesheet" th:href="@{/css/manage/group/manageGroupAdd.css}">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/common/pf-confirm.js}"></script>
</head>

<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
   <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
	
    <div class="manage-group-add-page">

        <div class="add-page-header">
            <div>
                <h1 class="add-page-title">관리 &gt; 그룹 생성</h1>
                <p class="add-page-sub-title">
                    본인이 생성한 프로젝트에 그룹을 생성합니다.
                </p>
            </div>

            <div class="add-user-info">
                <span>관리자</span>
                <strong th:text="${userName}">USER_ID</strong>
            </div>
        </div>

        <div th:if="${message != null}" class="message-box">
            <span th:text="${message}">메시지</span>
        </div>

        <form th:action="@{/manage/groups/add}"
              method="post"
              onsubmit="return validateGroupAddForm();">

            <div class="add-section">
                <div class="section-title">그룹 기본정보</div>
                <div class="section-sub-text">
                    그룹을 생성할 프로젝트와 그룹 정보를 입력하세요.
                </div>

                <div class="form-grid">

                    <div class="form-field">
                        <label for="projectId">프로젝트 <span class="required">*</span></label>

                        <select id="projectId" name="projectId">
                            <option value="">프로젝트 선택</option>

                            <option th:each="project : ${myProjectList}"
                                    th:value="${project.projectId}"
                                    th:text="${project.projectName}">
                                프로젝트명
                            </option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="roleId">적용 역할 <span class="required">*</span></label>

                        <select id="roleId" name="roleId">
                            <option value="">역할 선택</option>

                            <option th:each="role : ${manageRoleList}"
                                    th:value="${role.roleId}"
                                    th:text="${role.roleName}">
                                역할명
                            </option>
                        </select>
                    </div>

                    <div class="form-field full">
                        <label for="groupName">그룹명 <span class="required">*</span></label>

                        <input type="text"
                               id="groupName"
                               name="groupName"
                               maxlength="100"
                               placeholder="그룹명을 입력하세요">
                    </div>

                    <div class="form-field full">
                        <label for="groupAnswer">설명</label>

                        <textarea id="groupAnswer"
                                  name="groupAnswer"
                                  rows="5"
                                  placeholder="그룹 설명을 입력하세요"></textarea>
                    </div>

                </div>
            </div>

            <div class="form-btn-area">
                <a th:href="@{/manage/groups}" class="btn btn-custon-rounded-four btn-primary custom-white-btn">
                    취소
                </a>

                <button type="submit" class="btn btn-custon-rounded-four btn-primary custom-default-btn">
                    등록
                </button>
            </div>

        </form>

    </div>
</div>
</div>


    <script th:inline="javascript">
        const message = /*[[${message}]]*/ null;

        if (message != null) {
            window.PFDialog.alert(message, {
                title: '알림',
                icon: 'info'
            });
        }

        function pfAlert(message, focusTarget) {
            window.PFDialog.alert(message, {
                title: '그룹 생성 확인',
                icon: 'warning'
            }).then(function () {
                if (focusTarget) {
                    focusTarget.focus();
                }
            });
        }

        function validateGroupAddForm() {
            const projectIdInput = document.getElementById("projectId");
            const roleIdInput = document.getElementById("roleId");
            const groupNameInput = document.getElementById("groupName");

            const projectId = projectIdInput.value;
            const roleId = roleIdInput.value;
            const groupName = groupNameInput.value.trim();

            if (!projectId) {
                pfAlert("프로젝트를 선택하세요.", projectIdInput);
                return false;
            }

            if (!roleId) {
                pfAlert("적용 역할을 선택하세요.", roleIdInput);
                return false;
            }

            if (!groupName) {
                pfAlert("그룹명을 입력하세요.", groupNameInput);
                return false;
            }

            return true;
        }
    </script>

</div>
</body>
</html>
