<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">

</head>
<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
    <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:hidden;">
        
        <!-- 헤더 고정 -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-shrink:0;">
            <h4 style="margin:0; font-size:16px; font-weight:500; color:#333;">문서 관리</h4>
            <button type="submit" form="documentForm" class="btn btn-default " style="font-size:13px; padding:6px 16px; border-radius:6px;">
                <i class="fa fa-check" style="margin-right:5px;"></i> 저장
            </button>
        </div>

        <!-- 내용 스크롤 -->
        <div style="flex:1; overflow-y:auto;">
            <div style="border:1px solid #eef0f3; border-radius:8px; overflow:hidden;">
                <form id="documentForm" th:action="@{/project/{projectId}/document/add(projectId=${projectId})}" method="post" enctype="multipart/form-data">
                	<div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">카테고리</label>
                        <select name="documentCategoryId" class="form-control" style="flex:1; font-size:13px; height:34px;">
                            <option value="" selected disabled>Select category</option>
                            <option th:each="category : ${categoryList}"
                                    th:value="${category.documentCategoryId}"
                                    th:text="${category.categoryName}">
                            </option>
                        </select>
                    </div>
                    
                    <div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">버전</label>
                        <select name="versionId" class="form-control" style="flex:1; font-size:13px; height:34px;">
                            <option value="" selected disabled>Select version</option>
                            <option th:each="roadmap : ${roadmapList}"
                                    th:value="${roadmap.versionId}"
                                    th:text="${roadmap.versionName}">
                            </option>
                        </select>
                    </div>

                    <div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">마일스톤</label>
                        <select name="milestoneId" class="form-control" style="flex:1; font-size:13px; height:34px;">
                            <option value="" selected disabled>Select milestone</option>
                            <option th:each="milestone : ${milestoneList}"
                                    th:value="${milestone.milestoneId}"
                                    th:text="${milestone.title}"
                                    th:data-version-id="${milestone.versionId}">
                                    <span th:text="${milestone.versionId}"></span>
                            </option>

                        </select>
                    </div>

                    <div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">문서유형</label>
                        <select name="settingCodeId" class="form-control" style="flex:1; font-size:13px; height:34px;">
                            <option value="" selected disabled>Select documentCategory</option>
                            <option th:each="codeValue : ${codeValueList}"
                                    th:value="${codeValue.settingCodeId}"
                                    th:text="${codeValue.settingName}">
                            </option>
                        </select>
                    </div>

                    <div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">제목</label>
                        <input name="title" type="text" class="form-control" placeholder="제목을 입력하세요" style="flex:1; font-size:13px; height:34px;">
                    </div>

                    <div style="display:flex; align-items:flex-start; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; padding-top:4px;">설명</label>
                        <textarea name="description" class="form-control" placeholder="설명을 입력하세요" style="flex:1; font-size:13px; min-height:100px; resize:vertical;"></textarea>
                    </div>
                    <div class="form-group alert-up-pd">
                    <div style="display:flex; align-items:flex-start; padding:12px 16px; background:#f8f9fb;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; padding-top:4px;">파일 첨부</label>
                        <div style="flex:1;">
                            <label for="fileInput" class="btn btn-default" style="cursor:pointer; font-size:13px; padding:5px 14px; border-radius:6px; border:1px solid #ddd; background:#fff; margin:0;">
                                <i class="fa fa-paperclip" style="margin-right:5px;"></i> 파일 선택
                            </label>
                            <input type="file" id="fileInput" name="files" multiple style="display:none;">
                            <span id="fileCount" style="margin-left:10px; font-size:12px; color:#aaa;">파일 0개</span>
                            <ul id="fileList" style="margin-top:8px; list-style:none; padding:0; font-size:12px; color:#666;"></ul>
                        </div>
                    </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">

const versionSelect = document.getElementById("versionSelect");
const milestoneSelect = document.getElementById("milestoneSelect");

versionSelect.addEventListener("change", function () {
    const versionId = this.value;

    milestoneSelect.selectedIndex = 0;

    Array.from(milestoneSelect.options).forEach(option => {
        if (!option.value) return; // 기본 placeholder

        const optionVersionId = option.dataset.versionId || "";

        if (versionId) {
            // 버전 선택된 경우: 해당 버전만 허용
            option.hidden = optionVersionId !== versionId;
            option.disabled = optionVersionId !== versionId;
        } else {
            // 버전 미선택: 버전 없는 것만 허용
            const isGlobal = optionVersionId === "";
            option.hidden = !isGlobal;
            option.disabled = !isGlobal;
        }
    });
});
</script>
</div>
</body>
</html>
