<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">

</head>
<body>
<div layout:fragment="Content">

<div class="product-payment-inner-st">
<h1>문서관리</h1>
                            <div id="myTabContent" class="tab-content custom-product-edit">
                                <div class="product-tab-list tab-pane fade active in" id="description">
                                    <div class="row">
                                        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                            <div class="review-content-section">
                                                <div id="dropzone1" class="pro-ad">
                                                    <form  th:action="@{/document/add}" method="post" enctype="multipart/form-data">
                                                        <div class="row">
                                                            <div class="col-xs-12">
                                                            <div class="form-group">
                                                            	<h5>버전</h5>
                                                                <select name="versionId" class="form-control">
    																<option value="" selected disabled>Select milestone</option>
    																<option value="VERSION_ID_2606_0001">1단계 기획 완료</option>
    																<option value="VERSION_ID_2606_0002">UI/UX 디자인 완료</option>
    																<option value="VERSION_ID_2606_0003">백엔드 개발 완료</option>
    																<option value="VERSION_ID_2606_0004">프론트엔드 개발 완료</option>
    																<option value="VERSION_ID_2606_0005">QA 테스트 완료</option>
																</select>
																</div>
                                                                <div class="form-group">
                                                                <h5>마일스톤</h5>
                                                                <select name="milestoneId" class="form-control">
    																<option value="" selected disabled>
        																Select milestone
    																</option>

    																<option
        																th:each="milestone : ${milestoneList}"
        																th:value="${milestone.milestoneId}"
        																th:text="${milestone.title}">
    																</option>
																</select>
																</div>
																
																<div class="form-group">
																<h5>문서유형</h5>
                                                                <select name="documentCategoryId" class="form-control">
    																<option value="" selected disabled>
        																Select documentCategory
    																</option>

    																<option
        																th:each="codeValue : ${codeValueList}"
        																th:value="${codeValue.settingCodeId}"
        																th:text="${codeValue.settingName}">
    																</option>
																</select>
																</div>
                                                                <div class="form-group">
                                                                	<h5>제목</h5>
                                                                    <input name="title" type="text" class="form-control" placeholder="title">
                                                                </div>
                                                                <div class="form-group res-mg-t-15">
                                                                	<h5>설명</h5>
                                                                    <textarea name="description" type="text" class="form-control" placeholder="description"></textarea>
                                                                </div>
                                                                
                                                                <div class="form-group alert-up-pd">
                                                                
                                                                	<label for="fileInput" class="btn btn-default" style="cursor:pointer;">파일 선택</label>
																	<input type="file" id="fileInput" name="files" multiple style="display:none;">
    																

    																<span id="fileCount">파일 0개</span>

    																<ul id="fileList" style="margin-top:10px; list-style:none; padding:0;"></ul>

																</div>
                                                            </div>
                                                        </div>
                                                        <div class="row">
                                                            <div class="col-lg-12">
                                                                <div class="payment-adress">
                                                                    <button type="submit" class="btn btn-primary waves-effect waves-light">Submit</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                       
</div>
</body>

</html>
