<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
</head>
<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
    <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
 
        <!-- 헤더 고정 -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-shrink:0;">
            <h4 style="margin:0; font-size:16px; font-weight:500; color:#333;">
                <span style="color:#bbb; margin:0 6px;">&gt;&gt;</span>
                <span th:text="${docDetail.title}"></span>
            </h4>
            
        </div>
 
        <!-- 내용 스크롤 -->
        <div style="flex:1; overflow-y:auto;">
            <div style="border:1px solid #eef0f3; border-radius:8px; overflow:hidden;">
 
                <!-- 제목 -->
                <div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                    <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">제목</label>
                    <span style="flex:1; font-size:13px; color:#333;" th:text="${docDetail.title}"></span>
                </div>
 
                <!-- 마일스톤 -->
                <div style="display:flex; align-items:center; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                    <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0;">마일스톤</label>
                    <span style="flex:1; font-size:13px; color:#333;">
                        <span style="color:#888;">마일스톤 : </span>
                        <span th:text="${docDetail.milestoneTitle}"></span>
                    </span>
                </div>
 
                <!-- 설명 -->
                <div style="display:flex; align-items:flex-start; border-bottom:1px solid #f3f4f6; padding:12px 16px;">
                    <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; padding-top:4px;">설명</label>
                    <span style="flex:1; font-size:13px; color:#333; white-space:pre-line; line-height:1.75;"
                          th:text="${docDetail.description}"></span>
                </div>
 
                <!-- 첨부파일 -->
                <!-- 첨부파일 -->
                <div style="display:flex; align-items:flex-start; border-bottom:1px solid #f3f4f6; padding:12px 16px; background:#f8f9fb;">
                    <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; padding-top:4px;">첨부파일</label>
                    <div style="flex:1;">
                        <!-- 첨부파일 목록 -->
                        <ul style="list-style:none; padding:0; margin:0; font-size:12px; color:#666;">
                            <li 
                                style="display:flex; align-items:center; justify-content:space-between; padding:5px 8px; background:#fff; border:1px solid #eee; border-radius:4px; margin-bottom:4px;"  th:each="file : ${fileList}" th:value="${file.fileId}">
                                <span>
                                    <i class="fa fa-file-o" style="margin-right:6px; color:#4a6cf7;"></i>
                                    <span th:text="${file.originalName}" ></span>
                                    <span th:text="'v' + ${file.fileVersion}"></span>
                                </span>
                                <a class="btn btn-default btn-custon-three btn-custon-rounded-four btn-xs" th:href="@{/project/{projectId}/document/detail/{documentId}/{fileId}/download(projectId=${projectId},
        									documentId=${docDetail.documentId},
        									fileId=${file.fileId})}">
                                    <i class="fa fa-download"></i>
                                </a>
                            </li>
                            <li th:if="${#lists.isEmpty(fileList)}"
                                style="font-size:12px; color:#aaa; padding:4px 0;">
                                첨부된 파일이 없습니다.
                            </li>
                        </ul>
                    </div>
                </div>
 
                <!-- 연결된 파일 목록 -->
                <div style="display:flex; align-items:flex-start; padding:12px 16px;">
                    <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; padding-top:4px;">이전 버전 문서 목록</label>
                    <!-- ⑥ 목록 -->
            		<a th:href="@{/project/{projectId}/document/historylist/{documentId}(projectId=${projectId},documentId=${docDetail.documentId})}" class="btn btn-default btn-custon-three btn-custon-rounded-four" style="font-size:13px; padding:6px 16px;">
                		<i class="fa fa-list" style="margin-right:5px;"></i> 바로가기
            		</a>
                    <ul style="flex:1; list-style:none; padding:0; margin:0; font-size:13px; color:#555;">
                        <li style="padding:4px 0; border-bottom:1px dashed #f0f0f0;"
                                    >
                            <i class="fa fa-link" style="margin-right:6px; color:#aaa; font-size:12px;"></i>
                            <span></span>
                        </li>
                    </ul>
                </div>
 
            </div>
        </div>
 
        <!-- 하단 버튼 바 -->
        <div style="display:flex; justify-content:flex-end; gap:6px; padding-top:16px; border-top:1px solid #f0f0f0; flex-shrink:0; margin-top:4px;">
            <!-- ⑥ 목록 -->
            <a th:href="@{/project/{projectId}/document/historylist/{documentId}(projectId=${projectId},documentId=${docDetail.documentId})}"  class="btn btn-custon-rounded-four custom-white-btn">
                <i class="fa fa-list" style="margin-right:5px;"></i> 목록
            </a>
            <!-- ④ 다운로드 이력 -->
            <button
        		type="button"
        		data-toggle="modal"
        		data-target="#downloadHistoryModal"
        		class="btn btn-custon-rounded-four custom-white-btn">
        		파일 다운로드 이력
    		</button>
            <!-- ⑤ 파일 다운로드 -
            <!-- ⑤ 파일 다운로드 -->
            <a class="btn btn-custon-rounded-four custom-white-btn"
   					th:href="@{/project/{projectId}/document/detail/{documentId}/download(projectId=${projectId},documentId=${docDetail.documentId})}">

    			<i class="fa fa-download" style="margin-right:5px;"></i>
    			전체 파일 다운로드
			</a>
        </div>
 
    </div>
</div>
<div class="modal fade" id="downloadHistoryModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document" style="border-radius:20px;">
    <div class="modal-content" style="border-radius:5px; overflow:hidden; border:none;">

      <!-- form 추가 -->
      <div>

        <!-- 헤더 -->
            <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
                <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
                    파일 다운로드 이력
                </h4>
                <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
            </div>

            <!-- 바디 -->
            <div class="modal-body" style="padding:24px; max-height:500px; overflow-y:auto;">

                <table class="table table-bordered table-hover" style="margin-bottom:0;">
                    <thead style="background:#f8f9fa;">
                    <tr>
                        <th style="width:10%; text-align:center;">No</th>
                        <th style="width:40%; text-align:center;">파일명</th>
                        <th style="width:25%; text-align:center;">다운로드 사용자</th>
                        <th style="width:25%; text-align:center;">다운로드 일시</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="history, stat : ${downloadHistoryList}">
                        <td class="text-center" th:text="${stat.count}">1</td>
                        <td class="text-center" th:text="${history.originalName}">sample.pdf</td>
                        <td class="text-center" th:text="${history.userName}">홍길동</td>
                        <td class="text-center" th:text="${history.downloadDate}">
                            2026-07-01 14:30
                        </td>
                    </tr>

                    <!-- 데이터 없을 때 -->
                    <tr th:if="${#lists.isEmpty(downloadHistoryList)}">
                        <td colspan="4" class="text-center" style="padding:40px;">
                            다운로드 이력이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>

            <!-- 푸터 -->
            <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
                <button
                        type="button"
                        class="btn btn-custon-rounded-four custom-white-btn"
                        data-dismiss="modal">
                    닫기
                </button>
            </div>

      </div>

    </div>
  </div>
</div>
</div>
</body>

</html>
