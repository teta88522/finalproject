<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
</head>
<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
  <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:hidden;">
 
    <!-- 헤더 -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-shrink:0;">
      <h4 style="margin:0; font-size:16px; font-weight:500; color:#333;">문서 수정</h4>
      <div style="display:flex; gap:8px;">
        <a th:href="@{/project/{projectId}/document/list(projectId=${projectId})}" class="btn btn-custon-rounded-four custom-white-btn">
                취소
            </a>
        <button type="submit" form="documentEditForm" class="btn btn-custon-rounded-four custom-default-btn">
          저장 (버전 업)
        </button>
      </div>
    </div>
 
    <!-- 안내 배너 -->
    <div style="background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:10px 14px; font-size:12px; color:#92400e; margin-bottom:16px; display:flex; align-items:center; gap:8px; flex-shrink:0;">
      <i class="fa fa-info-circle"></i>
      문서를 저장하면 새로운 버전 [[${documentVersionId}]] 이(가) 생성되어 이력에 기록됩니다. 첨부파일 업데이트 시 동일 파일 명의 버전이 한 단계 업데이트됩니다.
    </div>
 
    <!-- 스크롤 영역 -->
    <div style="flex:1; overflow-y:auto;">
      <div style="border:1px solid #E6DCC8; border-radius:8px; overflow:hidden; background:#F7EEE9;">
        <form id="documentEditForm" th:action="@{/project/{projectId}/document/update/{documentId}(projectId=${projectId},documentId=${docDetail.documentId})}" method="post" enctype="multipart/form-data" class="workflow-loading-form"
      data-loading-message="저장하는 중입니다.">

          <input type="hidden" name="documentId" th:value="${docDetail.documentId}">
          <input type="hidden" name="documentVersionId" th:value="${documentVersionId}">
 
          <!-- 문서 버전 -->
          <div style="display:flex; align-items:center; border-bottom:1px solid #E6DCC8; padding:12px 16px; background:#F7EEE9;">
            <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; flex-shrink:0;">문서 버전</label>
            <div style="display:flex; align-items:center; flex:1;">
              <span style="background:#FFFDF7; border-radius:6px; padding:6px 10px; font-size:13px; color:#555; border:1px solid #eee; flex:1;"
                    th:text="${documentVersionId}"></span>
              <span style="display:inline-block; background:#eef2ff; color:#4f6ef7; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; margin-left:8px;">
                <i class="fa fa-lock" style="font-size:10px; margin-right:3px;"></i> 자동 관리
              </span>
            </div>
          </div>
          <!-- 제목 -->
          <div style="display:flex; align-items:center; border-bottom:1px solid #E6DCC8; padding:12px 16px;">
            <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; flex-shrink:0;">제목</label>
            <input name="title" type="text" class="form-control"
                   placeholder="제목을 입력하세요"
                   th:value="${docDetail.title}"
                   style="flex:1; font-size:13px; height:34px;">
          </div>
 
          <!-- 설명 -->
          <div style="display:flex; align-items:flex-start; border-bottom:1px solid #E6DCC8; padding:12px 16px;">
            <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; flex-shrink:0; padding-top:4px;">설명</label>
            <textarea name="description" class="form-control"
                      placeholder="설명을 입력하세요"
                      style="flex:1; font-size:13px; min-height:100px; resize:vertical;"
                      th:text="${docDetail.description}"></textarea>
          </div>
 
          <!-- 첨부파일 -->
          <div style="font-size:11px; font-weight:600; color:#E6DCC8; text-transform:uppercase; letter-spacing:0.05em; padding:10px 16px 4px; background:#F7EEE9; border-bottom:1px solid #f3f4f6;">
            <i class="fa fa-paperclip" style="margin-right:5px;"></i> 첨부파일 관리
          </div>
 
          <div style="padding:14px 16px; background:#F7EEE9;">
 
            <div id="existingFileList" style="margin-bottom:12px;">
              <p style="font-size:12px; color:#999; margin-bottom:8px;">기존 첨부파일</p>

              <div th:each="file : ${fileList}"
                   th:id="'file-row-' + ${file.fileId}"
                   style="display:flex; align-items:center; justify-content:space-between; padding:7px 10px; background:#fff; border:1px solid #E6DCC8; border-radius:6px; margin-bottom:6px; font-size:12px; color:#555;">
                
                <div style="display:flex; align-items:center; gap:8px; flex:1;">
                  <i class="fa fa-file-o"></i>
                  <span th:text="${file.originalName}"></span>
                  <span th:text="'v' + ${file.fileVersion}"></span>
                  <span style="color:#aaa;">|</span>
                  <span th:text="${file.fileSize}"></span>
                </div>

                
              </div>
            </div>

            <!-- 신규 파일 -->
            <div class="form-group alert-up-pd">
                    <div style="display:flex; align-items:flex-start; padding:12px 16px; background:#F7EEE9;">
                        <label style="width:120px; font-size:13px; color:#888; font-weight:500; margin:0; padding-top:4px;">파일 첨부</label>
                        <div style="flex:1;">
                            <label for="fileInput" class="btn btn-default" style="cursor:pointer; font-size:13px; padding:5px 14px; border-radius:6px; border:1px solid #ddd; background:#fff; margin:0;">
                                <i class="fa fa-paperclip" style="margin-right:5px;"></i> 파일 선택
                            </label>
                            <input type="file" id="fileInput" name="files" multiple style="display:none;">
                            <span id="fileCount" style="margin-left:10px; font-size:12px; color:#aaa;">파일 0개</span>
                            <ul id="fileList" style="margin-top:8px; list-style:none; padding:0; font-size:12px; color:#666;"></ul>
                        </div>
                    </div>
                </div>
             </div>

        </form>
        <div class="workflow-processing-overlay" aria-live="polite">
  <div class="workflow-processing-box">
    <div class="workflow-processing-spinner"></div>
    <div class="workflow-processing-title">처리중</div>
    <div class="workflow-processing-message">저장하는 중입니다.</div>
  </div>
</div>
      </div>


    </div>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
	  const loadingForm = document.querySelector('.workflow-loading-form');
	  const loadingOverlay = document.querySelector('.workflow-processing-overlay');
	  const loadingMessage = document.querySelector('.workflow-processing-message');

	  if (!loadingForm || !loadingOverlay) {
	    return;
	  }

	  loadingForm.addEventListener('submit', function () {
	    const submitButton = loadingForm.querySelector('button[type="submit"]');

	    if (submitButton) {
	      submitButton.disabled = true;
	      submitButton.textContent = '처리중';
	    }

	    if (loadingMessage && loadingForm.dataset.loadingMessage) {
	      loadingMessage.textContent = loadingForm.dataset.loadingMessage;
	    }

	    loadingOverlay.classList.add('is-visible');
	  });
	});
</script>
</div>
</body>

</html>
