<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
</head>
<body>
<div layout:fragment="Content">
<div class="product-status mg-b-15">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="product-status-wrap" style="background:#fff; border-radius:12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                        <h4 style="margin:0; font-size:16px; font-weight:500; color:#333;">문서 관리</h4>
						<div style="display:flex; justify-content:flex-end; gap:8px;">
    
    					<button
        					type="button"
        					data-toggle="modal"
        					data-target="#categoryModal"
        					style="display:flex; align-items:center; gap:6px; font-size:13px; padding:6px 14px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#555; cursor:pointer;">
        					<i class="fa fa-plus" style="font-size:11px;"></i>
        					새 카테고리
    					</button>

    					<a
        					th:href="@{/document/add}"
        					style="display:flex; align-items:center; gap:6px; font-size:13px; padding:6px 14px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#555; cursor:pointer; text-decoration:none;">
        					<i class="fa fa-plus" style="font-size:11px;"></i>
        					새 문서
    					</a>

					</div>
                    </div>
                    <div class="asset-inner" style="border:1px solid #eef0f3; border-radius:8px; overflow:hidden;">
                        <table class="table table-hover" style="margin:0; font-size:13px;">
                            <thead>
                                <tr style="background:#f8f9fb;">
                                    <th style="width:36px; border-bottom:1px solid #eef0f3; padding:10px 12px;"><input type="checkbox"></th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">타이틀</th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">활성</th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">크기</th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">변경일시</th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">버전</th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">마일스톤</th>
                                    <th style="border-bottom:1px solid #eef0f3; padding:10px 12px; color:#888; font-weight:500;">작성자</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr style="border-bottom:1px solid #f3f4f6;" th:each="category : ${categoryList}" th:value="${category.documentCategoryId}">
                                    <td style="padding:10px 12px;"><input type="checkbox"></td>
                                    <td style="padding:10px 12px;" >
                                        <i class="fa fa-folder" style="margin-right:7px; color:#f0ad4e;"></i>
                                        <a th:href="@{/document/list/{categoryId}(categoryId=${category.documentCategoryId})}" style="color:#333; text-decoration:none; font-weight:500;" th:text="${category.categoryName}"></a>
                                    </td>
                                    <td style="padding:10px 12px; color:#bbb;">—</td>
                                    <td style="padding:10px 12px; color:#bbb;">—</td>
                                    <td style="padding:10px 12px; color:#777;">—</td>
                                    <td style="padding:10px 12px; color:#bbb;">—</td>
                                    <td style="padding:10px 12px; color:#bbb;">—</td>
                                    <td style="padding:10px 12px; color:#777;">—</td>
                                </tr>
                                <tr th:each="categoryNo : ${categoryNoList}" th:value="${categoryNo.documentId}">
                                    <td style="padding:10px 12px;"><input type="checkbox"></td>
                                    <td style="padding:10px 12px;">
                                        <i class="fa fa-file-text-o" style="margin-right:7px; color:#7b8cde;"></i>
                                        <a href="#" style="color:#333; text-decoration:none; font-weight:500;" th:text="${categoryNo.title}"></a>
                                    </td>
                                    <td style="padding:10px 12px;">
                                        <span style="font-size:11px; padding:3px 9px; background:#eef2ff; color:#5566cc; border-radius:20px;" th:text="${categoryNo.statusName}"></span>
                                    </td>
                                    <td style="padding:10px 12px; color:#777;">—</td>
                                    <td style="padding:10px 12px; color:#777;" th:text="${categoryNo.updatedAt}"></td>
                                    <td style="padding:10px 12px; color:#bbb;" th:text="${categoryNo.versionName}">—</td>
                                    <td style="padding:10px 12px;">
                                        <span style="font-size:11px; padding:3px 9px; background:#e8f5e9; color:#2e7d32; border-radius:20px;" th:text="${categoryNo.milestoneTitle}"></span>
                                    </td>
                                    <td style="padding:10px 12px; color:#777;" th:text="${categoryNo.userName}"></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr style="background:#f8f9fb;" th:each="codeValue : ${codeValueList}">
                                    <td colspan="8" style="padding:10px 12px; font-size:12px; color:#aaa;">
                                        폴더 : [[${codeValue.total_cnt}]]  문서 : 1
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="categoryModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document" style="border-radius:20px;">
    <div class="modal-content" style="border-radius:20px; overflow:hidden; border:none;">

      <!-- form 추가 -->
      <form th:action="@{/document/addcategory}" method="post">

        <!-- 헤더 -->
        <div style="background:#1a6fe8; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
          <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
            새 카테고리 만들기
          </h4>
          <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
        </div>

        <!-- 바디 -->
        <div class="modal-body" style="padding:24px;">
          <div class="form-group">
            <label style="font-size:13px; color:#555;">
              카테고리 이름 <span style="color:#e24b4a">*</span>
            </label>

            <input
              type="text"
              name="categoryName"
              class="form-control"
              placeholder="카테고리 이름을 입력하세요"
              required
              style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;">
          </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
          <button
            type="button"
            class="btn btn-default btn-custon-three btn-custon-rounded-three"
            data-dismiss="modal">
            취소
          </button>

          <button
            type="submit"
            class="btn btn-primary btn-custon-three btn-custon-rounded-three">
            생성
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
</div>
</body>

</html>
