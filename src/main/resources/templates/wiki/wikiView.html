<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/wiki/wiki.css}">
</head>
<body>
<div layout:fragment="Content">
<div class="product-status mg-b-15">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="wiki-view-wrap">

          <!-- 헤더 -->
          <div class="wiki-view-header">
            <div>
              <h1 class="wiki-view-title" th:text="${page != null ? page.title : '제목없음'}">제목</h1>
              <div class="wiki-view-meta">
                <span th:text="${page != null ? page.createdBy : ''}">작성자</span>
                &nbsp;·&nbsp;
                <span th:text="${page != null ? #dates.format(page.createdAt, 'yyyy-MM-dd') : ''}">날짜</span>
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <a th:href="@{/project/{pid}/wiki/(pid=${projectId})}" class="btn-back">← 목록</a>
              <button class="btn-history" onclick="toggleHistory()">🕐 히스토리</button>
              <a th:href="@{/project/{pid}/wiki/{wid}/edit(pid=${projectId}, wid=${wikiId})}" class="btn-edit">✏️ 편집</a>
            </div>
          </div>

          <!-- 본문 + 히스토리 -->
          <div class="wiki-body-wrap">

            <!-- 본문 -->
            <div class="wiki-main">
              <div id="wikiContent" class="wiki-content"></div>
            </div>

            <!-- 히스토리 패널 -->
            <div id="historyPanel" class="history-panel">
              <div class="history-panel-title">🕐 버전 히스토리</div>
              <div class="history-list" id="historyList">
                <p style="padding:16px; color:#aaa; font-size:13px;">불러오는 중...</p>
              </div>
              <!-- 복원 버튼 제거 -->
<div style="padding:12px;">
  <button id="backToCurrentBtn" 
          class="btn-restore" 
          onclick="backToCurrent()"
          style="background:#888;">
    ← 현재 버전으로
  </button>
</div>
            </div>

          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:inline="javascript">
  const content = [[${version != null ? version.content : '{}'}]]
  const projectId = [[${projectId}]]
  const wikiId = [[${wikiId}]]

  let selectedVersionId = null

  // 마크다운 렌더링
  function renderMarkdown(raw) {
    try {
      const parsed = JSON.parse(raw)
      return typeof parsed === 'string' ? parsed : (parsed.markdown || '')
    } catch(e) {
      return ''
    }
  }

  function displayContent(markdown) {
    marked.setOptions({ breaks: true, gfm: true })
    const html = marked.parse(markdown)

    // 목차 생성
    const parser = new DOMParser()
    const doc = parser.parseFromString(html, 'text/html')
    const headings = doc.querySelectorAll('h2, h3, h4')

    let tocHtml = ''
    if (headings.length > 0) {
      tocHtml = '<div class="wiki-toc"><div class="wiki-toc-title">목차</div><ol>'
      headings.forEach((h, i) => {
        const level = parseInt(h.tagName[1])
        const text = h.textContent
        const indent = (level - 2) * 16
        tocHtml += `<li style="margin-left:${indent}px"><a href="#heading-${i}">${text}</a></li>`
      })
      tocHtml += '</ol></div>'
    }

    let idx = 0
    const finalHtml = html.replace(/<h([234])>/g, (match, level) => {
      return `<h${level} id="heading-${idx++}">`
    })

    document.getElementById('wikiContent').innerHTML = tocHtml + finalHtml
  }

  // 초기 렌더링
  const markdown = renderMarkdown(content)
  if (markdown) {
    displayContent(markdown)
  } else {
    document.getElementById('wikiContent').innerHTML = '<p style="color:#aaa;">내용이 없습니다.</p>'
  }

  // 히스토리 토글
  function toggleHistory() {
    const panel = document.getElementById('historyPanel')
    panel.classList.toggle('open')
    if (panel.classList.contains('open')) {
      loadHistory()
    }
  }

  // 히스토리 로드
  function loadHistory() {
    fetch(`/project/${projectId}/wiki/versions/${wikiId}`)
      .then(res => res.json())
      .then(list => {
        const container = document.getElementById('historyList')
        if (!Array.isArray(list) || list.length === 0) {
          container.innerHTML = '<p style="padding:16px; color:#aaa; font-size:13px;">버전 없음</p>'
          return
        }
        container.innerHTML = ''
        list.forEach((v, i) => {
          const div = document.createElement('div')
          div.className = 'history-item' + (i === 0 ? ' active' : '')
          div.innerHTML = `
            <div style="font-size:13px; font-weight:500;">${v.title || '제목없음'}</div>
            <div class="history-item-version">${v.versionNo}</div>
            <div class="history-item-date">${v.createdAt}</div>
            <div class="history-item-author">by ${v.createdBy || ''}</div>
          `
          div.onclick = () => previewVersion(v.versionId, div)
          container.appendChild(div)
        })
      })
      .catch(err => console.error('히스토리 로드 실패:', err))
  }

//버전 미리보기
  function previewVersion(versionId, el) {
    document.querySelectorAll('.history-item').forEach(e => e.classList.remove('active'))
    el.classList.add('active')
    selectedVersionId = versionId

    // 현재버전으로 버튼 표시
    document.getElementById('backToCurrentBtn').classList.add('visible')

    fetch(`/project/${projectId}/wiki/version/${versionId}`)
      .then(res => res.json())
      .then(data => {
        if (data && data.content) {
          const md = renderMarkdown(data.content)
          displayContent(md)
          // 이전 버전 보는 중 표시
          document.getElementById('wikiContent').insertAdjacentHTML(
            'afterbegin',
            `<div style="background:#fff3cd; border:1px solid #ffc107; border-radius:6px; padding:10px 16px; margin-bottom:16px; font-size:13px;">
              ⚠️ 이전 버전을 보고 있습니다. 복원하려면 <a href="/project/${projectId}/wiki/${wikiId}/edit" style="color:#3d6ef5;">편집 페이지</a>에서 버전 히스토리를 이용하세요.
            </div>`
          )
        }
      })
      .catch(err => console.error('버전 로드 실패:', err))
  }

  // 현재 버전으로 돌아가기
  function backToCurrent() {
    selectedVersionId = null
    document.getElementById('backToCurrentBtn').classList.remove('visible')
    document.querySelectorAll('.history-item').forEach(e => e.classList.remove('active'))
    const md = renderMarkdown(content)
    displayContent(md)
  }
</script>
</div>
</body>
</html>
