<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/wiki/wiki.css}">
</head>
<body>
<div layout:fragment="Content">
<div class="container-fluid" style="height:calc(100vh - 130px); display:flex; flex-direction:column; padding-bottom:24px;">
    <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; flex:1; display:flex; flex-direction:column; overflow:auto;">
    
    <div class="row">
      <div class="col-lg-12">

          <!-- hidden 값 -->
          <input type="hidden" id="hiddenProjectId" th:value="${projectId}"/>
          <input type="hidden" id="hiddenWikiId" th:value="${wikiId}"/>

          <!-- 헤더 -->
          <div class="wiki-view-header">
            <div>
              <h1 class="wiki-view-title" th:text="${page != null ? page.title : '제목없음'}">제목</h1>
              <div class="wiki-view-meta">
                <span th:text="${page != null ? '최초 작성자 : ' + page.userName : ' '}">작성자</span>
                &nbsp;·&nbsp;
                <span th:text="${page != null ? #dates.format(page.createdAt, 'yyyy-MM-dd') : ''}">날짜</span>
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <a id="btnBack" class="btn btn-custon-rounded-four custom-white-btn">← 목록</a>
              <button class="btn btn-custon-rounded-four custom-white-btn" onclick="toggleHistory()">🕐 히스토리</button>
              <a id="btnEdit" class="btn btn-custon-rounded-four custom-default-btn">✏️ 편집</a>
            </div>
          </div>

          <!-- 본문 + 히스토리 -->
          <div class="wiki-body-wrap">

            <!-- 본문 -->
            <div class="wiki-main">
              <div id="versionNotice"
                   style="display:none; background:#fff3cd; border:1px solid #ffc107;
                          border-radius:6px; padding:10px 16px; margin-bottom:16px; font-size:13px;">
                ⚠️ 이전 버전을 보고 있습니다. 복원하려면
                <a id="editLink" style="color:#3d6ef5; cursor:pointer;">편집 페이지</a>에서 버전 히스토리를 이용하세요.
              </div>
              <div id="wikiContent" class="wiki-content">
                <p style="color:#aaa;">불러오는 중...</p>
              </div>
            </div>

            <!-- 히스토리 패널 -->
            <div id="historyPanel" class="history-panel">
              <div class="history-panel-title">🕐 버전 히스토리</div>
              <div class="history-list" id="historyList">
                <p style="padding:16px; color:#aaa; font-size:13px;">불러오는 중...</p>
              </div>
              <div style="padding:12px;">
                <button id="backToCurrentBtn"
                        onclick="backToCurrent()"
                        style="display:none; width:100%; padding:8px; background:#888;
                               color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px;">
                  ← 현재 버전으로
                </button>
              </div>
            </div>

          </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/wikiView.js}"></script>
</div>
</body>
</html>
