<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebSocket Test</title>
</head>
<body>

<button onclick="sendMsg()">보내기</button>

<script>
const ws = new WebSocket("ws://localhost:8080/ws/wiki?wikiId=123");

ws.binaryType = "arraybuffer";

ws.onopen = () => {
    console.log("연결 성공");
};

ws.onmessage = (e) => {
    console.log("받음", e.data);
};

function sendMsg() {
    ws.send(new Uint8Array([1,2,3]));
}
</script>

</body>
</html>
