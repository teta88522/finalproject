<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/wiki/wiki.css}">
</head>
<body>
<div layout:fragment="Content">
<div class="product-status mg-b-15">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="wiki-list-wrap">

                    <!-- 헤더 -->
                    <div class="wiki-header">
                        <h1>위키</h1>
                    <button
        					type="button"
        					data-toggle="modal"
        					data-target="#wikiModal"
        					class="btn btn-custon-rounded-four custom-white-btn">
        					새 위키 생성
    					</button>
                       
                    </div>

                    <!-- 위키 목록 -->
                    <div id="wikiListContainer">
                        <div th:if="${#lists.isEmpty(wikiList)}" class="wiki-empty">
                            <p>아직 위키 페이지가 없습니다.</p>
                            <p>새 위키를 만들어보세요!</p>
                        </div>
                        <div th:each="wiki : ${wikiList}"
                             class="wiki-item"
                             th:onclick="|location.href='@{/project/{pid}/wiki/{wid}(pid=${projectId}, wid=${wiki.wikiId})}'|">
                            <div>
                                <div class="wiki-item-title" th:text="${wiki.title}">제목</div>
                                <div class="wiki-item-meta">
                                    <span th:text="${wiki.userName}">작성자</span>
                                    &nbsp;·&nbsp;
                                    <span th:text="${#dates.format(wiki.createdAt, 'yyyy-MM-dd')}">날짜</span>
                                </div>
                            </div>
                            <div style="color:#aaa; font-size:20px;">›</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="wikiModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="wiki" style="border-radius:20px;">
    <div class="modal-content" style="border-radius:20px; overflow:hidden; border:none;">

      <!-- form 추가 -->
      <form th:action="@{/project/{projectId}/wiki/create(projectId=${projectId})}" method="post">

        <!-- 헤더 -->
        <div style="background:#1a6fe8; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
          <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">
            새 위키 만들기
          </h4>
          <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
        </div>

        <!-- 바디 -->
        <div class="modal-body" style="padding:24px;">
          <div class="form-group">
            <label style="font-size:13px; color:#555;">
              위키 이름 <span style="color:#e24b4a">*</span>
            </label>

            <input
              type="text"
              name="title"
              class="form-control"
              placeholder="위키 이름을 입력하세요"
              required
              style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;">
          </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
          <button
            type="button"
            class="btn btn-default btn-custon-three btn-custon-rounded-three"
            data-dismiss="modal">
            취소
          </button>

          <button
            onclick="createWiki()"
            class="btn btn-primary btn-custon-three btn-custon-rounded-three">
            생성
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
</div>
</body>
</html>
