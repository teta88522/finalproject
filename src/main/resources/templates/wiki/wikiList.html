<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<style>
  .wiki-list-wrap {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 24px;
  }
  .wiki-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .wiki-header h4 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #333;
  }
  .btn-new-wiki {
    padding: 8px 18px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-new-wiki:hover {
    background: #4338ca;
  }
  .wiki-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border: 1px solid #f0f0f0;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .wiki-item:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .wiki-item-title {
    font-size: 15px;
    font-weight: 500;
    color: #333;
  }
  .wiki-item-meta {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
  }
  .wiki-empty {
    text-align: center;
    padding: 60px 0;
    color: #aaa;
    font-size: 14px;
  }
</style>
</head>
<body>
<div layout:fragment="Content">
<div class="product-status mg-b-15">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="wiki-list-wrap">

                    <!-- 헤더 -->
                    <div class="wiki-header">
                        <h4>📄 위키</h4>
                        <button class="btn-new-wiki" onclick="createWiki()">+ 새 위키</button>
                    </div>

                    <!-- 위키 목록 -->
                    <div id="wikiListContainer">
                        <div th:if="${#lists.isEmpty(wikiList)}" class="wiki-empty">
                            <p>아직 위키 페이지가 없습니다.</p>
                            <p>새 위키를 만들어보세요!</p>
                        </div>
                        <div th:each="wiki : ${wikiList}"
                             class="wiki-item"
                             th:onclick="|location.href='@{/project/{pid}/wiki/{wid}(pid=${projectId}, wid=${wiki.wikiId})}'|">
                            <div>
                                <div class="wiki-item-title" th:text="${wiki.title}">제목</div>
                                <div class="wiki-item-meta">
                                    <span th:text="${wiki.createdBy}">작성자</span>
                                    &nbsp;·&nbsp;
                                    <span th:text="${#dates.format(wiki.createdAt, 'yyyy-MM-dd')}">날짜</span>
                                </div>
                            </div>
                            <div style="color:#aaa; font-size:20px;">›</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const projectId = '[[${projectId}]]';

    function createWiki() {
        const title = prompt('위키 제목을 입력하세요')
        if (!title) return

        fetch(`/project/${projectId}/wiki/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, projectId: projectId })
        })
        .then(res => res.json())
        .then(data => {
            location.href = `/project/${projectId}/wiki/${data.wikiId}`
        })
        .catch(err => console.error('위키 생성 실패:', err))
    }
</script>
</div>
</body>
</html>
