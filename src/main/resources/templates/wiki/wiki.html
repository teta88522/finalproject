<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/wiki/wiki.css}">
</head>
<body>
<div layout:fragment="Content">
<div class="product-status mg-b-15">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="wiki-wrap">

          <!-- 헤더 -->
          <div class="wiki-header">
            <h4 style="margin:0; font-size:16px; color:#888;">위키</h4>
            <div style="display:flex; align-items:center; gap:8px;">
              <button onclick="toggleVersionPanel()"
                      class="btn btn-custon-rounded-four custom-white-btn">
                버전 히스토리
              </button>
              <button onclick="saveAndView()"
                      class="btn btn-custon-rounded-four custom-default-btn">
                저장
              </button>
            </div>
          </div>

          <!-- 제목 -->
          <input id="wikiTitle" type="text" class="wiki-title-input" placeholder="편집 버전 제목을 입력하세요"/>

          <!-- 에디터 + 버전패널 -->
          <div style="display:flex; gap:16px;">
            <div style="flex:1;">

              <!-- 탭 -->
              <div class="wiki-tabs">
                <button class="wiki-tab active" onclick="switchTab('edit')">✏️ 편집</button>
                <button class="wiki-tab" onclick="switchTab('preview')">👁️ 미리보기</button>
              </div>

              <!-- 툴바 -->
              <div class="wiki-toolbar" id="wikiToolbar">
                <button class="toolbar-btn" onclick="insertMd('**', '**')"><b>B</b></button>
                <button class="toolbar-btn" onclick="insertMd('*', '*')"><i>I</i></button>
                <button class="toolbar-btn" onclick="insertMd('~~', '~~')"><s>S</s></button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertLine('## ')">H2</button>
                <button class="toolbar-btn" onclick="insertLine('### ')">H3</button>
                <button class="toolbar-btn" onclick="insertLine('#### ')">H4</button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertLine('- ')">• 목록</button>
                <button class="toolbar-btn" onclick="insertLine('1. ')">1. 목록</button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertLine('> ')">❝ 인용</button>
                <button class="toolbar-btn" onclick="insertCodeBlock()">&lt;/&gt; 코드</button>
                <button class="toolbar-btn" onclick="insertTable()">⊞ 표</button>
                <button class="toolbar-btn" onclick="insertLine('---')">— 구분선</button>
                <button class="toolbar-btn" onclick="insertLink()">🔗 링크</button>
                <button class="toolbar-btn" onclick="insertWikiLink()">📄 위키링크</button>
                <button class="toolbar-btn" onclick="triggerImageUpload()">🖼️ 이미지</button>
              </div>
              <input type="file" id="wikiImageInput" accept="image/*" style="display:none">

              <!-- 편집 탭 -->
              <textarea id="markdownInput"
                        th:data-wiki-id="${wikiId}"
                        th:data-project-id="${projectId}"
                        placeholder="마크다운으로 입력하세요...&#10;&#10;위키 링크: [[위키제목]]"></textarea>

              <!-- 미리보기 탭 -->
              <div id="wikiPreview" class="wiki-preview"></div>

            </div>

            <!-- 버전 히스토리 패널 -->
            <div id="versionPanel" class="version-panel">
              <h6 style="margin:0 0 12px 0; font-weight:600;">버전 히스토리</h6>
              <div id="versionList"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- 링크 삽입 모달 -->
<div class="modal fade" id="insertLinkModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document" style="border-radius:20px;">
    <div class="modal-content" style="border-radius:5px; overflow:hidden; border:none;">

      <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">링크 삽입</h4>
        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
      </div>

      <div class="modal-body" style="padding:24px;">
        <div class="form-group">
          <label style="font-size:13px; color:#555;">
            링크 텍스트
          </label>
          <input type="text"
                 id="linkText"
                 class="form-control"
                 placeholder="표시할 텍스트 (선택)"
                 style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px; margin-bottom:12px;">
          <label style="font-size:13px; color:#555;">
            URL <span style="color:#e24b4a">*</span>
          </label>
          <input type="text"
                 id="linkUrl"
                 class="form-control"
                 placeholder="https://..."
                 style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;">
        </div>
      </div>

      <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
        <button type="button"
                class="btn btn-custon-rounded-four custom-white-btn"
                data-dismiss="modal">
          취소
        </button>
        <button type="button"
                class="btn btn-custon-rounded-four custom-default-btn"
                onclick="confirmInsertLink()">
          삽입
        </button>
      </div>

    </div>
  </div>
</div>

<!-- 위키링크 삽입 모달 -->
<!-- 위키링크 삽입 모달 -->
<div class="modal fade" id="insertWikiLinkModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document" style="border-radius:20px;">
    <div class="modal-content" style="border-radius:5px; overflow:hidden; border:none;">

      <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">위키 링크 삽입</h4>
        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
      </div>

      <div class="modal-body" style="padding:24px;">
        <div class="form-group">

          <!-- 기존 위키 선택 -->
          <label style="font-size:13px; color:#555;">기존 위키에서 선택</label>
          <select id="wikiLinkSelect"
                  class="form-control"
                  style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px; margin-bottom:16px;">
            <option value="">-- 위키 선택 --</option>
          </select>

          <!-- 구분선 -->
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
            <hr style="flex:1; margin:0;">
            <span style="font-size:12px; color:#aaa;">또는 직접 입력</span>
            <hr style="flex:1; margin:0;">
          </div>

          <!-- 직접 입력 -->
          <label style="font-size:13px; color:#555;">
            위키 제목 직접 입력
          </label>
          <input type="text"
                 id="wikiLinkTitle"
                 class="form-control"
                 placeholder="위키 제목을 입력하세요"
                 style="border-radius:10px; border:1px solid #ddd; font-size:13px; height:36px;">
          <small style="color:#aaa; font-size:11px;">존재하지 않는 위키면 새로 생성됩니다.</small>
        </div>
      </div>

      <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
        <button type="button"
                class="btn btn-custon-rounded-four custom-white-btn"
                data-dismiss="modal">
          취소
        </button>
        <button type="button"
                class="btn btn-custon-rounded-four custom-default-btn"
                onclick="confirmInsertWikiLink()">
          삽입
        </button>
      </div>

    </div>
  </div>
</div>

<!-- 버전 복원 확인 모달 -->
<div class="modal fade" id="restoreModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document" style="border-radius:20px;">
    <div class="modal-content" style="border-radius:5px; overflow:hidden; border:none;">

      <div style="background:#031225; padding:18px 24px; display:flex; align-items:center; justify-content:space-between;">
        <h4 style="color:#fff; margin:0; font-size:15px; font-weight:500;">버전 복원</h4>
        <span data-dismiss="modal" style="color:#fff; font-size:18px; cursor:pointer;">✕</span>
      </div>

      <div class="modal-body" style="padding:24px;">
        <p style="font-size:14px; color:#333; margin:0;">이 버전으로 복원하시겠습니까?</p>
        <p style="font-size:13px; color:#aaa; margin-top:8px;">복원하면 현재 내용이 해당 버전으로 변경됩니다.</p>
      </div>

      <div class="modal-footer" style="border-top:1px solid #f0f0f0; padding:14px 24px 20px;">
        <button type="button"
                class="btn btn-custon-rounded-four custom-white-btn"
                data-dismiss="modal">
          취소
        </button>
        <button type="button"
                id="confirmRestoreBtn"
                class="btn btn-custon-rounded-four custom-default-btn">
          복원
        </button>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/bundle.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/wikiEdit.js}"></script>
</div>
</body>
</html>
