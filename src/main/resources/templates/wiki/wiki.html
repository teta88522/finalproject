<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/wiki/wiki.css}">
</head>
<body>
<div layout:fragment="Content">
<div class="product-status mg-b-15">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="wiki-wrap">

          <!-- 헤더 -->
          <div class="wiki-header">
            <h4 style="margin:0; font-size:16px; color:#888;">📄 위키</h4>
            <div style="display:flex; gap:8px;">
              <button onclick="toggleVersionPanel()"
                      style="padding:6px 14px; border:1px solid #ddd; border-radius:6px; background:#fff; cursor:pointer; font-size:13px;">
                버전 히스토리
              </button>
              <button onclick="saveAndView()"
                      style="padding:6px 18px; border:none; border-radius:6px; background:#3d6ef5; color:#fff; cursor:pointer; font-size:13px; font-weight:600;">
                💾 저장
              </button>
            </div>
          </div>

          <!-- 제목 -->
          <input id="wikiTitle" type="text" class="wiki-title-input" placeholder="제목을 입력하세요"/>

          <!-- 에디터 + 버전패널 -->
          <div style="display:flex; gap:16px;">
            <div style="flex:1;">

              <!-- 탭 -->
              <div class="wiki-tabs">
                <button class="wiki-tab active" onclick="switchTab('edit')">✏️ 편집</button>
                <button class="wiki-tab" onclick="switchTab('preview')">👁️ 미리보기</button>
              </div>

              <!-- 툴바 -->
              <div class="wiki-toolbar" id="wikiToolbar">
                <button class="toolbar-btn" onclick="insertMd('**', '**')"><b>B</b></button>
                <button class="toolbar-btn" onclick="insertMd('*', '*')"><i>I</i></button>
                <button class="toolbar-btn" onclick="insertMd('~~', '~~')"><s>S</s></button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertLine('## ')">H2</button>
                <button class="toolbar-btn" onclick="insertLine('### ')">H3</button>
                <button class="toolbar-btn" onclick="insertLine('#### ')">H4</button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertLine('- ')">• 목록</button>
                <button class="toolbar-btn" onclick="insertLine('1. ')">1. 목록</button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick="insertLine('> ')">❝ 인용</button>
                <button class="toolbar-btn" onclick="insertCodeBlock()">&lt;/&gt; 코드</button>
                <button class="toolbar-btn" onclick="insertTable()">⊞ 표</button>
                <button class="toolbar-btn" onclick="insertLine('---')">— 구분선</button>
                <button class="toolbar-btn" onclick="insertLink()">🔗 링크</button>
                <button class="toolbar-btn" onclick="insertWikiLink()">📄 위키링크</button>
                <button class="toolbar-btn" onclick="triggerImageUpload()">🖼️ 이미지</button>
              </div>
              <input type="file" id="wikiImageInput" accept="image/*" style="display:none">

              <!-- 편집 탭 -->
              <textarea id="markdownInput"
                        th:data-wiki-id="${wikiId}"
                        th:data-project-id="${projectId}"
                        placeholder="마크다운으로 입력하세요...&#10;&#10;위키 링크: [[위키제목]]"></textarea>

              <!-- 미리보기 탭 -->
              <div id="wikiPreview" class="wiki-preview"></div>

            </div>

            <!-- 버전 히스토리 패널 -->
            <div id="versionPanel" class="version-panel">
              <h6 style="margin:0 0 12px 0; font-weight:600;">버전 히스토리</h6>
              <div id="versionList"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/bundle.js}"></script>
<script>
  const wikiId = document.getElementById('markdownInput').dataset.wikiId
  const projectId = document.getElementById('markdownInput').dataset.projectId

  // 탭 전환
  function switchTab(tab) {
    const tabs = document.querySelectorAll('.wiki-tab')
    const textarea = document.getElementById('markdownInput')
    const previewEl = document.getElementById('wikiPreview')
    const toolbar = document.getElementById('wikiToolbar')

    if (tab === 'edit') {
      tabs[0].classList.add('active')
      tabs[1].classList.remove('active')
      textarea.style.display = 'block'
      toolbar.style.display = 'flex'
      previewEl.classList.remove('active')
    } else {
      tabs[0].classList.remove('active')
      tabs[1].classList.add('active')
      textarea.style.display = 'none'
      toolbar.style.display = 'none'
      previewEl.classList.add('active')

      const md = textarea.value
      let html = window.marked.parse(md)

      // [[위키제목]] 변환
      convertWikiLinks(html).then(convertedHtml => {
        previewEl.innerHTML = generateToc(convertedHtml) + convertedHtml
      })
    }
  }

  // 목차 생성
  function generateToc(html) {
    const parser = new DOMParser()
    const doc = parser.parseFromString(html, 'text/html')
    const headings = doc.querySelectorAll('h2, h3, h4')
    if (headings.length === 0) return ''
    let toc = '<div class="wiki-toc"><div class="wiki-toc-title">목차</div><ol>'
    headings.forEach((h, i) => {
      const level = parseInt(h.tagName[1])
      const text = h.textContent
      const indent = (level - 2) * 16
      toc += `<li style="margin-left:${indent}px"><a href="#heading-${i}">${text}</a></li>`
    })
    toc += '</ol></div>'
    return toc
  }

  // [[위키제목]] → 링크 변환
  async function convertWikiLinks(html) {
    const matches = [...html.matchAll(/\[\[(.+?)\]\]/g)]
    if (matches.length === 0) return html

    for (const match of matches) {
      const title = match[1]
      try {
        const res = await fetch(`/project/${projectId}/wiki/find?title=${encodeURIComponent(title)}`)
        const page = await res.json()
        if (page && page.wikiId) {
          html = html.replace(
            match[0],
            `<a href="/project/${projectId}/wiki/${page.wikiId}"
                style="color:#3d6ef5; text-decoration:none; border-bottom:1px solid #3d6ef5;">${title}</a>`
          )
        } else {
          html = html.replace(
            match[0],
            `<a href="javascript:createWiki('${title}')"
                style="color:#e53e3e; text-decoration:none; border-bottom:1px solid #e53e3e;">${title}</a>`
          )
        }
      } catch(e) {
        html = html.replace(match[0], title)
      }
    }
    return html
  }

  // 없는 위키 생성
  function createWiki(title) {
    if (!confirm(`"${title}" 위키를 새로 만드시겠습니까?`)) return
    fetch(`/project/${projectId}/wiki/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, projectId: projectId })
    })
    .then(res => res.json())
    .then(data => {
      location.href = `/project/${projectId}/wiki/${data.wikiId}/edit`
    })
    .catch(err => console.error('위키 생성 실패:', err))
  }

  // 툴바 함수들
  function insertMd(before, after) {
    const ta = document.getElementById('markdownInput')
    const start = ta.selectionStart
    const end = ta.selectionEnd
    const selected = ta.value.substring(start, end)
    const newText = before + (selected || '텍스트') + after
    ta.value = ta.value.substring(0, start) + newText + ta.value.substring(end)
    ta.focus()
    ta.dispatchEvent(new Event('input'))
  }

  function insertLine(prefix) {
    const ta = document.getElementById('markdownInput')
    const start = ta.selectionStart
    const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1
    ta.value = ta.value.substring(0, lineStart) + prefix + ta.value.substring(lineStart)
    ta.focus()
    ta.dispatchEvent(new Event('input'))
  }

  function insertCodeBlock() {
    const ta = document.getElementById('markdownInput')
    const start = ta.selectionStart
    const insert = '\n```\n코드 입력\n```\n'
    ta.value = ta.value.substring(0, start) + insert + ta.value.substring(start)
    ta.focus()
    ta.dispatchEvent(new Event('input'))
  }

  function insertTable() {
    const ta = document.getElementById('markdownInput')
    const start = ta.selectionStart
    const insert = '\n| 제목1 | 제목2 | 제목3 |\n|---|---|---|\n| 내용 | 내용 | 내용 |\n'
    ta.value = ta.value.substring(0, start) + insert + ta.value.substring(start)
    ta.focus()
    ta.dispatchEvent(new Event('input'))
  }

  function insertLink() {
    const url = prompt('링크 URL을 입력하세요')
    if (!url) return
    const ta = document.getElementById('markdownInput')
    const start = ta.selectionStart
    const end = ta.selectionEnd
    const selected = ta.value.substring(start, end) || '링크텍스트'
    const insert = `[${selected}](${url})`
    ta.value = ta.value.substring(0, start) + insert + ta.value.substring(end)
    ta.focus()
    ta.dispatchEvent(new Event('input'))
  }

  // 위키링크 삽입 버튼
  function insertWikiLink() {
    const title = prompt('연결할 위키 제목을 입력하세요')
    if (!title) return
    const ta = document.getElementById('markdownInput')
    const start = ta.selectionStart
    const insert = `[[${title}]]`
    ta.value = ta.value.substring(0, start) + insert + ta.value.substring(start)
    ta.focus()
    ta.dispatchEvent(new Event('input'))
  }

  function triggerImageUpload() {
    document.getElementById('wikiImageInput').click()
  }

  // 버전 히스토리
  function toggleVersionPanel() {
    const panel = document.getElementById('versionPanel')
    panel.classList.toggle('open')
    if (panel.classList.contains('open')) loadVersionList()
  }

  function loadVersionList() {
    fetch(`/project/${projectId}/wiki/versions/${wikiId}`)
      .then(res => res.json())
      .then(list => {
        const container = document.getElementById('versionList')
        container.innerHTML = ''
        if (!Array.isArray(list) || list.length === 0) {
          container.innerHTML = '<p style="color:#aaa; font-size:13px;">저장된 버전이 없습니다.</p>'
          return
        }
        list.forEach(v => {
          const div = document.createElement('div')
          div.className = 'version-item'
          div.innerHTML = `
            <div style="font-size:13px; font-weight:500;">${v.title || '제목없음'}</div>
            <div class="version-no">${v.versionNo}</div>
            <div class="version-date">${v.createdAt}</div>
          `
          div.onclick = () => restoreVersion(v.versionId)
          container.appendChild(div)
        })
      })
      .catch(err => console.error('버전 목록 로드 실패:', err))
  }

  function restoreVersion(versionId) {
    if (!confirm('이 버전으로 복원하시겠습니까?')) return
    fetch(`/project/${projectId}/wiki/version/${versionId}`)
      .then(res => res.json())
      .then(data => {
        if (data && data.content) {
          const content = JSON.parse(data.content)
          const text = typeof content === 'string' ? content : (content.markdown || '')
          const ta = document.getElementById('markdownInput')
          ta.value = text
          ta.dispatchEvent(new Event('input'))
        }
      })
      .catch(err => console.error('복원 실패:', err))
  }

  // 저장 후 뷰로 이동
  function saveAndView() {
    const textarea = document.getElementById('markdownInput')
    const title = document.getElementById('wikiTitle')?.value || '제목없음'
    const content = JSON.stringify({ markdown: textarea.value })

    fetch(`/project/${projectId}/wiki/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wikiId, title, content })
    })
    .then(res => res.text())
    .then(() => {
      location.href = `/project/${projectId}/wiki/${wikiId}`
    })
    .catch(err => {
      console.error('저장 실패:', err)
      alert('저장에 실패했습니다.')
    })
  }
</script>
</div>
</body>
</html>
