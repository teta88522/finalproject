<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>테스트 목록</title>

<link rel="stylesheet" th:href="@{/css/test/testList.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="test-list-wrap">

        <div class="page-title-area">
            <div>
                <h2>테스트 목록</h2>
                <p class="page-desc">참여 중인 프로젝트 테스트를 조회하고 관리합니다.</p>
            </div>

            <a th:href="@{/project/{projectId}/tests/new(projectId=${projectId})}"
               class="btn-create">
                테스트 생성
            </a>
        </div>

        <!-- 요약 카드 -->
        <section class="summary-section">
            <div class="summary-card">
                <span class="summary-label">전체 테스트</span>
                <strong th:text="${testSummary != null ? testSummary.totalCount : 0}">0</strong>
            </div>

            <div class="summary-card expected">
                <span class="summary-label">예정</span>
                <strong th:text="${testSummary != null ? testSummary.expectedCount : 0}">0</strong>
            </div>

            <div class="summary-card progress">
                <span class="summary-label">진행중</span>
                <strong th:text="${testSummary != null ? testSummary.progressCount : 0}">0</strong>
            </div>

            <div class="summary-card end">
                <span class="summary-label">종료</span>
                <strong th:text="${testSummary != null ? testSummary.endCount : 0}">0</strong>
            </div>
        </section>

        <!-- 검색 조건 -->
        <section class="search-section">
            <div class="section-title">검색 조건</div>

            <form th:action="@{/project/{projectId}/tests(projectId=${projectId})}"
                  method="get"
                  th:object="${testSearchVO}"
                  id="testSearchForm">

                <div class="search-grid">

                    <label for="projectName">프로젝트</label>
                    <input type="text"
                           id="projectName"
                           th:field="*{projectName}"
                           placeholder="프로젝트명">

                    <label for="versionName">버전</label>
                    <input type="text"
                           id="versionName"
                           th:field="*{versionName}"
                           placeholder="버전명">

                    <label for="teamName">그룹</label>
                    <input type="text"
                           id="teamName"
                           th:field="*{teamName}"
                           placeholder="그룹명">

                    <label for="title">테스트명</label>
                    <input type="text"
                           id="title"
                           th:field="*{title}"
                           placeholder="테스트명">

                    <label for="statusCode">상태</label>
                    <select id="statusCode" th:field="*{statusCode}">
                        <option value="">전체</option>
                        <option value="a001">예정</option>
                        <option value="a002">진행중</option>
                        <option value="a003">종료</option>
                    </select>

                    <label for="testTypeCode">유형</label>
                    <select id="testTypeCode" th:field="*{testTypeCode}">
                        <option value="">전체</option>
                        <option value="d001">기능</option>
                        <option value="d002">UI/UX</option>
                        <option value="d003">성능</option>
                        <option value="d004">보안</option>
                        <option value="d005">데이터</option>
                        <option value="d006">기타</option>
                    </select>

                    <label for="priorityCode">우선순위</label>
                    <select id="priorityCode" th:field="*{priorityCode}">
                        <option value="">전체</option>
                        <option value="c001">상</option>
                        <option value="c002">중</option>
                        <option value="c003">하</option>
                    </select>

                    <label for="assigneeName">담당자</label>
                    <input type="text"
                           id="assigneeName"
                           th:field="*{assigneeName}"
                           placeholder="담당자명">
                </div>

                <div class="search-btn-area">
                    <a th:href="@{/project/{projectId}/tests(projectId=${projectId})}"
                       class="btn-reset">
                        초기화
                    </a>

                    <button type="submit" class="btn-search">
                        검색
                    </button>
                </div>
            </form>
        </section>

        <!-- 목록 -->
        <section class="list-section">
            <div class="list-top">
                <div class="section-title">테스트 목록</div>
                <div class="list-count">
                    총 <strong th:text="${testSummary != null ? testSummary.totalCount : 0}">0</strong>건
                </div>
            </div>

            <div class="table-box">
                <table class="test-table">
                    <thead>
                        <tr>
                            <th>테스트 ID</th>
                            <th>테스트명</th>
                            <th>프로젝트</th>
                            <th>버전</th>
                            <th>그룹</th>
                            <th>유형</th>
                            <th>상태</th>
                            <th>우선순위</th>
                            <th>담당자</th>
                            <th>케이스 수</th>
                            <th>시작일</th>
                            <th>종료일</th>
                            <th>작성자</th>
                            <th>등록일</th>
                            <th>관리</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:if="${testList == null or #lists.isEmpty(testList)}">
                            <td colspan="15" class="empty-row">
                                조회된 테스트가 없습니다.
                            </td>
                        </tr>

                        <tr th:each="test : ${testList}">
                            <td class="id-cell">
                                <a th:href="@{/project/{projectId}/tests/{testId}(
                                        projectId=${projectId},
                                        testId=${test.testId}
                                   )}"
                                   th:text="${test.testId}">
                                    TEST_ID
                                </a>
                            </td>

                            <td class="test-name-cell">
                                <a th:href="@{/project/{projectId}/tests/{testId}(
                                        projectId=${projectId},
                                        testId=${test.testId}
                                   )}"
                                   th:text="${test.title}">
                                    테스트명
                                </a>
                            </td>

                            <td th:text="${test.projectName}">프로젝트</td>
                            <td th:text="${test.versionName}">버전</td>
                            <td th:text="${test.teamName}">그룹</td>
                            <td th:text="${test.testTypeName}">유형</td>

                            <td>
                                <span class="status-badge"
                                      th:classappend="${test.statusCode == 'a001' ? ' expected' : (test.statusCode == 'a002' ? ' progress' : ' end')}"
                                      th:text="${test.statusName}">
                                    상태
                                </span>
                            </td>

                            <td>
                                <span class="priority-badge"
                                      th:classappend="${test.priorityCode == 'c001' ? ' high' : (test.priorityCode == 'c003' ? ' low' : ' middle')}"
                                      th:text="${test.priorityName}">
                                    우선순위
                                </span>
                            </td>

                            <td th:text="${test.assigneeName != null ? test.assigneeName : '-'}">담당자</td>
                            <td th:text="${test.totalCaseCount}">0</td>
                            <td th:text="${test.startDate}">2026-01-01</td>
                            <td th:text="${test.endDate}">2026-01-08</td>
                            <td th:text="${test.createdByName != null ? test.createdByName : test.createdBy}">작성자</td>
                            <td th:text="${test.createdAt}">2026-01-01</td>

                            <td>
                                <a th:if="${subscribeYn == 'Y' or test.createdBy == loginUserId}"
                                   th:href="@{/project/{projectId}/tests/{testId}/edit(
                                        projectId=${projectId},
                                        testId=${test.testId}
                                   )}"
                                   class="btn-row-edit">
                                    수정
                                </a>

                                <span th:unless="${subscribeYn == 'Y' or test.createdBy == loginUserId}"
                                      class="text-muted">
                                    -
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script th:inline="javascript">
        const message = /*[[${message}]]*/ null;

        if (message != null) {
            alert(message);
        }

        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('testSearchForm');

            if (form) {
                form.addEventListener('keydown', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        form.submit();
                    }
                });
            }
        });
    </script>

</div>
</body>
</html>
