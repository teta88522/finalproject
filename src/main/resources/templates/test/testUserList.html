<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thyleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>테스트 목록 - 사용자</title>

<link rel="stylesheet" th:href="@{/css/test/testList.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="test-list-page">

        <div class="test-page-header">
            <div>
                <h1 class="test-page-title">테스트 목록</h1>
                <p class="test-page-sub-title">
                    테스트를 조회하고 본인이 생성한 테스트의 결과를 등록할 수 있습니다.
                </p>
            </div>

            <div class="test-user-info">
                <span>사용자</span>
                <strong th:text="${loginId}">loginId</strong>
            </div>
        </div>

        <div class="summary-grid summary-grid-4">
            <div class="summary-card">
                <span>전체 테스트</span>
                <strong th:text="${testSummary != null and testSummary.totalCount != null ? testSummary.totalCount : 0}">0</strong>
            </div>

            <div class="summary-card expected">
                <span>예정</span>
                <strong th:text="${testSummary != null and testSummary.expectedCount != null ? testSummary.expectedCount : 0}">0</strong>
            </div>

            <div class="summary-card summary-progress">
                <span>진행중</span>
                <strong th:text="${testSummary != null and testSummary.progressCount != null ? testSummary.progressCount : 0}">0</strong>
            </div>

            <div class="summary-card end">
                <span>종료</span>
                <strong th:text="${testSummary != null and testSummary.endCount != null ? testSummary.endCount : 0}">0</strong>
            </div>
        </div>

        <div class="search-section">
            <div class="search-header">
                <div>
                    <div class="section-title">검색조건</div>
                    <div class="section-sub-text">
                        프로젝트, 버전, 팀명, 테스트명, 상태, 유형, 우선순위 기준으로 조회합니다.
                    </div>
                </div>

                <a th:href="@{/project/{projectId}/tests/new(projectId=${projectId})}"
                   class="btn-basic btn-primary">
                    테스트 생성
                </a>
            </div>

            <form th:action="@{/project/{projectId}/tests(projectId=${projectId})}" method="get">
                <div class="search-form-row">

                    <div class="search-field">
                        <label for="projectName">프로젝트</label>
                        <input type="text"
                               id="projectName"
                               name="projectName"
                               th:value="${testSearchVO.projectName}"
                               placeholder="프로젝트명 입력">
                    </div>

                    <div class="search-field">
                        <label for="versionName">버전</label>
                        <input type="text"
                               id="versionName"
                               name="versionName"
                               th:value="${testSearchVO.versionName}"
                               placeholder="버전명 입력">
                    </div>

                    <div class="search-field">
                        <label for="teamName">팀명</label>
                        <input type="text"
                               id="teamName"
                               name="teamName"
                               th:value="${testSearchVO.teamName}"
                               placeholder="팀명 입력">
                    </div>

                    <div class="search-field">
                        <label for="title">테스트명</label>
                        <input type="text"
                               id="title"
                               name="title"
                               th:value="${testSearchVO.title}"
                               placeholder="테스트명 입력">
                    </div>

                    <div class="search-field">
                        <label for="statusCode">상태</label>
                        <select id="statusCode" name="statusCode">
                            <option value="">전체</option>
                            <option value="a001" th:selected="${testSearchVO.statusCode == 'a001'}">예정</option>
                            <option value="a002" th:selected="${testSearchVO.statusCode == 'a002'}">진행중</option>
                            <option value="a003" th:selected="${testSearchVO.statusCode == 'a003'}">종료</option>
                        </select>
                    </div>

                    <div class="search-field">
                        <label for="testTypeCode">테스트 유형</label>
                        <select id="testTypeCode" name="testTypeCode">
                            <option value="">전체</option>
                            <option value="d001" th:selected="${testSearchVO.testTypeCode == 'd001'}">기능</option>
                            <option value="d002" th:selected="${testSearchVO.testTypeCode == 'd002'}">UI/UX</option>
                            <option value="d003" th:selected="${testSearchVO.testTypeCode == 'd003'}">성능</option>
                            <option value="d004" th:selected="${testSearchVO.testTypeCode == 'd004'}">보안</option>
                            <option value="d005" th:selected="${testSearchVO.testTypeCode == 'd005'}">데이터</option>
                            <option value="d006" th:selected="${testSearchVO.testTypeCode == 'd006'}">기타</option>
                        </select>
                    </div>

                    <div class="search-field">
                        <label for="priorityCode">우선순위</label>
                        <select id="priorityCode" name="priorityCode">
                            <option value="">전체</option>
                            <option value="c001" th:selected="${testSearchVO.priorityCode == 'c001'}">상</option>
                            <option value="c002" th:selected="${testSearchVO.priorityCode == 'c002'}">중</option>
                            <option value="c003" th:selected="${testSearchVO.priorityCode == 'c003'}">하</option>
                        </select>
                    </div>

                </div>

                <div class="search-btn-area">
                    <a th:href="@{/project/{projectId}/tests(projectId=${projectId})}"
                       class="btn-basic">
                        초기화
                    </a>

                    <button type="submit" class="btn-basic btn-primary">
                        검색
                    </button>
                </div>
            </form>
        </div>

        <div class="list-section">
            <div class="list-header">
                <div>
                    <div class="section-title">테스트 목록</div>
                    <div class="section-sub-text">
                        조회 가능한 테스트 목록입니다.
                    </div>
                </div>

                <div class="list-count">
                    총
                    <strong th:text="${testList == null ? 0 : #lists.size(testList)}">0</strong>
                    건
                </div>
            </div>

            <div class="test-table-wrap">
                <table class="test-table">
                    <thead>
                        <tr>
                            <th>프로젝트</th>
                            <th>버전</th>
                            <th>팀명</th>
                            <th>테스트명</th>
                            <th>상태</th>
                            <th>유형</th>
                            <th>우선순위</th>
                            <th>담당자</th>
                            <th>시작일</th>
                            <th>종료일</th>
                            <th>진행률</th>
                            <th>관리</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:if="${testList == null or #lists.isEmpty(testList)}">
                            <td colspan="12" class="empty-row">
                                등록된 테스트가 없습니다.
                            </td>
                        </tr>

                        <tr th:each="test : ${testList}">
                            <td th:text="${test.projectName}">프로젝트</td>
                            <td th:text="${test.versionName}">버전</td>
                            <td th:text="${test.teamName}">팀명</td>

                            <td class="test-name-cell">
                                <a th:href="@{/project/{projectId}/test/{testId}(projectId=${projectId}, testId=${test.testId})}"
                                   th:text="${test.title}">
                                    테스트명
                                </a>
                            </td>

                            <td>
                                <span class="status-badge"
                                      th:text="${test.statusName}">
                                    상태
                                </span>
                            </td>

                            <td th:text="${test.testTypeName}">유형</td>
                            <td th:text="${test.priorityName}">우선순위</td>
                            <td th:text="${test.assigneeName}">담당자</td>
                            <td th:text="${test.startDate}">시작일</td>
                            <td th:text="${test.endDate}">종료일</td>

                            <td>
                                <div class="progress-bar">
                                    <div class="progress-fill"
                                         th:style="'width:' + ${test.progressRate} + '%'">
                                    </div>
                                </div>
                                <span class="progress-text"
                                      th:text="${test.progressRate + '%'}">0%</span>
                            </td>

                            <td class="action-cell">
                                <a th:href="@{/project/{projectId}/test/{testId}(projectId=${projectId}, testId=${test.testId})}"
                                   class="mini-btn">
                                    상세
                                </a>

                                <a th:if="${test.createdBy == loginUserId}"
                                   th:href="@{/project/{projectId}/test/{testId}/edit(projectId=${projectId}, testId=${test.testId})}"
                                   class="mini-btn">
                                    수정
                                </a>

                                <a th:if="${test.createdBy == loginUserId}"
                                   th:href="@{/project/{projectId}/test/{testId}/result(projectId=${projectId}, testId=${test.testId})}"
                                   class="mini-btn">
                                    결과등록
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</div>
</body>
</html>
