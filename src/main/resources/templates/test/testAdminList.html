<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>테스트 목록</title>

<link rel="stylesheet" th:href="@{/css/test/testList.css}">
</head>

<body>
<div layout:fragment="Content">

    <div class="test-list-wrap">

        <div class="page-title-area">
            <div>
                <h2>테스트 목록</h2>
                <p class="page-desc">프로젝트 테스트를 조회하고 관리합니다.</p>
            </div>

            <a th:href="@{/project/{projectId}/tests/new(projectId=${projectId})}"
               class="btn-create">
                테스트 생성
            </a>
        </div>

        <section class="summary-section">
            <div class="summary-card">
                <span class="summary-label">전체 테스트</span>
                <strong th:text="${testSummary != null ? testSummary.totalCount : 0}">0</strong>
            </div>

            <div class="summary-card expected">
                <span class="summary-label">예정</span>
                <strong th:text="${testSummary != null ? testSummary.expectedCount : 0}">0</strong>
            </div>

            <div class="summary-card progress-card">
                <span class="summary-label">진행중</span>
                <strong th:text="${testSummary != null ? testSummary.progressCount : 0}">0</strong>
            </div>

            <div class="summary-card end">
                <span class="summary-label">종료</span>
                <strong th:text="${testSummary != null ? testSummary.endCount : 0}">0</strong>
            </div>
        </section>

        <section class="search-section">
            <div class="section-title">검색 조건</div>

            <form th:action="@{/project/{projectId}/tests(projectId=${projectId})}"
                  method="get"
                  th:object="${testSearchVO}"
                  id="testSearchForm">

                <div class="search-grid">

                    <div class="search-field">
                        <label for="projectName">프로젝트</label>
                        <input type="text"
                               id="projectName"
                               th:field="*{projectName}"
                               placeholder="프로젝트명">
                    </div>

                    <div class="search-field">
                        <label for="versionName">버전</label>
                        <input type="text"
                               id="versionName"
                               th:field="*{versionName}"
                               placeholder="버전명">
                    </div>

                    <div class="search-field filter-group">
                        <label>그룹</label>

                        <div class="filter-dropdown">
                            <button type="button" class="filter-dropdown-btn">그룹 선택</button>

                            <div class="filter-check-list filter-dropdown-panel">
                                <label class="filter-check-item"
                                       th:each="group : ${groupList}">
                                    <input type="checkbox"
                                           name="teamNameList"
                                           th:value="${group.groupName}"
                                           th:checked="${testSearchVO.teamNameList != null and #lists.contains(testSearchVO.teamNameList, group.groupName)}">
                                    <span th:text="${group.groupName}">그룹명</span>
                                </label>

                                <div th:if="${groupList == null or #lists.isEmpty(groupList)}"
                                     class="filter-empty">
                                    등록된 그룹이 없습니다.
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="search-field">
                        <label for="title">테스트명</label>
                        <input type="text"
                               id="title"
                               th:field="*{title}"
                               placeholder="테스트명">
                    </div>

                    <div class="search-field filter-group">
                        <label>상태</label>

                        <div class="filter-dropdown">
                            <button type="button" class="filter-dropdown-btn">상태 선택</button>

                            <div class="filter-check-list filter-dropdown-panel">
                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="statusCodeList"
                                           value="a001"
                                           th:checked="${testSearchVO.statusCodeList != null and #lists.contains(testSearchVO.statusCodeList, 'a001')}">
                                    <span>예정</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="statusCodeList"
                                           value="a002"
                                           th:checked="${testSearchVO.statusCodeList != null and #lists.contains(testSearchVO.statusCodeList, 'a002')}">
                                    <span>진행중</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="statusCodeList"
                                           value="a003"
                                           th:checked="${testSearchVO.statusCodeList != null and #lists.contains(testSearchVO.statusCodeList, 'a003')}">
                                    <span>종료</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="search-field filter-group">
                        <label>유형</label>

                        <div class="filter-dropdown">
                            <button type="button" class="filter-dropdown-btn">유형 선택</button>

                            <div class="filter-check-list filter-dropdown-panel">
                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="testTypeCodeList"
                                           value="d001"
                                           th:checked="${testSearchVO.testTypeCodeList != null and #lists.contains(testSearchVO.testTypeCodeList, 'd001')}">
                                    <span>기능</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="testTypeCodeList"
                                           value="d002"
                                           th:checked="${testSearchVO.testTypeCodeList != null and #lists.contains(testSearchVO.testTypeCodeList, 'd002')}">
                                    <span>UI/UX</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="testTypeCodeList"
                                           value="d003"
                                           th:checked="${testSearchVO.testTypeCodeList != null and #lists.contains(testSearchVO.testTypeCodeList, 'd003')}">
                                    <span>성능</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="testTypeCodeList"
                                           value="d004"
                                           th:checked="${testSearchVO.testTypeCodeList != null and #lists.contains(testSearchVO.testTypeCodeList, 'd004')}">
                                    <span>보안</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="testTypeCodeList"
                                           value="d005"
                                           th:checked="${testSearchVO.testTypeCodeList != null and #lists.contains(testSearchVO.testTypeCodeList, 'd005')}">
                                    <span>데이터</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="testTypeCodeList"
                                           value="d006"
                                           th:checked="${testSearchVO.testTypeCodeList != null and #lists.contains(testSearchVO.testTypeCodeList, 'd006')}">
                                    <span>기타</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="search-field filter-group">
                        <label>우선순위</label>

                        <div class="filter-dropdown">
                            <button type="button" class="filter-dropdown-btn">우선순위 선택</button>

                            <div class="filter-check-list filter-dropdown-panel">
                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="priorityCodeList"
                                           value="c001"
                                           th:checked="${testSearchVO.priorityCodeList != null and #lists.contains(testSearchVO.priorityCodeList, 'c001')}">
                                    <span>상</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="priorityCodeList"
                                           value="c002"
                                           th:checked="${testSearchVO.priorityCodeList != null and #lists.contains(testSearchVO.priorityCodeList, 'c002')}">
                                    <span>중</span>
                                </label>

                                <label class="filter-check-item">
                                    <input type="checkbox"
                                           name="priorityCodeList"
                                           value="c003"
                                           th:checked="${testSearchVO.priorityCodeList != null and #lists.contains(testSearchVO.priorityCodeList, 'c003')}">
                                    <span>하</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="search-field">
                        <label for="assigneeName">담당자</label>
                        <input type="text"
                               id="assigneeName"
                               th:field="*{assigneeName}"
                               placeholder="담당자명">
                    </div>

                </div>

                <div class="search-btn-area">
                    <a th:href="@{/project/{projectId}/tests(projectId=${projectId})}"
                       class="btn-reset">
                        초기화
                    </a>

                    <button type="submit" class="btn-search">
                        검색
                    </button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <div class="list-top">
                <div class="section-title">테스트 목록</div>
                <div class="list-count">
                    총 <strong th:text="${testSummary != null ? testSummary.totalCount : 0}">0</strong>건
                </div>
            </div>

            <div class="table-box">
                <table class="test-table">
                    <thead>
                        <tr>
                            <th>테스트 ID</th>
                            <th>테스트명</th>
                            <th>프로젝트</th>
                            <th>버전</th>
                            <th>그룹</th>
                            <th>유형</th>
                            <th>상태</th>
                            <th>우선순위</th>
                            <th>담당자</th>
                            <th>케이스 수</th>
                            <th>시작일</th>
                            <th>종료일</th>
                            <th>작성자</th>
                            <th>등록일</th>
                            <th>관리</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:if="${testList == null or #lists.isEmpty(testList)}">
                            <td colspan="15" class="empty-row">
                                조회된 테스트가 없습니다.
                            </td>
                        </tr>

                        <tr th:each="test : ${testList}">
                            <td class="id-cell">
                                <a th:href="@{/project/{projectId}/tests/{testId}(projectId=${projectId}, testId=${test.testId})}"
                                   th:text="${test.testId}">
                                    TEST_ID
                                </a>
                            </td>

                            <td class="test-name-cell">
                                <a th:href="@{/project/{projectId}/tests/{testId}(projectId=${projectId}, testId=${test.testId})}"
                                   th:text="${test.title}">
                                    테스트명
                                </a>
                            </td>

                            <td th:text="${test.projectName}">프로젝트</td>
                            <td th:text="${test.versionName}">버전</td>
                            <td th:text="${test.teamName}">그룹</td>
                            <td th:text="${test.testTypeName}">유형</td>

                            <td>
                                <span class="status-badge"
                                      th:classappend="${test.statusCode == 'a001' ? ' expected' : (test.statusCode == 'a002' ? ' progress' : ' end')}"
                                      th:text="${test.statusName}">
                                    상태
                                </span>
                            </td>

                            <td>
                                <span class="priority-badge"
                                      th:classappend="${test.priorityCode == 'c001' ? ' high' : (test.priorityCode == 'c003' ? ' low' : ' middle')}"
                                      th:text="${test.priorityName}">
                                    우선순위
                                </span>
                            </td>

                            <td th:text="${test.assigneeName != null ? test.assigneeName : '-'}">담당자</td>
                            <td th:text="${test.totalCaseCount}">0</td>
                            <td th:text="${test.startDate}">2026-01-01</td>
                            <td th:text="${test.endDate}">2026-01-08</td>
                            <td th:text="${test.createdByName != null ? test.createdByName : test.createdBy}">작성자</td>
                            <td th:text="${test.createdAt}">2026-01-01</td>

                            <td>
                                <a th:href="@{/project/{projectId}/tests/{testId}/edit(projectId=${projectId}, testId=${test.testId})}"
                                   class="btn-row-edit">
                                    수정
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script th:inline="javascript">
        const message = /*[[${message}]]*/ null;

        if (message != null) {
            alert(message);
        }

        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('testSearchForm');

            if (form) {
                form.addEventListener('keydown', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        form.submit();
                    }
                });
            }
        });

        document.addEventListener("click", function (event) {
            const dropdownButton = event.target.closest(".filter-dropdown-btn");

            if (dropdownButton) {
                event.preventDefault();
                event.stopPropagation();

                const dropdown = dropdownButton.closest(".filter-dropdown");

                document.querySelectorAll(".filter-dropdown").forEach(function (item) {
                    if (item !== dropdown) {
                        item.classList.remove("open");
                    }
                });

                dropdown.classList.toggle("open");
                return;
            }

            if (event.target.closest(".filter-dropdown-panel")) {
                event.stopPropagation();
                return;
            }

            document.querySelectorAll(".filter-dropdown").forEach(function (item) {
                item.classList.remove("open");
            });
        });
    </script>

</div>
</body>
</html>
