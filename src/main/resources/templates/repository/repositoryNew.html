<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/repository/repositoryNew.css}">
</head>
<body>
<div layout:fragment="Content">

    <div class="repo-container">
        <div class="repo-header">
            <h2 class="repo-title">자료실</h2>
            <a th:href="@{/project/{projectId}/repository(projectId=${projectId})}"
                class="btn btn-custon-rounded-four custom-default-btn">← 목록으로</a>
        </div>

        <div class="repo-detail-card" style="padding: 40px; min-height: 450px;">
            <form th:action="@{/project/{projectId}/repository/new(projectId=${projectId})}" method="post" enctype="multipart/form-data">
    			
    			<input type="hidden" name="fileId" th:value="${repository.fileId}">
    			
			    <div class="repo-upload-zone" id="uploadZone" onclick="document.getElementById('uploadFile').click();">
			        <div class="repo-upload-inner">
			            <p class="repo-upload-text">파일을 이 영역으로 드래그하거나 클릭하여 선택해주세요.</p>
			        </div>
			    </div>
			
			    <div class="repo-file-list-box">
			        <div class="repo-file-item">
			            <input type="file" id="uploadFile" name="uploadFile" style="display: none;" 
			                   th:required="${repository.originalName == null || repository.originalName == ''}">
			                   
			            <input type="text" id="displayFileName" class="repo-file-name-input" 
			                   th:value="${repository?.originalName}" placeholder="파일을 선택해주세요" readonly>
			        </div>
			    </div>
			
			    <div class="repo-btn-group" style="margin-top: 40px;">
			        <a th:href="@{/project/{projectId}/repository(projectId=${projectId})}" class="btn btn-custon-rounded-four custom-white-btn">취소</a>
			        <button type="submit" class="btn btn-custon-rounded-four custom-default-btn">저장</button>
			    </div>
			</form>
        </div>
    </div>

    <!-- ✅ 새 파일 선택 시 표시된 파일명이 안 바뀌던 문제 수정 (change 이벤트를 아무도 안 듣고 있었음).
         의미 없이 에러만 내던 × 버튼(정의 안 된 clearFile() 호출)은 제거함. -->
    <script>
        document.getElementById('uploadFile').addEventListener('change', function () {
            var displayInput = document.getElementById('displayFileName');
            if (this.files && this.files.length > 0) {
                displayInput.value = this.files[0].name;
            }
        });

        // ✅ 드래그 앤 드롭으로도 파일을 선택할 수 있도록 처리
        (function () {
            var uploadZone = document.getElementById('uploadZone');
            var uploadFile = document.getElementById('uploadFile');
            var displayInput = document.getElementById('displayFileName');

            ['dragover', 'dragenter'].forEach(function (eventName) {
                uploadZone.addEventListener(eventName, function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    uploadZone.classList.add('dragover');
                });
            });

            ['dragleave', 'dragend'].forEach(function (eventName) {
                uploadZone.addEventListener(eventName, function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    uploadZone.classList.remove('dragover');
                });
            });

            uploadZone.addEventListener('drop', function (e) {
                e.preventDefault();
                e.stopPropagation();
                uploadZone.classList.remove('dragover');

                if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    uploadFile.files = e.dataTransfer.files;
                    displayInput.value = e.dataTransfer.files[0].name;
                }
            });
        })();
    </script>
</div>
</body>

</html>
