<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/repository/repositoryList.css}">
</head>
<body>
	<div layout:fragment="Content">
		<div class="repo-container">
			<div class="repo-header">
				<h2 class="repo-title">자료실</h2>
				<a
					th:href="@{/project/{projectId}/repository/new(projectId=${projectId})}"
					class="repo-btn-upload">업로드</a>
			</div>
 
			<div class="search-section">
				<!-- ✅ 추가: 에러 메시지 표시 -->
				<div th:if="${errorMessage}"
					class="alert alert-danger alert-dismissible fade show" role="alert"
					style="margin-bottom: 20px; padding: 12px 20px; border-radius: 6px; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
					<span th:text="${errorMessage}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"
						aria-label="Close"></button>
				</div>
 
				<form
					th:action="@{/project/{projectId}/repository(projectId=${projectId})}"
					method="get" id="searchForm">
					<div class="search-form-row">
 
						<!-- ✅ 기간 - 검증 추가 -->
						<div class="search-field">
							<label>기간</label>
							<div class="d-flex align-items-center">
								<input type="date" id="startDate" name="startDate"
									th:value="${param.startDate}"> 
								<span class="mx-2">~</span>
								<input type="date" id="endDate" name="endDate" 
									th:value="${param.endDate}">
							</div>
						</div>
 
						<!-- 출처: details 드롭다운 + 체크박스 -->
						<div class="search-field">
							<label>출처</label>
							<details class="filter-dropdown" id="sourceDropdown">
								<summary>
									<span class="filter-selected-text">전체</span>
								</summary>
								<div class="filter-dropdown-panel">
									<label class="filter-check-item" th:each="code : ${sourceList}">
										<input type="checkbox" name="fileCode"
										th:value="${code['CODE_ID']}"
										th:checked="${code['CODE_ID'] == param.fileCode}"> <span
										th:text="${code['NOTE']}">출처</span>
									</label>
								</div>
							</details>
						</div>
 
						<!-- 제목 -->
						<div class="search-field">
							<label>파일명</label> <input type="text" name="originalName"
								th:value="${param.originalName}" placeholder="파일명을 입력해주세요.">
						</div>
 
					</div>
 
					<div class="search-btn-area">
						<a
							th:href="@{/project/{projectId}/repository(projectId=${projectId})}"
							class="filter-btn btn-secondary">초기화</a>
						<button type="submit" class="filter-btn btn-primary">검색</button>
					</div>
				</form>
			</div>
 
			<div class="repo-table-card">
				<table class="repo-list-table">
					<thead>
						<tr>
							<th>파일</th>
							<th>출처</th>
							<th>날짜</th>
							<th>크기</th>
							<th>다운로드</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="repo : ${repositoryList}">
							<td><a
								th:href="@{/project/{projectId}/repository/detail(projectId=${projectId}, fileId=${repo.fileId})}"
								class="repo-file-link" th:text="${repo.originalName}">파일명</a></td>
							<td class="repo-checksum" th:text="${repo.categoryName}"></td>
							<td
								th:text="${#dates.format(repo.uploadDate, 'yyyy-MM-dd HH:mm')}"></td>
							<td th:text="${repo.fileSizeText}"></td>
							<td class="text-center"><a
								th:href="@{/project/{projectId}/repository/download(projectId=${projectId}, fileId=${repo.fileId})}"
								class="repo-download-icon">↓</a></td>
						</tr>
					</tbody>
				</table>
			</div>
 
			<!-- 페이징 -->
			<div class="pagination-area"
				style="text-align: center; margin-top: 20px;">
				<ul class="pagination">
					<li th:classappend="${!repositoryPage.hasPrevious} ? 'disabled'">
						<a
						th:href="${repositoryPage.hasPrevious}
						? @{/project/{projectId}/repository(projectId=${projectId}, page=${repositoryPage.page - 1}, startDate=${param.startDate}, endDate=${param.endDate}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})}
						: 'javascript:void(0)'">이전</a>
					</li>
					<th:block th:if="${repositoryPage.totalPage >= 1}">
						<li
							th:each="pageNum : ${#numbers.sequence(1, repositoryPage.totalPage)}">
							<a
							th:href="@{/project/{projectId}/repository(projectId=${projectId}, page=${pageNum}, startDate=${param.startDate}, endDate=${param.endDate}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})}}"
							th:text="${pageNum}"
							th:classappend="${pageNum == repositoryPage.page} ? 'active'">1</a>
						</li>
					</th:block>
					<li th:if="${repositoryPage.totalPage == 0}"><a class="active"
						href="javascript:void(0)">1</a></li>
					<li th:classappend="${!repositoryPage.hasNext} ? 'disabled'">
						<a
						th:href="${repositoryPage.hasNext}
						? @{/project/{projectId}/repository(projectId=${projectId}, page=${repositoryPage.page + 1}, startDate=${param.startDate}, endDate=${param.endDate}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})}
						: 'javascript:void(0)'">다음</a>
					</li>
				</ul>
			</div>
		</div>
 
		<script>
		/* 드롭다운 외부 클릭 시 닫기 */
		document.addEventListener('click', function(e) {
			document.querySelectorAll('details.filter-dropdown').forEach(function(d) {
				if (!d.contains(e.target)) d.removeAttribute('open');
			});
		});
 
		/* 체크박스 선택 시 summary 텍스트 업데이트 */
		document.querySelectorAll('details.filter-dropdown').forEach(function(dropdown) {
			const summary = dropdown.querySelector('.filter-selected-text');
			const checkboxes = dropdown.querySelectorAll('input[type="checkbox"]');
 
			function updateSummary() {
				const checked = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.nextElementSibling.textContent.trim());
				summary.textContent = checked.length > 0 ? checked.join(', ') : '전체';
			}
 
			checkboxes.forEach(cb => cb.addEventListener('change', updateSummary));
			updateSummary();
		});
		
		// ✅ 날짜 검증: startDate <= endDate 확인
		document.getElementById('searchForm').addEventListener('submit', function(e) {
			const startDate = document.getElementById('startDate').value;
			const endDate = document.getElementById('endDate').value;
 
			if (startDate && endDate) {
				if (new Date(startDate) > new Date(endDate)) {
					e.preventDefault();
					alert('시작 날짜가 종료 날짜보다 늦을 수 없습니다.');
					return false;
				}
			}
		});
 
		// ✅ endDate input에 최소값(startDate) 동적 설정
		document.getElementById('startDate').addEventListener('change', function() {
			const startDate = this.value;
			if (startDate) {
				document.getElementById('endDate').setAttribute('min', startDate);
			}
		});
	</script>
	</div>
</body>

</html>
