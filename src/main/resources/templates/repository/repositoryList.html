<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/common-fliter.css}">
<link rel="stylesheet" th:href="@{/css/repository/repositoryList.css}">
</head>
<body>
<div layout:fragment="Content">

    <div class="project-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="font-weight: 700; margin: 0; color: #111;">자료실</h2>
            <a th:href="@{/repository/new}" class="btn-register" style="text-decoration: none; text-align: center; line-height: 40px;">업로드</a>
        </div>

        <div class="module-card mb-4" style="padding: 20px;">
            <form th:action="@{/repository}" method="get">
                <div class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <div class="form-section-title" style="margin-bottom: 5px;">기간 (시작일)</div>
                        <input type="date" class="form-line-control" name="startDate">
                    </div>
                    <div class="col-md-2">
                        <div class="form-section-title" style="margin-bottom: 5px;">기간 (종료일)</div>
                        <input type="date" class="form-line-control" name="endDate">
                    </div>
                    <div class="col-md-2">
                        <div class="form-section-title" style="margin-bottom: 5px;">일감</div>
                        <input type="text" class="form-line-control" name="fileCode" th:value="${searchVO.fileCode}" placeholder="일감 선택/입력">
                    </div>
                    <div class="col-md-2">
                        <div class="form-section-title" style="margin-bottom: 5px;">제목</div>
                        <input type="text" class="form-line-control" name="originalName" th:value="${searchVO.originalName}" placeholder="파일명 검색">
                    </div>
                    <div class="col-md-2">
                        <div class="form-section-title" style="margin-bottom: 5px;">작성자</div>
                        <input type="text" class="form-line-control" name="uploadUserId" th:value="${searchVO.uploadUserId}" placeholder="작성자 ID">
                    </div>
                    <div class="col-md-2 text-end">
                        <a th:href="@{/repository}" class="btn-register" style="background: #6c757d; text-decoration: none; display: inline-block; text-align: center; line-height: 40px; margin-right: 5px;">clean</a>
                        <button type="submit" class="btn-register" style="background: #007bff;">apply</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="module-card" style="padding: 15px; overflow-x: auto;">
            <table class="table" style="width: 100%; margin: 0; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid #dee2e6; background-color: #f8f9fa;">
                        <th style="padding: 12px; font-weight: 600; width: 40%;">파일</th>
                        <th style="padding: 12px; font-weight: 600; width: 15%;">날짜</th>
                        <th style="padding: 12px; font-weight: 600; width: 10%;">크기</th>
                        <th style="padding: 12px; font-weight: 600; width: 10%;">D/L</th>
                        <th style="padding: 12px; font-weight: 600; width: 20%;">Checksum</th>
                    </tr>
                </thead>
                <tbody>
				    <tr th:if="${#lists.isEmpty(repositoryList)}">
				        <td colspan="6" class="text-center" style="padding: 30px; color: #868e96;">조회된 자료가 없습니다.</td>
				    </tr>
				    <tr th:each="repo : ${repositoryList}" style="border-bottom: 1px solid #eee;">
				        <td style="padding: 12px;">
				            <a th:href="@{/repository/detail(fileId=${repo.fileId})}" th:text="${repo.originalName}" style="color: #333; font-weight: 500; text-decoration: none;"></a>
				        </td>
				        <td style="padding: 12px;" th:text="${#dates.format(repo.uploadDate, 'yyyy-MM-dd HH:mm')}">2026-06-23 12:00</td>
				        <td style="padding: 12px;" th:text="${repo.fileSizeText}"></td>

				        <td style="padding: 12px;">0</td>
				        <td style="padding: 12px; font-size: 13px; color: #666;" th:text="${repo.fileCode}">SHA256:...</td>
				        <td style="padding: 12px;" class="text-center">
				            <a th:href="@{/repository/download(fileId=${repo.fileId})}" style="color: #007bff; text-decoration: none;"></a>
				        </td>
				    </tr>
				</tbody>
            </table>
        </div>
    </div>

</div>

</body>

</html>
