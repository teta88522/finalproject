<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/repository/repositoryList.css}">
</head>
<body>
	<div layout:fragment="Content">
		<div class="repo-container">
			<div class="repo-header">
				<h2 class="repo-title">자료실</h2>
				<a
					th:href="@{/project/{projectId}/repository/new(projectId=${projectId})}"
					class="repo-btn-upload">업로드</a>
			</div>

			<div class="search-section">
				<form
					th:action="@{/project/{projectId}/repository(projectId=${projectId})}"
					method="get">
					<div class="search-form-row">
						<div class="search-field">
							<label>기간</label>
							<div class="d-flex align-items-center">
								<input type="date" name="startDate"
									th:value="${param.startDate}"> <span class="mx-2">~</span>
								<input type="date" name="endDate" th:value="${param.endDate}">
							</div>
						</div>
						<div class="search-field">
							<label>일감</label> <select name="projectId">
								<option value="">전체</option>
								<option th:each="project : ${projectList}"
									th:value="${project.projectId}"
									th:text="${project.projectName}"
									th:selected="${#strings.toString(project.projectId) == #strings.toString(param.projectId)}">
									일감</option>
							</select>
						</div>
						<div class="search-field">
							<label>제목</label> <input type="text" name="originalName"
								th:value="${param.originalName}" placeholder="입력">
						</div>
						<div class="search-field">
							<label>작성자</label> <input type="text" name="uploadUserId"
								th:value="${param.uploadUserId}" placeholder="입력">
						</div>
					</div>

					<div class="search-btn-area">
						<a
							th:href="@{/project/{projectId}/repository(projectId=${projectId})}"
							class="filter-btn btn-secondary">clean</a>
						<button type="submit" class="filter-btn btn-primary">apply</button>
					</div>
				</form>
			</div>

			<div class="repo-table-card">
				<table class="repo-list-table">
					<thead>
						<tr>
							<th>파일</th>
							<th>출처</th>
							<th>날짜</th>
							<th>크기</th>
							<th>다운로드</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="repo : ${repositoryList}">
							<td><a
								th:href="@{/project/{projectId}/repository/detail(projectId=${projectId}, fileId=${repo.fileId})}"
								class="repo-file-link" th:text="${repo.originalName}">파일명</a></td>

							<td class="repo-checksum" th:text="${repo.categoryName}"></td>

							<td
								th:text="${#dates.format(repo.uploadDate, 'yyyy-MM-dd HH:mm')}"></td>

							<td th:text="${repo.fileSizeText}"></td>

							<td class="text-center"><a
								th:href="@{/project/{projectId}/repository/download(projectId=${projectId}, fileId=${repo.fileId})}"
								class="repo-download-icon">↓</a></td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="pagination-area"
				style="text-align: center; margin-top: 20px;">
				<ul class="pagination">
					<!-- 이전 버튼: repositoryPage.hasPrevious 사용 -->
					<li th:classappend="${!repositoryPage.hasPrevious} ? 'disabled'">
						<a
						th:href="${repositoryPage.hasPrevious} ? @{/project/{projectId}/repository(projectId=${projectId}, page=${repositoryPage.page - 1}, startDate=${param.startDate}, endDate=${param.endDate}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})} : 'javascript:void(0)'">이전</a>
					</li>

					<!-- 페이지 번호: repositoryPage.totalPage 사용 -->
					<li
						th:each="pageNum : ${#numbers.sequence(1, repositoryPage.totalPage)}">
						<a
						th:href="@{/project/{projectId}/repository(projectId=${projectId}, page=${pageNum}, startDate=${param.startDate}, endDate=${param.endDate}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})}"
						th:text="${pageNum}"
						th:classappend="${pageNum == repositoryPage.page} ? 'active'">1</a>
					</li>

					<!-- 다음 버튼: repositoryPage.hasNext 사용 -->
					<li th:classappend="${!repositoryPage.hasNext} ? 'disabled'">
						<a
						th:href="${repositoryPage.hasNext} ? @{/project/{projectId}/repository(projectId=${projectId}, page=${repositoryPage.page + 1}, startDate=${param.startDate}, endDate=${param.endDate}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})} : 'javascript:void(0)'">다음</a>
					</li>
				</ul>
			</div>
		</div>
	</div>

</body>

</html>
