<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/repository/repositoryList.css}">
</head>
<body>
	<div layout:fragment="Content">
		<div class="repo-container">
			<div class="repo-header">
				<h2 class="repo-title">자료실</h2>
				<a th:href="@{/repository/new}" class="repo-btn-upload">업로드</a>
			</div>

			<div class="search-section">
				<form th:action="@{/repository}" method="get">
					<div class="search-form-row">
						<div class="search-field">
							<label>기간</label>
							<div class="d-flex align-items-center">
								<input type="date" name="startDate"
									th:value="${param.startDate}"> <span class="mx-2">~</span>
								<input type="date" name="endDate" th:value="${param.endDate}">
							</div>
						</div>
						<div class="search-field">
							<label>일감</label> <select name="projectId">
								<option value="">전체</option>
								<option th:each="project : ${projectList}"
									th:value="${project.projectId}"
									th:text="${project.projectName}"
									th:selected="${#strings.toString(project.projectId) == #strings.toString(param.projectId)}">
									일감</option>
							</select>
						</div>
						<div class="search-field">
							<label>제목</label> <input type="text" name="originalName"
								th:value="${param.originalName}" placeholder="입력">
						</div>
						<div class="search-field">
							<label>작성자</label> <input type="text" name="uploadUserId"
								th:value="${param.uploadUserId}" placeholder="입력">
						</div>
					</div>

					<div class="search-btn-area">
						<a th:href="@{/repository}" class="filter-btn btn-secondary">clean</a>
						<button type="submit" class="filter-btn btn-primary">apply</button>
					</div>
				</form>
			</div>

			<div class="repo-table-card">
				<table class="repo-list-table">
					<thead>
						<tr>
							<th>파일</th>
							<th>출처</th>
							<th>날짜</th>
							<th>크기</th>
							<th>다운로드</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="repo : ${repositoryList}">
							<td><a
								th:href="@{/repository/detail(fileId=${repo.fileId})}"
								class="repo-file-link" th:text="${repo.originalName}">파일명</a>
							</td>

							<td class="repo-checksum" th:text="${repo.fileCode}"></td>

							<td
								th:text="${#dates.format(repo.uploadDate, 'yyyy-MM-dd HH:mm')}"></td>

							<td th:text="${repo.fileSizeText}"></td>

							<td class="text-center" style="text-align: center !important;">
								<a th:href="@{/repository/download(fileId=${repo.fileId})}"
								class="repo-download-icon"
								style="text-decoration: none; color: #007bff; font-weight: bold; display: inline-block;">↓</a>
							</td>
						</tr>

						<tr th:if="${repositoryList.size() < 10}"
							th:each="i : ${#numbers.sequence(repositoryList.size() + 1, 10)}"
							style="height: 45px;">
							<td colspan="6">&nbsp;</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="pagination-area"
				style="text-align: center; margin-top: 20px;">
				<ul class="pagination">
					<li th:classappend="${!hasPrevious} ? 'disabled'"><a
						th:href="${hasPrevious} ? @{/repository(page=${currentPage - 1}, startDate=${param.startDate}, endDate=${param.endDate}, projectId=${param.projectId}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})} : 'javascript:void(0)'">이전</a>
					</li>

					<li th:each="pageNum : ${#numbers.sequence(1, totalPages)}"><a
						th:href="@{/repository(page=${pageNum}, startDate=${param.startDate}, endDate=${param.endDate}, projectId=${param.projectId}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})}"
						th:text="${pageNum}"
						th:classappend="${pageNum == currentPage} ? 'active'">1</a></li>

					<li th:classappend="${!hasNext} ? 'disabled'"><a
						th:href="${hasNext} ? @{/repository(page=${currentPage + 1}, startDate=${param.startDate}, endDate=${param.endDate}, projectId=${param.projectId}, originalName=${param.originalName}, uploadUserId=${param.uploadUserId})} : 'javascript:void(0)'">다음</a>
					</li>
				</ul>
			</div>
		</div>
	</div>

</body>

</html>
