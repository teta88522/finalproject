<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8" />
    <title>마일스톤 목록</title>
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}" />
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-list.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>
<body>
<div layout:fragment="Content">
    <div class="kiaalap-wrapper">
        <div class="milestone-container">
            
            <div class="kiaalap-panel filter-panel">
                <div class="filter-header">
                    <h2>마일스톤</h2>
                    <button type="button" class="btn btn-primary" id="btnCreateMilestone">마일스톤 생성</button>
                </div>
                <form class="filter-form" th:action="@{/milestones/list}" method="get">
                    </form>
            </div>

            <div class="milestone-list-area">
                <div th:if="${#lists.isEmpty(milestoneList)}" class="kiaalap-panel empty-msg" style="text-align: center; padding: 50px;">
                    조회된 마일스톤이 없습니다.
                </div>

                <div class="kiaalap-panel milestone-item" th:each="milestone : ${milestoneList}" th:data-milestone-id="${milestone.milestoneId}">
                    
                    <div class="milestone-item-header toggle-accordion">
                        <div class="title-area">
                            <span class="toggle-icon"><i class="fas fa-chevron-down"></i></span>
                            <h3>
                                <a th:href="@{/milestones/detail(id=${milestone.milestoneId})}" class="title-link no-accordion" th:text="${milestone.title}">마일스톤 제목</a>
                            </h3>
                            <span class="status-badge"
                                  th:classappend="${milestone.statusCode == 'TODO' ? 'status-todo' : (milestone.statusCode == 'IN_PROGRESS' ? 'status-inpg' : (milestone.statusCode == 'DONE' ? 'status-done' : ''))}"
                                  th:switch="${milestone.statusCode}">
                                <th:block th:case="'TODO'">진행 예정</th:block>
                                <th:block th:case="'IN_PROGRESS'">진행 중</th:block>
                                <th:block th:case="'DONE'">완료</th:block>
                                <th:block th:case="*">[[${milestone.statusCode}]]</th:block>
                            </span>
                        </div>
                        <div class="date-area">
                            <span th:text="${milestone.startDate}">2026-01-01</span> ~ <span th:text="${milestone.endDate}">2026-12-31</span>
                        </div>
                    </div>

                    <div class="milestone-body" style="display: none;">
                        
                        <div class="progress-wrap">
                            <div class="progress">
                                <div class="progress-bar" th:style="'width: ' + ${milestone.totalProgressRate} + '%;'"></div>
                            </div>
                            <div class="progress-text">
                                담당자: <span th:text="${milestone.managerName}">홍길동</span> - <span th:text="${milestone.totalProgressRate}">0</span>% 완료
                            </div>
                        </div>

                        <div class="issue-list">
                            <div th:if="${#lists.isEmpty(milestone.issueList)}" class="empty-issue">
                                등록된 하위 일감이 없습니다.
                            </div>

                            <div class="issue-item" th:each="issue : ${milestone.issueList}">
                                <div class="issue-main">
                                    <span class="issue-badge dynamic-badge" th:data-status="${issue.issueStatusName ?: '상태미상'}" th:text="${issue.issueStatusName ?: '상태미상'}">상태</span>
                                    
                                    <a href="#" class="issue-title hover-primary" th:text="${issue.title}">일감 제목</a>
                                </div>
                                
                                <div class="issue-meta">
                                    <span class="meta-item" title="담당자"><i class="fas fa-user"></i> [[${issue.assigneeName ?: '미정'}]]</span>
                                    <span class="meta-item" title="기한"><i class="far fa-calendar-alt"></i> [[${issue.dueDate ?: '미정'}]]</span>
                                    <span class="meta-item" title="진행률"><i class="fas fa-tasks"></i> [[${issue.progressRate}]]%</span>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/milestones/milestone-list.js}"></script>
</div>
</body>
</html>
