<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>마일스톤 수정</title>
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-common.css}">
    <link rel="stylesheet" th:href="@{/css/milestones/milestone-create.css}">
</head>
<body>
    <div layout:fragment="Content" class="milestone-container">
       <div class="kiaalap-panel">
        
        <div class="panel-header">
            <h2>마일스톤 수정</h2>
        </div>
        
        <form id="milestoneForm" th:action="@{/project/{projectId}/milestones/update(projectId=${projectId})}" method="post">
            <input type="hidden" id="milestoneId" name="milestoneId" th:value="${milestone.milestoneId}">
            <input type="hidden" id="versionId" name="versionId" th:value="${milestone.versionId}">
            <input type="hidden" id="selectedIssueIds" name="selectedIssueIds" value="">
			<input type="hidden" id="projectId" th:value="${projectId}">
			
            <div class="panel-body">
                <div class="content-row">
                    
                    <div class="content-left">
                        <div class="form-group">
                            <label>제목 <span class="required">*</span></label>
                            <input type="text" id="title" name="title" class="form-control required-input" 
                                   th:value="${milestone.title}" placeholder="마일스톤 제목을 입력하세요">
                        </div>

                        <div class="form-group">
                            <label>설명</label>
                            <textarea id="description" name="description" class="form-control" 
                                      th:text="${milestone.description}" placeholder="마일스톤의 목표와 상세 내용을 적어주세요."></textarea>
                        </div>

                        <div class="issue-section">
                            <h3>일감 연결</h3>
                            <div class="issue-search-group" style="position: relative;">
                                <input type="text" id="issueSearchInput" class="form-control" autocomplete="off" placeholder="일감 제목 또는 버전 입력...">
                                
                                <ul id="searchDropdown" class="search-dropdown-menu" style="display: none;"></ul>
                            </div>
                            
                            <div class="issue-list-container">
                                <table class="table table-hover">
                                    <tbody id="issueListBody">
                                        <tr th:if="${not #lists.isEmpty(connectedIssues)}" th:each="issue : ${connectedIssues}">
                                            <td style="text-align: center;">
                                                <input type="checkbox" class="issue-checkbox" 
                                                       th:value="${issue.issueId}" 
                                                       th:data-version-id="${issue.versionId}" checked>
                                            </td>
                                            <td th:text="|${issue.title} (${issue.versionName})|">일감 제목</td>
                                            <td style="text-align: center;"><span class="status-badge" th:text="${issue.issueStatusName}">상태</span></td>
                                        </tr>
                                        
                                        <tr th:if="${#lists.isEmpty(connectedIssues)}">
                                            <td colspan="3" class="empty-row" style="text-align: center; color: #999; padding: 30px 10px;">
                                                현재 연결된 일감이 없습니다. 검색을 통해 추가하세요.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="content-right">
                        <div class="form-group">
                            <label>담당자 <span class="required">*</span></label>
                            <select id="managerId" name="managerId" class="form-control required-input">
                                <option value="">담당자 선택</option>
                                <option th:each="manager : ${managerList}" 
                                        th:value="${manager.userId}" 
                                        th:text="${manager.userName}"
                                        th:selected="${manager.userId == milestone.managerId}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>상태 <span class="required">*</span></label>
                            <select id="statusCode" name="statusCode" class="form-control required-input">
                                <option value="">상태 선택</option>
                                <option value="L001" th:selected="${milestone.statusCode == 'L001'}">진행 예정</option>
                                <option value="L002" th:selected="${milestone.statusCode == 'L002'}">진행 중</option>
                                <option value="L003" th:selected="${milestone.statusCode == 'L003'}">완료</option>
                            </select>
                        </div>

						<div class="form-group">
						    <label>시작일 <span class="required">*</span></label>
						    <input type="date" id="startDate" name="startDate" class="form-control required-input date-input"
						           th:value="${#temporals.format(milestone.startDate, 'yyyy-MM-dd')}">
						    <div id="startDatePastError" class="error-text" style="display: none; color: #dc3545; font-size: 12px; margin-top: 5px;">
						        시작일은 오늘 날짜 이전으로 설정할 수 없습니다.
						    </div>
						</div>

                        <div class="form-group">
                            <label>목표 일자 <span class="required">*</span></label>
                            <input type="date" id="endDate" name="endDate" class="form-control required-input date-input"
                                   th:value="${#temporals.format(milestone.endDate, 'yyyy-MM-dd')}">
                            <div id="dateError" class="error-text" style="display: none;">시작일은 목표일자 보다 늦을 수 없습니다.</div>
                        </div>
                    </div>
                    
                </div>
            </div>

            <div class="panel-footer">
                <button type="button" class="btn btn-default" onclick="history.back()">취소</button>
                <div class="right-buttons">
                    <button type="submit" id="btnUpdate" class="btn btn-primary">수정 완료</button>
                </div>
            </div>
        </form>

    </div>
    <script th:src="@{/js/milestones/milestone-update.js}"></script>
</div>
</body>
</html>
