<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">

<head>
<meta charset="UTF-8">
<title>일감 등록</title>

<link rel="stylesheet" th:href="@{/css/common-ui.css}">
<link rel="stylesheet" th:href="@{/css/issues/issues.css}">
</head>

<body>
	<div layout:fragment="Content">

		<div class="issues-create-page">
			<div class="container-fluid">

				<div class="issues-header">
					<div>
						<h3>일감 등록</h3>
						<p>
							<span th:text="${projectInfo.projectName}">프로젝트명</span> 프로젝트에 필요한
							일감을 등록합니다.
						</p>
					</div>
				</div>

				<div th:if="${message}" class="page-message page-message-success">
					<span th:text="${message}">일감이 등록되었습니다.</span> <span
						th:if="${createdIssueId}" th:text="| (${createdIssueId})|"></span>
				</div>

				<div th:if="${fileWarning}" class="page-message page-message-info"
					th:text="${fileWarning}"></div>

				<div th:if="${errorMessage}" class="page-message page-message-error"
					th:text="${errorMessage}"></div>

				<div th:if="${#lists.isEmpty(issueTypeList) and !canAssignIssueType}"
					class="page-message page-message-info">이 프로젝트에 적용된 일감유형이
					없습니다. 프로젝트 관리자에게 문의해주세요.</div>

				<div th:if="${#lists.isEmpty(issueTypeList) and canAssignIssueType}"
					class="page-message page-message-info issues-create-empty-action">
					<span>프로젝트에 사용할 일감유형을 바로 배정할 수 있습니다.</span>
					<a th:href="@{/project/{projectId}/issues/type-assign(projectId=${selectedProjectId})}"
						class="btn btn-custon-rounded-four btn-primary btn-xs">일감유형 배정</a>
				</div>

				<div th:if="${#lists.isEmpty(versionList)}"
					class="page-message page-message-info issues-create-empty-action">
					<span>선택 가능한 버전이 없습니다. 진행 중인 버전이 등록된 후 일감을 생성할 수 있습니다.</span>
					<a th:href="@{/project/{projectId}/roadmap/setting_create(projectId=${selectedProjectId})}"
						class="btn btn-custon-rounded-four btn-primary btn-xs">버전 등록</a>
				</div>

				<div th:if="${#lists.isEmpty(priorityList)}"
					class="page-message page-message-info">일감 우선순위 설정이 필요합니다.
					프로젝트 관리자에게 문의해주세요.</div>

				<div th:each="setting : ${fieldSettingList}"
					class="field-setting-data"
					th:attr="data-issue-type-id=${setting.issueTypeId},
                          data-field-code=${setting.fieldCode},
                          data-use-yn=${setting.useYn},
                          data-required-yn=${setting.requiredYn}"></div>

				<form
					th:action="@{/project/{projectId}/issues/create(projectId=${selectedProjectId})}"
					th:object="${issue}" method="post" enctype="multipart/form-data"
					id="documentForm" class="issues-form">

					<input type="hidden" th:field="*{projectId}">

					<div class="issues-form-layout">

						<div class="issues-main-column">

							<div class="issues-card issues-main-card">
								<div class="issues-card-title">
									<h4>기본 정보</h4>
								</div>

								<div class="issues-top-grid">
									<div class="form-group">
										<label for="projectName">프로젝트</label> <input type="text"
											id="projectName" th:value="${projectInfo.projectName}"
											class="form-control issues-readonly-control" readonly>
									</div>

									<div class="form-group">
										<label for="issueTypeId"> 유형 <span class="required">*</span>
										</label> <select id="issueTypeId" th:field="*{issueTypeId}"
											class="form-control" required>
											<option value="">선택</option>
											<option th:each="issueType : ${issueTypeList}"
												th:value="${issueType.issueTypeId}"
												th:text="${issueType.issueTypeName}">유형명</option>
										</select>
									</div>

									<div class="form-group">
										<label for="versionId"> 버전 <span class="required">*</span>
										</label> <select id="versionId" th:field="*{versionId}"
											class="form-control" required>
											<option value="">선택</option>
											<option th:each="version : ${versionList}"
												th:value="${version.versionId}"
												th:text="${version.versionName}">버전명</option>
										</select>
									</div>

									<div class="form-group dynamic-field"
										data-field-code="MILESTONE">
										<label for="milestoneId"> 마일스톤 <span
											class="required dynamic-required">*</span>
										</label> <select id="milestoneId" th:field="*{milestoneId}"
											class="form-control">
											<option value=""
												th:text="${#lists.isEmpty(milestoneList)} ? '불러오는 중' : '선택'">선택</option>
											<option th:each="milestone : ${milestoneList}"
												th:value="${milestone.milestoneId}"
												th:attr="data-version-id=${milestone.versionId}"
												th:text="${milestone.milestoneTitle}">마일스톤명</option>
										</select>
									</div>
								</div>

								<div class="form-group">
									<label for="title"> 제목 <span class="required">*</span>
									</label> <input type="text" id="title" th:field="*{title}"
										class="form-control" maxlength="255" required>
								</div>

								<div class="form-group issues-description-group">
									<label for="description">설명</label>
									<textarea id="description" th:field="*{description}"
										class="form-control issues-description" maxlength="1000"></textarea>
								</div>

								<div class="form-group">
									<label>첨부파일</label>

									<div class="issues-file-box">
										<div>
											<label for="issueCreateFileInput"
												class="btn btn-custon-rounded-four btn-default issues-file-select">
												파일 선택 </label> <input type="file" id="issueCreateFileInput" name="files"
												multiple class="issues-file-input"> <span
												id="issueCreateFileCount" class="issues-file-count">파일 0개</span>
										</div>

										<ul id="issueCreateFileList" class="issues-file-list"></ul>
									</div>
								</div>
							</div>

						</div>

						<div class="issues-side-column">
							<div class="issues-card issues-side-card">
								<div class="issues-card-title">
									<h4>상세 설정</h4>
								</div>

								<div class="form-group dynamic-field"
									data-field-code="START_DATE">
									<label for="startDate"> 시작일 <span
										class="required dynamic-required">*</span>
									</label> <input type="date" id="startDate" th:field="*{startDate}"
										class="form-control">
								</div>

								<div class="form-group dynamic-field" data-field-code="DUE_DATE">
									<label for="dueDate"> 완료일 <span
										class="required dynamic-required">*</span>
									</label> <input type="date" id="dueDate" th:field="*{dueDate}"
										class="form-control">
								</div>

								<div class="form-group dynamic-field"
									data-field-code="ESTIMATED_HOURS">
									<label for="estimatedHours"> 추정시간 <span
										class="required dynamic-required">*</span>
									</label> <input type="number" id="estimatedHours"
										th:field="*{estimatedHours}" class="form-control" min="0"
										max="99999" step="1">
								</div>

								<div class="form-group">
									<label for="settingCodeId"> 우선순위 <span class="required">*</span>
									</label> <select id="settingCodeId" th:field="*{settingCodeId}"
										class="form-control" required>
										<option value="">선택</option>
										<option th:each="priority : ${priorityList}"
											th:value="${priority.settingCodeId}"
											th:text="${priority.settingName}">우선순위</option>
									</select>
								</div>

								<div class="form-group">
									<label for="progressRate">진척도</label>
									<div class="issues-detail-progress-control">
										<input type="range" id="progressRate" min="0" max="100"
											step="10" th:field="*{progressRate}"
											oninput="this.nextElementSibling.textContent = this.value + '%'">
										<span class="issues-detail-progress-value"
											th:text="|${issue.progressRate != null ? issue.progressRate : 0}%|">0%</span>
									</div>
								</div>

								<div class="form-group dynamic-field"
									data-field-code="PARENT_ISSUE">
									<label for="parentIssueId"> 상위일감 <span
										class="required dynamic-required">*</span>
									</label> <select id="parentIssueId" th:field="*{parentIssueId}"
										class="form-control">
										<option value="">선택</option>
										<option th:each="parentIssue : ${parentIssueList}"
											th:value="${parentIssue.parentIssueId}"
											th:text="|${parentIssue.parentIssueTitle} (${parentIssue.parentIssueId})|">
											상위일감</option>
									</select>
								</div>

								<div class="form-group dynamic-field" data-field-code="ASSIGNEE">
									<label for="assigneeId"> 담당자 <span
										class="required dynamic-required">*</span>
									</label> <select id="assigneeId" th:field="*{assigneeId}"
										class="form-control">
										<option value="">선택</option>
										<option th:each="assignee : ${assigneeList}"
											th:value="${assignee.assigneeId}"
											th:text="${assignee.assigneeName}">담당자명</option>
									</select>
								</div>
							</div>
						</div>

					</div>

					<div class="issues-form-actions">
						<a
							th:href="@{/project/{projectId}/issues(projectId=${selectedProjectId})}"
							class="btn btn-custon-rounded-four btn-default"> 취소 </a>

						<button type="submit" name="submitAction" value="next"
							class="btn btn-custon-rounded-four btn-primary"
							th:disabled="${#lists.isEmpty(issueTypeList) or #lists.isEmpty(versionList) or #lists.isEmpty(priorityList)}">
							다음</button>

						<button type="submit" name="submitAction" value="finish"
							class="btn btn-custon-rounded-four btn-primary"
							th:disabled="${#lists.isEmpty(issueTypeList) or #lists.isEmpty(versionList) or #lists.isEmpty(priorityList)}">
							완료</button>
					</div>

				</form>

			</div>
		</div>

		<div id="issueLoadingOverlay" class="issues-loading-overlay" hidden
			aria-live="polite" aria-busy="true">
			<div class="issues-loading-box">
				<span class="issues-loading-spinner"></span>
				<strong id="issueLoadingMessage">생성중</strong>
			</div>
		</div>

		<script th:inline="javascript">
			(function() {
				document.body.classList.add('issues-create-body');

				var createForm = document.getElementById('documentForm');
				var issueTypeSelect = document.getElementById('issueTypeId');
				var versionSelect = document.getElementById('versionId');
				var milestoneSelect = document.getElementById('milestoneId');
				var assigneeSelect = document.getElementById('assigneeId');
				var parentIssueSelect = document.getElementById('parentIssueId');
				var createFileInput = document.getElementById('issueCreateFileInput');
				var createFileList = document.getElementById('issueCreateFileList');
				var createFileCount = document.getElementById('issueCreateFileCount');
				var createOptionUrl = /*[[@{/project/{projectId}/issues/create/options(projectId=${selectedProjectId})}]]*/ '';
				var selectedMilestoneId = /*[[${issue.milestoneId}]]*/ '';
				var selectedAssigneeId = /*[[${issue.assigneeId}]]*/ '';
				var selectedParentIssueId = /*[[${issue.parentIssueId}]]*/ '';
				var selectedCreateFiles = [];
				var settingMap = {};
				var loadedMilestoneCount = 0;

				function showLoading(message) {
					var overlay = document.getElementById('issueLoadingOverlay');
					var messageBox = document.getElementById('issueLoadingMessage');

					if (messageBox) {
						messageBox.textContent = message;
					}
					if (overlay) {
						overlay.hidden = false;
					}
				}

				if (createForm) {
					createForm.addEventListener('submit', function() {
						syncCreateFiles();
						showLoading('생성중');
					});
				}

				if (createFileInput && createFileList && createFileCount) {
					createFileInput.addEventListener('change', function(event) {
						selectedCreateFiles = selectedCreateFiles.concat(Array.prototype.slice.call(event.target.files || []));
						createFileInput.value = '';
						renderCreateFiles();
					});

					createFileList.addEventListener('click', function(event) {
						if (event.target.tagName !== 'BUTTON') {
							return;
						}

						var index = Number(event.target.getAttribute('data-index'));
						selectedCreateFiles.splice(index, 1);
						renderCreateFiles();
					});
				}

				function syncCreateFiles() {
					if (!createFileInput || selectedCreateFiles.length === 0) {
						return;
					}

					var dataTransfer = new DataTransfer();
					selectedCreateFiles.forEach(function(file) {
						dataTransfer.items.add(file);
					});
					createFileInput.files = dataTransfer.files;
				}

				function renderCreateFiles() {
					if (!createFileList || !createFileCount) {
						return;
					}

					createFileList.innerHTML = '';
					createFileCount.textContent = '파일 ' + selectedCreateFiles.length + '개';

					selectedCreateFiles.forEach(function(file, index) {
						var item = document.createElement('li');
						var name = document.createElement('span');
						var removeButton = document.createElement('button');

						item.className = 'issues-file-item';
						name.className = 'issues-file-name';
						name.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';

						removeButton.type = 'button';
						removeButton.setAttribute('data-index', index);
						removeButton.textContent = '삭제';

						item.appendChild(name);
						item.appendChild(removeButton);
						createFileList.appendChild(item);
					});
				}

				selectedMilestoneId = selectedMilestoneId || '';
				selectedAssigneeId = selectedAssigneeId || '';
				selectedParentIssueId = selectedParentIssueId || '';

				document.querySelectorAll('.field-setting-data').forEach(
						function(item) {
							var issueTypeId = item
									.getAttribute('data-issue-type-id');
							var fieldCode = item
									.getAttribute('data-field-code');

							if (!settingMap[issueTypeId]) {
								settingMap[issueTypeId] = {};
							}

							settingMap[issueTypeId][fieldCode] = {
								useYn : item.getAttribute('data-use-yn'),
								requiredYn : item
										.getAttribute('data-required-yn')
							};
						});

				function setDisabled(group, disabled) {
					group.querySelectorAll('input, select, textarea').forEach(
							function(input) {
								input.disabled = disabled;

								if (disabled) {
									input.required = false;
								}
							});
				}

				function applyFieldSettings() {
					var issueTypeId = issueTypeSelect ? issueTypeSelect.value
							: '';
					var fields = settingMap[issueTypeId] || {};

					document
							.querySelectorAll('.dynamic-field')
							.forEach(
									function(group) {
										var fieldCode = group
												.getAttribute('data-field-code');
										var setting = fields[fieldCode];
										var isUsed = setting
												&& setting.useYn === 'Y';
										var isRequired = isUsed
												&& setting.requiredYn === 'Y';

										group.classList.toggle('is-hidden',
												!isUsed);

										group
												.querySelectorAll(
														'.dynamic-required')
												.forEach(
														function(mark) {
															mark.style.display = isRequired ? 'inline'
																	: 'none';
														});

										setDisabled(group, !isUsed);

										if (isUsed) {
											group
													.querySelectorAll(
															'input, select, textarea')
													.forEach(
															function(input) {
																input.required = isRequired;
															});
										}
									});

					filterMilestoneOptions();
				}

				function filterMilestoneOptions() {
					if (!milestoneSelect || !versionSelect) {
						return;
					}

					var versionId = versionSelect.value;
					var selectedOption = milestoneSelect.options[milestoneSelect.selectedIndex];
					var visibleMilestoneCount = 0;

					Array.prototype.forEach
							.call(
									milestoneSelect.options,
									function(option) {
										if (!option.value) {
											option.hidden = false;
											return;
										}

										var isVisible = versionId
												&& option.getAttribute('data-version-id') === versionId;
										option.hidden = !isVisible;

										if (isVisible) {
											visibleMilestoneCount += 1;
										}
									});

					if (milestoneSelect.options.length > 0) {
						if (loadedMilestoneCount === 0) {
							milestoneSelect.options[0].textContent = '사용 가능한 마일스톤 없음';
						} else if (!versionId) {
							milestoneSelect.options[0].textContent = '버전을 먼저 선택';
						} else if (visibleMilestoneCount === 0) {
							milestoneSelect.options[0].textContent = '선택한 버전에 마일스톤 없음';
						} else {
							milestoneSelect.options[0].textContent = '선택';
						}
					}

					if (selectedOption && selectedOption.hidden) {
						milestoneSelect.value = '';
					}
				}

				function resetSelect(select, placeholder) {
					if (!select) {
						return;
					}

					select.innerHTML = '';

					var option = document.createElement('option');
					option.value = '';
					option.textContent = placeholder;
					select.appendChild(option);
				}

				function appendOption(select, value, text, selectedValue) {
					var option = document.createElement('option');

					option.value = value;
					option.textContent = text;
					option.selected = selectedValue && selectedValue === value;
					select.appendChild(option);

					return option;
				}

				function renderCreateExtraOptions(data) {
					resetSelect(milestoneSelect, '선택');
					resetSelect(assigneeSelect, '선택');
					resetSelect(parentIssueSelect, '선택');

					loadedMilestoneCount = (data.milestoneList || []).length;

					(data.milestoneList || []).forEach(function(milestone) {
						var option = appendOption(milestoneSelect,
								milestone.milestoneId, milestone.milestoneTitle,
								selectedMilestoneId);
						option.setAttribute('data-version-id', milestone.versionId);
					});

					(data.assigneeList || []).forEach(function(assignee) {
						appendOption(assigneeSelect, assignee.assigneeId,
								assignee.assigneeName, selectedAssigneeId);
					});

					(data.parentIssueList || []).forEach(function(parentIssue) {
						appendOption(parentIssueSelect, parentIssue.parentIssueId,
								parentIssue.parentIssueTitle + ' ('
										+ parentIssue.parentIssueId + ')',
								selectedParentIssueId);
					});

					filterMilestoneOptions();
				}

				function loadCreateExtraOptions() {
					if (!createOptionUrl) {
						return;
					}

					resetSelect(milestoneSelect, '불러오는 중');
					resetSelect(assigneeSelect, '불러오는 중');
					resetSelect(parentIssueSelect, '불러오는 중');

					fetch(createOptionUrl, {
						headers : {
							'Accept' : 'application/json'
						}
					}).then(function(response) {
						if (!response.ok) {
							throw new Error('create option request failed');
						}
						return response.json();
					}).then(renderCreateExtraOptions).catch(function() {
						resetSelect(milestoneSelect, '목록을 불러오지 못했습니다');
						resetSelect(assigneeSelect, '목록을 불러오지 못했습니다');
						resetSelect(parentIssueSelect, '목록을 불러오지 못했습니다');
					});
				}

				if (issueTypeSelect) {
					issueTypeSelect.addEventListener('change',
							applyFieldSettings);
				}

				if (versionSelect) {
					versionSelect.addEventListener('change',
							filterMilestoneOptions);
				}

				applyFieldSettings();
				loadCreateExtraOptions();
			})();
		</script>

	</div>
</body>
</html>
