<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">

<head>
<meta charset="UTF-8">
<title>일감 전체조회</title>

<link rel="stylesheet" th:href="@{/css/common-ui.css}">
<link rel="stylesheet" th:href="@{/css/common-filter.css}">
<link rel="stylesheet" th:href="@{/css/issues/issues.css}">
</head>

<body>
	<div layout:fragment="Content">

		<div class="issues-list-page">
			<div class="container-fluid">

				<div class="issues-header">
					<div>
						<h3>일감 전체조회</h3>
						<p>
							<span th:text="${projectInfo.projectName}">프로젝트명</span> 프로젝트의 일감을
							조회합니다.
						</p>
					</div>

					<div class="issues-list-actions">
						<a th:if="${canCreateMilestone}"
							th:href="@{/project/{projectId}/milestones/create(projectId=${selectedProjectId})}"
							class="btn btn-custon-rounded-four btn-default"> 마일스톤 생성 </a>

						<button th:unless="${canCreateMilestone}" type="button"
							class="btn btn-custon-rounded-four btn-default" disabled
							title="마일스톤 생성 권한이 없습니다.">마일스톤 생성</button>

						<a th:if="${canCreateIssue}"
							th:href="@{/project/{projectId}/issues/create(projectId=${selectedProjectId})}"
							class="btn btn-custon-rounded-four btn-primary"> 일감 생성 </a>

						<button th:unless="${canCreateIssue}" type="button"
							class="btn btn-custon-rounded-four btn-primary" disabled
							title="일감 생성 권한이 없습니다.">일감 생성</button>
					</div>
				</div>

				<div th:if="${message}" class="page-message page-message-success"
					th:text="${message}"></div>

				<div th:if="${errorMessage}" class="page-message page-message-error"
					th:text="${errorMessage}"></div>

				<div class="search-section issues-search-section">
					<div class="search-header">
						<div class="search-title">검색조건</div>
					</div>

					<form
						th:action="@{/project/{projectId}/issues(projectId=${selectedProjectId})}"
						method="get">

						<input type="hidden" name="page" value="1"> <input
							type="hidden" name="issueNoSort"
							th:value="${searchVO.issueNoSort}">

						<div class="search-form-row issues-search-row">

							<div class="search-field">
								<label>유형</label>
								<details class="filter-dropdown" data-placeholder="전체"
									data-filter-group="issueType">
									<summary><span class="filter-selected-text">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item"
											th:each="issueType : ${issueTypeList}">
											<input type="checkbox" name="issueTypeIdList"
												th:value="${issueType.issueTypeId}"
												th:checked="${searchVO.issueTypeIdList != null and #lists.contains(searchVO.issueTypeIdList, issueType.issueTypeId)}">
											<span th:text="${issueType.issueTypeName}">유형</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field">
								<label>버전</label>
								<details class="filter-dropdown" data-placeholder="전체"
									data-filter-group="version">
									<summary><span class="filter-selected-text">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item" th:each="version : ${versionList}">
											<input type="checkbox" name="versionIdList"
												th:value="${version.versionId}"
												th:checked="${searchVO.versionIdList != null and #lists.contains(searchVO.versionIdList, version.versionId)}">
											<span th:text="${version.versionName}">버전</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field">
								<label for="keyword">제목</label> <input type="text" id="keyword"
									name="keyword" th:value="${searchVO.keyword}" placeholder="제목">
							</div>

							<div class="search-field">
								<label>상태</label>
								<details class="filter-dropdown" data-placeholder="전체"
									data-filter-group="status">
									<summary><span class="filter-selected-text">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item" th:each="status : ${issueStatusList}">
											<input type="checkbox" name="issueStatusIdList"
												th:value="${status.issueStatusId}"
												th:checked="${searchVO.issueStatusIdList != null and #lists.contains(searchVO.issueStatusIdList, status.issueStatusId)}">
											<span th:text="${status.issueStatusName}">상태</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field">
								<label>우선순위</label>
								<details class="filter-dropdown" data-placeholder="전체"
									data-filter-group="priority">
									<summary><span class="filter-selected-text">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item" th:each="priority : ${priorityList}">
											<input type="checkbox" name="settingCodeIdList"
												th:value="${priority.settingCodeId}"
												th:checked="${searchVO.settingCodeIdList != null and #lists.contains(searchVO.settingCodeIdList, priority.settingCodeId)}">
											<span th:text="${priority.settingName}">우선순위</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field">
								<label>담당자</label>
								<details class="filter-dropdown" data-placeholder="전체"
									data-filter-group="assignee">
									<summary><span class="filter-selected-text">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item" th:each="assignee : ${assigneeList}">
											<input type="checkbox" name="assigneeIdList"
												th:value="${assignee.assigneeId}"
												th:checked="${searchVO.assigneeIdList != null and #lists.contains(searchVO.assigneeIdList, assignee.assigneeId)}">
											<span th:text="${assignee.assigneeName}">담당자</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field">
								<label>진척도</label>
								<details class="filter-dropdown" data-placeholder="전체">
									<summary><span class="filter-selected-text">전체</span></summary>
									<div class="filter-check-list filter-dropdown-panel">
										<label class="filter-check-item">
											<input type="checkbox" name="progressRangeList" value="0-20"
												th:checked="${searchVO.progressRangeList != null and #lists.contains(searchVO.progressRangeList, '0-20')}">
											<span>0~20%</span>
										</label>
										<label class="filter-check-item">
											<input type="checkbox" name="progressRangeList" value="21-40"
												th:checked="${searchVO.progressRangeList != null and #lists.contains(searchVO.progressRangeList, '21-40')}">
											<span>21~40%</span>
										</label>
										<label class="filter-check-item">
											<input type="checkbox" name="progressRangeList" value="41-60"
												th:checked="${searchVO.progressRangeList != null and #lists.contains(searchVO.progressRangeList, '41-60')}">
											<span>41~60%</span>
										</label>
										<label class="filter-check-item">
											<input type="checkbox" name="progressRangeList" value="61-80"
												th:checked="${searchVO.progressRangeList != null and #lists.contains(searchVO.progressRangeList, '61-80')}">
											<span>61~80%</span>
										</label>
										<label class="filter-check-item">
											<input type="checkbox" name="progressRangeList" value="81-100"
												th:checked="${searchVO.progressRangeList != null and #lists.contains(searchVO.progressRangeList, '81-100')}">
											<span>81~100%</span>
										</label>
									</div>
								</details>
							</div>

							<div class="search-field issues-date-field">
								<label>날짜</label>
								<div class="issues-date-range">
									<input type="date" id="startDate" name="startDate"
										th:value="${searchVO.startDate}"> <span
										class="issues-date-separator">~</span> <input type="date"
										id="dueDate" name="dueDate" th:value="${searchVO.dueDate}">
								</div>
							</div>

						</div>

						<div class="search-btn-area">
							<a
								th:href="@{/project/{projectId}/issues(projectId=${selectedProjectId})}"
								class="btn btn-custon-rounded-four btn-default filter-btn">
								초기화 </a>

							<button type="submit"
								class="btn btn-custon-rounded-four btn-primary filter-btn">
								검색</button>
						</div>
					</form>
				</div>

				<div class="issues-table-card">
					<table class="table table-hover issues-list-table">
						<colgroup>
							<col class="col-issue-no">
							<col class="col-issue-type">
							<col class="col-version">
							<col class="col-title">
							<col class="col-status">
							<col class="col-priority">
							<col class="col-assignee">
							<col class="col-progress">
							<col class="col-date">
							<col class="col-hours">
						</colgroup>

						<thead>
							<tr>
								<th class="issue-no-sort-header"><a class="issue-sort-link"
									th:href="@{/project/{projectId}/issues(
											projectId=${selectedProjectId},
											page=1,
											issueTypeIdList=${searchVO.issueTypeIdList},
											versionIdList=${searchVO.versionIdList},
											keyword=${searchVO.keyword},
											issueStatusIdList=${searchVO.issueStatusIdList},
											settingCodeIdList=${searchVO.settingCodeIdList},
											assigneeIdList=${searchVO.assigneeIdList},
											progressRangeList=${searchVO.progressRangeList},
											startDate=${searchVO.startDate},
											dueDate=${searchVO.dueDate},
											issueNoSort=${searchVO.issueNoSort == 'asc' ? 'desc' : 'asc'}
										)}">
										식별번호 <span class="issue-sort-mark"
										th:text="${searchVO.issueNoSort == 'asc'} ? '▲' : '▼'">
											▼ </span>
								</a></th>
								<th>유형</th>
								<th>버전</th>
								<th>제목</th>
								<th>상태</th>
								<th>우선순위</th>
								<th>담당자</th>
								<th>진척도</th>
								<th>날짜</th>
								<th>추정시간</th>
							</tr>
						</thead>

						<tbody>
							<tr th:if="${#lists.isEmpty(issueList)}">
								<td colspan="10" class="empty-row">조회된 일감이 없습니다.</td>
							</tr>

							<tr th:each="issue : ${issueList}">
								<td class="issue-no-cell">
									<a class="issue-no-badge issue-no-link"
										th:href="@{|/project/${selectedProjectId}/issues/${issue.issueId}|}"
										th:classappend="${issue.closedYn == 'Y'} ? ' is-closed' : ' is-open'"
										th:text="${issue.displayIssueNo}"> #0001 </a>
								</td>

								<td><span class="cell-text"
									th:text="${issue.issueTypeName != null ? issue.issueTypeName : '-'}">
										유형 </span></td>

								<td><span class="cell-text"
									th:text="${issue.versionName != null ? issue.versionName : '-'}">
										버전 </span></td>

								<td class="issues-title-cell"><span
									class="strong-text ellipsis-text" th:text="${issue.title}">
										제목 </span></td>

								<td><span class="cell-text"
									th:text="${issue.issueStatusName != null ? issue.issueStatusName : '-'}">
										상태 </span></td>

								<td><span class="cell-text"
									th:text="${issue.settingName != null ? issue.settingName : '-'}">
										우선순위 </span></td>

								<td><span class="cell-text"
									th:text="${issue.assigneeName != null ? issue.assigneeName : '-'}">
										담당자 </span></td>

								<td>
									<div class="issues-progress-cell">
										<div class="issues-progress">
											<div class="issues-progress-bar"
												th:style="|width: ${issue.progressRate != null ? issue.progressRate : 0}%;|"></div>
										</div>

										<span class="issues-progress-text"> <span
											th:text="${issue.progressRate != null ? issue.progressRate : 0}">0</span>%
										</span>
									</div>
								</td>

								<td>
									<div class="issues-date-cell">
										<span
											th:text="${issue.startDate != null ? issue.startDate : '-'}">시작일</span>
										<span class="issues-date-separator">~</span> <span
											th:text="${issue.dueDate != null ? issue.dueDate : '-'}">완료기한</span>
									</div>
								</td>

								<td><span class="cell-text"
									th:text="${issue.estimatedHours != null ? issue.estimatedHours : 0}">
										0 </span></td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="issues-pagination">

					<div class="issues-page-links">

						<span th:if="${searchVO.hasPreviousPage == null or !searchVO.hasPreviousPage}"
							class="issues-page-btn is-disabled"> 이전 </span> <a
							th:if="${searchVO.hasPreviousPage}" class="issues-page-btn"
							th:href="@{/project/{projectId}/issues(
								projectId=${selectedProjectId},
								page=${searchVO.page - 1},
								issueTypeIdList=${searchVO.issueTypeIdList},
								versionIdList=${searchVO.versionIdList},
								keyword=${searchVO.keyword},
								issueStatusIdList=${searchVO.issueStatusIdList},
								settingCodeIdList=${searchVO.settingCodeIdList},
								assigneeIdList=${searchVO.assigneeIdList},
								progressRangeList=${searchVO.progressRangeList},
								startDate=${searchVO.startDate},
								dueDate=${searchVO.dueDate},
								issueNoSort=${searchVO.issueNoSort}
							)}">
							이전 </a>

						<span class="issues-page-btn is-active" th:text="${searchVO.page}">1</span>

						<span
							th:if="${searchVO.hasNextPage == null or !searchVO.hasNextPage}"
							class="issues-page-btn is-disabled"> 다음 </span> <a
							th:if="${searchVO.hasNextPage}"
							class="issues-page-btn"
							th:href="@{/project/{projectId}/issues(
								projectId=${selectedProjectId},
								page=${searchVO.page + 1},
								issueTypeIdList=${searchVO.issueTypeIdList},
								versionIdList=${searchVO.versionIdList},
								keyword=${searchVO.keyword},
								issueStatusIdList=${searchVO.issueStatusIdList},
								settingCodeIdList=${searchVO.settingCodeIdList},
								assigneeIdList=${searchVO.assigneeIdList},
								progressRangeList=${searchVO.progressRangeList},
								startDate=${searchVO.startDate},
								dueDate=${searchVO.dueDate},
								issueNoSort=${searchVO.issueNoSort}
							)}">
							다음 </a>

					</div>
				</div>

			</div>
		</div>

		<script th:inline="javascript">
			(function() {
				document.body.classList.add('issues-list-body');

				var filterOptionUrl = /*[[@{/project/{projectId}/issues/filter-options(projectId=${selectedProjectId})}]]*/ '';
				var optionConfig = {
					issueType : {
						listName : 'issueTypeList',
						inputName : 'issueTypeIdList',
						valueKey : 'issueTypeId',
						labelKey : 'issueTypeName'
					},
					version : {
						listName : 'versionList',
						inputName : 'versionIdList',
						valueKey : 'versionId',
						labelKey : 'versionName'
					},
					status : {
						listName : 'issueStatusList',
						inputName : 'issueStatusIdList',
						valueKey : 'issueStatusId',
						labelKey : 'issueStatusName'
					},
					priority : {
						listName : 'priorityList',
						inputName : 'settingCodeIdList',
						valueKey : 'settingCodeId',
						labelKey : 'settingName'
					},
					assignee : {
						listName : 'assigneeList',
						inputName : 'assigneeIdList',
						valueKey : 'assigneeId',
						labelKey : 'assigneeName'
					}
				};
				var queryParams = new URLSearchParams(window.location.search);

				function createOption(inputName, value, label, checked) {
					var item = document.createElement('label');
					var input = document.createElement('input');
					var text = document.createElement('span');

					item.className = 'filter-check-item';
					input.type = 'checkbox';
					input.name = inputName;
					input.value = value;
					input.checked = checked;
					text.textContent = label;

					item.appendChild(input);
					item.appendChild(text);
					return item;
				}

				function renderEmpty(panel, message) {
					var empty = document.createElement('span');

					empty.className = 'filter-empty-message';
					empty.textContent = message;
					panel.appendChild(empty);
				}

				function renderOptionGroup(dropdown, config, rows) {
					var panel = dropdown.querySelector('.filter-dropdown-panel');
					var selectedValues = queryParams.getAll(config.inputName);

					if (!panel) {
						return;
					}

					panel.innerHTML = '';

					if (!rows || rows.length === 0) {
						renderEmpty(panel, '선택 가능한 항목이 없습니다.');
						updateFilterSummary(dropdown);
						return;
					}

					rows.forEach(function(row) {
						var value = row[config.valueKey];
						var label = row[config.labelKey];

						if (!value || !label) {
							return;
						}

						panel.appendChild(createOption(config.inputName, value, label,
								selectedValues.indexOf(String(value)) !== -1));
					});

					updateFilterSummary(dropdown);
				}

				function loadFilterOptions() {
					if (!filterOptionUrl) {
						return;
					}

					document.querySelectorAll('.filter-dropdown[data-filter-group]').forEach(function(dropdown) {
						var panel = dropdown.querySelector('.filter-dropdown-panel');

						if (panel && panel.children.length === 0) {
							renderEmpty(panel, '옵션을 불러오는 중입니다.');
						}
					});

					fetch(filterOptionUrl, {
						headers : {
							'Accept' : 'application/json'
						}
					}).then(function(response) {
						if (!response.ok) {
							throw new Error('filter option request failed');
						}
						return response.json();
					}).then(function(data) {
						Object.keys(optionConfig).forEach(function(groupName) {
							var dropdown = document.querySelector(
									'.filter-dropdown[data-filter-group="' + groupName + '"]');

							if (!dropdown) {
								return;
							}

							renderOptionGroup(dropdown, optionConfig[groupName],
									data[optionConfig[groupName].listName]);
						});
					}).catch(function() {
						document.querySelectorAll('.filter-dropdown[data-filter-group]').forEach(function(dropdown) {
							var panel = dropdown.querySelector('.filter-dropdown-panel');

							if (!panel) {
								return;
							}

							panel.innerHTML = '';
							renderEmpty(panel, '필터 항목을 불러오지 못했습니다.');
						});
					});
				}

				function updateFilterSummary(dropdown) {
					var checkedLabels = Array.prototype.slice.call(
							dropdown.querySelectorAll('input[type="checkbox"]:checked, input[type="radio"]:checked'))
							.map(function(input) {
								var label = input.closest('.filter-check-item');
								var text = label ? label.innerText.trim() : '';
								return text;
							}).filter(function(text) {
								return text.length > 0;
							});
					var summaryText = dropdown.querySelector('.filter-selected-text');
					var placeholder = dropdown.getAttribute('data-placeholder') || '전체';

					if (!summaryText) {
						return;
					}

					if (checkedLabels.length === 0) {
						summaryText.textContent = placeholder;
						dropdown.classList.remove('has-selected');
						return;
					}

					summaryText.textContent = checkedLabels.join(', ');
					dropdown.classList.add('has-selected');
				}

				document.querySelectorAll('.filter-dropdown').forEach(function(dropdown) {
					updateFilterSummary(dropdown);
					dropdown.addEventListener('change', function() {
						updateFilterSummary(dropdown);
					});
				});

				document.addEventListener('click', function(event) {
					document.querySelectorAll('.filter-dropdown[open]').forEach(function(dropdown) {
						if (!dropdown.contains(event.target)) {
							dropdown.removeAttribute('open');
						}
					});
				});

				loadFilterOptions();
			})();
		</script>

	</div>
</body>
</html>
